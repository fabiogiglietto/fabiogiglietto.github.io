<section class="profile-card">
  <div class="profile-card__content">
    <div class="profile-card__image">
      <img src="{{ site.profile_image | default: '/assets/images/profile.jpg' }}" alt="{{ site.name }}" class="profile-image">
    </div>
    <div class="profile-card__info">
      <h1 class="profile-card__name">{{ site.name }}</h1>
      <h2 class="profile-card__title">{{ site.title }}</h2>
      <p class="profile-card__affiliation">{{ site.affiliation }}</p>
      <div class="profile-card__contact">
        <p><i class="fas fa-envelope"></i> <a href="mailto:{{ site.email }}">{{ site.email }}</a></p>
        <p><i class="fas fa-map-marker-alt"></i> {{ site.location }}</p>
      </div>
      <div class="profile-card__social">
        <a href="https://github.com/{{ site.github_username }}" aria-label="GitHub Profile"><i class="fab fa-github"></i></a>
        <a href="https://scholar.google.com/citations?user={{ site.scholar_id }}" aria-label="Google Scholar Profile"><i class="fas fa-graduation-cap"></i></a>
        <a href="https://orcid.org/{{ site.orcid_id }}" aria-label="ORCID Profile"><i class="fab fa-orcid"></i></a>
        <a href="https://{{ site.mastodon_instance }}/@{{ site.mastodon_username }}" aria-label="Mastodon Profile"><i class="fab fa-mastodon"></i></a>
        <a href="https://www.threads.net/@{{ site.threads_username }}" aria-label="Threads Profile"><i class="fab fa-threads"></i></a>
      </div>
    </div>
  </div>
</section>
