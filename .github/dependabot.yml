version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      node-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      jekyll-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
