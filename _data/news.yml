- date: '2026-04-04'
  content: >-
    Several new publications address critical issues surrounding online
    platforms and digital behavior. One study explores how jihadist supporters
    leverage TikTok's algorithmic recommendations and content moderation
    loopholes. Another examines the partisan effects of social media bans.
    Furthermore, research analyzes affective-discursive ecologies of the far
    right on Instagram, focusing on multimodal softening, mobilization, and
    algorithmic proximity.
