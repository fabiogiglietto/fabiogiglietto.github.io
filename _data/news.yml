- date: '2026-07-08'
  content: >-
    How generative AI is weaponized for state-sponsored propaganda and digital
    authoritarianism is the focus of a new comparative study. Examining six
    democratically weakened nations, researchers Gabrielle D. Beacken, Inga K.
    Trauthig, and Samuel C. Woolley provide key insights into how emerging
    technology is reshaping information ecosystems under illiberal regimes.
  url: https://doi.org/10.1177/20539517251410064
