- date: '2026-06-28'
  content: >-
    Recently highlighted research explores the multifaceted impact of Artificial
    Intelligence on society and communication, as curated by Professor
    Giglietto. This selection examines generative AI's influence on media
    cognition and its persuasive capabilities, alongside strategies for reducing
    conspiracy beliefs through AI dialogues. Additional papers investigate
    public attitudes towards AI, analyze stakeholders driving the AI hype, and
    present new findings on AI coding agents' capacity to reproduce social
    science research results.
  url: https://aoir.social/@fabiogiglietto/116826381060102993
