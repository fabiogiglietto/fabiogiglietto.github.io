- date: '2026-05-31'
  content: >-
    A study by Jaume Suau Martínez and Clara Juarez Miro delves into
    'Understanding disinformation as narratives in the hybrid media ecosystem,'
    with evidence drawn from the US context. The research offers a nuanced
    perspective on how disinformation operates within complex media
    environments.
  url: https://doi.org/10.1177/14648849241303249
