- date: '2026-06-29'
  content: >-
    A collection of recent studies explores the complexities of disinformation
    and online media ecosystems. Topics range from the analysis of
    cross-national troll behavior and the dynamics of alternative media in the
    digital news landscape to evaluations of echo chambers and radicalization
    pathways on platforms like YouTube, and the understanding of disinformation
    as narratives.
