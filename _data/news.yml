- date: '2026-07-02'
  content: >-
    The complexities of platform governance and content moderation are a
    recurring focus in recent studies. Research critically examines the
    effectiveness of moderation tools like 'Community Notes' and their potential
    risks to electoral processes. Other analyses consider platform collective
    behavior as a vital democratic infrastructure within the Digital Services
    Act (DSA) era and compare content moderation legislation in the EU and US,
    framing it as a form of 'traffic control' for online platforms.
  url: https://aoir.social/@fabiogiglietto/116848735402994028
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-07'
  content: >-
    Trends in disinformation, propaganda, and the broader digital media
    ecosystem continue to draw significant attention. New research investigates
    state media propaganda's dual objectives in conflicts like the
    Russo-Ukrainian war, the strategic use of fake news in specific national
    contexts such as Italy, and long-term analyses of cross-national information
    attacks and troll behavior. Additionally, studies explore how alternative
    media integrate into the digital news landscape and what young adults
    perceive as informative on audio-visual digital platforms.
  url: https://aoir.social/@fabiogiglietto/116877341880664572
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-03'
  content: >-
    Innovations and critical considerations in social science research
    methodology are being explored. Recent papers discuss the development of
    tools like Google's Paper Assistant for automating scientific review and
    question the fundamental issue of ensuring survey respondents truly
    understand questions. Furthermore, research highlights the emerging
    capability of AI coding agents to reproduce social science findings,
    signaling new potentials and challenges for academic inquiry.
  url: https://aoir.social/@fabiogiglietto/116854456723341205
