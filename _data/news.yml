- date: '2026-06-16'
  content: >-
    A collection of significant recent academic papers exploring critical themes
    in digital communication, AI, and social media research was highlighted.
    Featured studies delve into topics such as the drivers of AI hype,
    perceptions of informativeness among young adults, the application of AI
    coding agents in social science, and the evaluation of echo chambers and
    radicalization pathways on YouTube. Other notable research addresses
    temporal dynamics in digital trace data, challenges in social media data
    access for electoral research, understanding disinformation narratives,
    algorithmic interventions for social norm misperceptions, the political
    economy and imaginative landscape of AI, multi-platform analysis of
    electoral discourse, symbolic boundary work in conspiracy theories, and the
    hostile misinformation effect.
  url: https://doi.org/10.1007/s00146-026-03079-6
  platforms:
    - Mastodon
    - BlueSky
  toread: true
