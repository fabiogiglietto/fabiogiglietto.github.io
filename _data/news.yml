- date: '2026-06-06'
  content: >-
    An array of significant new research highlights the complex dynamics of
    social media and digital platforms. Topics covered include temporal dynamics
    in digital trace data, the ongoing challenges of social media data access
    for research, and the multi-platform analysis of electoral discourse. Other
    studies shed light on the connectivity and hybridisation of online
    extremism, the decline of public debate online, and how parliamentarians
    establish epistemic authority in crisis situations.
