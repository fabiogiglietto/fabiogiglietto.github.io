- date: '2026-05-17'
  content: >-
    Recent academic papers highlighted explore the evolving landscape of social
    media platforms and their impact on digital public life. Key discussions
    include the potential decline of public debate on platforms like Twitter,
    the algorithmic transformations observed on TikTok, the comprehensive
    concept of 'platformization,' and emerging perspectives for a 'post-social
    media studies' era.
