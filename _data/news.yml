- date: '2026-05-05'
  content: >-
    New research highlights emerging discussions on the societal imaginaries of
    generative AI across global media, including in the UK, US, China, and
    India. Complementary studies also explore the application of multimodal
    large language models (LLMs) for analyzing visual political communication on
    Instagram.
