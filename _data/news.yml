- date: '2026-07-01'
  content: >-
    Academic literature is rapidly expanding around how audiences process and
    trust generative AI in journalism. Newly highlighted research explores the
    multilevel frameworks of trust in media cognition, measuring how quality
    perceptions and reader engagement shift when interacting with fully
    AI-generated versus AI-assisted news content.
