- date: '2026-03-06'
  content: >-
    The spread and detection of misinformation remains a prominent research
    area. Recent papers examine everyday encounters with misinformation online,
    focusing on sources, topics, and modes. Additionally, research explores how
    Serbia's SNS party mimics authentic support through coordinated inauthentic
    behavior and the modality-congruent carryover effect, detailing how
    difficulty in identifying (deep)fake news impacts self-confidence in truth
    discernment and susceptibility to subsequent disinformation.
  url: https://aoir.social/@fabiogiglietto/116180996499748212
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-02-19'
  content: >-
    Several new papers investigate the role of algorithms and platforms in
    shaping online discourse. Research analyzes the political effects of X’s
    (formerly Twitter's) feed algorithm. Another study explores the challenges
    of election research in the age of regulated data access under the EU
    Digital Services Act. Work also looks at methods for identifying potentially
    irregular electoral ads on Facebook during the Brazilian elections.
  url: https://aoir.social/@fabiogiglietto/116095943026857124
