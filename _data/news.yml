- date: '2026-05-31'
  content: >-
    The persistent challenge of misinformation, disinformation, and conspiracy
    theories within the digital media ecosystem is a central theme in recently
    highlighted research. Papers analyze disinformation as narratives in hybrid
    media, the symbolic boundary work employed by individuals in “Great Reset”
    debates across platforms, and the hostile misinformation effect driven by
    ideological congruence. Additional studies explore how media contribute to
    the dissemination of conspiracy beliefs and offer international expert
    assessments on current challenges, trends, and interventions in combating
    digital misinformation.
  url: https://aoir.social/@fabiogiglietto/116670726588688843
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-29'
  content: >-
    Insights into the societal implications of artificial intelligence and
    algorithms are gaining prominence, with recent papers exploring the redesign
    of algorithms to address social norm misperceptions during elections. Other
    significant contributions delve into the political economy and
    accountability of AI, the imaginative landscape of AI and Silicon Valley's
    “quiet futuring,” and the economics of AI. Further research examines the
    framing of Google’s AI Overviews and advocates for integrating social theory
    as a structural prior for agentic AI systems.
  url: https://aoir.social/@fabiogiglietto/116656334785408405
