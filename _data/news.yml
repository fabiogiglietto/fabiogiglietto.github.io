- date: '2026-05-18'
  content: >-
    New studies shed light on online extremism and evolving social media
    landscapes. Topics explored include the alternative influence network of
    far-right YouTubers in Sweden and their online-to-offline activities during
    the COVID-19 pandemic, as well as an analysis on the decline of public
    debate online following changes to major social media platforms.
