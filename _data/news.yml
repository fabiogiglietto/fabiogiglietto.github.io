- date: '2026-06-28'
  content: >-
    Several recent studies highlight the multifaceted impact of Artificial
    Intelligence on public discourse and cognition. Shared research explores how
    AI systems can out-persuade expert humans, their potential in durably
    reducing conspiracy beliefs through dialogue, and the concept of generative
    AI as a 'medium that thinks.' Other papers delve into public attitudes
    towards AI in specific countries and analyze the stakeholders driving AI
    discourse, alongside investigations into how AI coding agents can reproduce
    social science findings.
  url: https://doi.org/10.1177/27523543261454458
