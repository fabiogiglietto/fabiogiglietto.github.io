- date: '2026-05-20'
  content: >-
    A series of recent papers explores the multifaceted impact of AI and large
    language models. Research delves into the economic implications derived from
    public surveys, the discursive framing of Google's AI Overviews, proposals
    for incorporating social theory into AI system design, media's portrayal of
    generative AI, the influence of state media control on LLMs, cross-cultural
    imaginaries of generative AI in news, and the application of multimodal LLMs
    in analyzing visual political communication on Instagram.
  url: https://aoir.social/@fabiogiglietto/116608382153261090
