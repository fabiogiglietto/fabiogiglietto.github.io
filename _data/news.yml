- date: '2026-05-17'
  content: >-
    Key analyses examine the transformations in online public discourse,
    including discussions on the perceived "death of Twitter" and its
    implications for digital public debate, alongside studies investigating how
    political actors, such as Brazilian parliamentarians, establish epistemic
    authority during times of crisis.
