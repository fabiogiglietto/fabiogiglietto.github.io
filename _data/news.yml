- date: '2026-05-29'
  content: >-
    Recent academic discussions highlight the critical role of AI and algorithms
    in shaping digital societies. Papers shared cover algorithmic interventions
    to address social norm misperceptions during elections, the political
    economy of AI, and the imaginative framing of AI, including Google’s AI
    Overviews. Further insights emphasize the necessity of integrating social
    theory into agentic AI frameworks and exploring the broader economic
    implications of AI.
