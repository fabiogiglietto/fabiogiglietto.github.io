- date: '2026-05-31'
  content: >-
    New research is shedding light on the complexities of disinformation,
    digital echo chambers, and potential strategies for intervention. Studies by
    Megan A. Brown et al. offer frameworks for evaluating echo chambers, rabbit
    holes, and pathways to radicalization on platforms like YouTube. Other work
    by Jaume Suau Martínez, Clara Juarez Miro examines disinformation as
    evolving narratives within hybrid media ecosystems, drawing evidence from
    the US context. Crucially, research by William J. Brady et al. also explores
    how algorithmic designs can be refined to intervene on social norm
    misperceptions, particularly during national elections, suggesting avenues
    for mitigating harmful online phenomena.
  url: https://aoir.social/@fabiogiglietto/116670726588688843
