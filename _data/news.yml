- date: '2026-06-06'
  content: >-
    Academic discussions on social media data access and methodological
    innovations have been brought to attention through Professor Giglietto's
    recent shares. These papers shed light on exploring temporal dynamics in
    digital trace data for communication research, as well as addressing the
    critical challenges and current state of social media data access for
    research, particularly in the context of election studies, considering
    factors such as cost, researcher proficiency, and platform permissions.
