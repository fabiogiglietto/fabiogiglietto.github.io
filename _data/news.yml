- date: '2026-05-19'
  content: >-
    A collection of academic papers highlighted by Professor Giglietto recently
    explored the intricate relationship between Artificial Intelligence, Large
    Language Models, and their societal and media impacts. Noteworthy
    discussions included the framing of Google's AI Overviews, the essential
    role of social theory in agentic AI, how generative AI is portrayed in news
    media, the influence of state media control on LLMs, cross-cultural analyses
    of AI imaginaries in newspapers, and the application of multimodal LLMs in
    visual political communication on Instagram.
  url: https://doi.org/10.1177/17504813261447684
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-18'
  content: >-
    Recent shares from Professor Giglietto's online activity spotlighted
    significant research on misinformation, online extremism, and the dynamics
    of public debate. Featured studies delved into the alternative influence
    networks of far-right YouTubers, the decline of public debate following
    Twitter's transformation, the link between online discourse and offline
    actions of extremist groups, how political actors assert epistemic authority
    during crises, the media's role in disseminating conspiracy beliefs, expert
    assessments of misinformation challenges, and the mainstreaming of radical
    ideologies through protest movements.
  url: https://doi.org/10.2478/nor-2026-0008
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-13'
  content: >-
    Professor Giglietto also drew attention to several new academic articles
    examining the evolving landscape of social media platforms and contemporary
    research methodologies. These publications included analyses of
    micro-influencers' strategies for navigating platform culture, a
    comprehensive systematic review of social science studies utilizing social
    media data from 2010-2024, the practical implications of Article 40 of the
    Digital Services Act (DSA) for platform research, the algorithmic
    transformation of social media publics as seen on TikTok, and emerging
    theoretical frameworks for a 'Post-Social Media Studies' approach.
  url: >-
