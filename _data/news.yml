- date: '2026-05-18'
  content: >-
    New scholarship in online extremism and political discourse has been shared,
    providing insights into various contemporary issues. Featured research
    includes an analysis of the alternative influence network of far-right
    YouTubers in Sweden during the COVID-19 pandemic, an examination of the
    Proud Boys' online discourse and offline activities, studies on how
    Brazilian parliamentarians pursue epistemic authority in times of crisis,
    and explorations of protest movements contributing to the mainstreaming of
    radical ideologies.
