- date: '2026-04-04'
  content: >-
    New research explores the spread of extremist content online. One paper
    analyzes how jihadist supporters exploit algorithmic recommendations and
    evade content moderation on TikTok. Another examines the
    affective-discursive ecologies of the far right, focusing on multimodal
    softening, mobilization, and algorithmic proximity on Instagram.
