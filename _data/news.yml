- date: '2026-05-31'
  content: >-
    Recent scholarship focuses on understanding disinformation, misinformation,
    and conspiracy theories within the hybrid media ecosystem. Research explores
    how media contributes to the dissemination of conspiracy beliefs, how
    individuals engage in symbolic boundary work around topics like the 'Great
    Reset,' and the ideological factors driving the assessment of misinformation
    targets. An international expert assessment also outlines key challenges,
    trends, and interventions in this evolving landscape.
  url: https://aoir.social/@fabiogiglietto/116670726588688843
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-29'
  content: >-
    Recent academic discussions highlight the evolving landscape of Artificial
    Intelligence, focusing on its political economy, algorithmic interventions
    in elections, the imaginative framing of AI by tech giants, and the agentic
    framing of generative AI in news media. Key research explores the economic
    impacts of AI and proposes social theory as a structural prior for agentic
    AI systems.
  url: https://aoir.social/@fabiogiglietto/116656334785408405
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-26'
  content: >-
    Several new studies investigate the complexities of online public debate and
    electoral discourse, including the challenges of multi-platform analysis and
    the evolving role of platforms like Twitter in public discourse. Research
    further examines the connectivity and hybridisation of online extremism,
    analyzing groups such as the Proud Boys and alternative influence networks
    of far-right YouTubers, alongside how political actors establish epistemic
    authority in times of crisis.
  url: https://aoir.social/@fabiogiglietto/116642061044802188
