- date: '2026-06-04'
  content: >-
    Discussion around the challenges of social media data access for researchers
    continues with a paper titled 'Moving targets, moving politics: The state of
    play in social media data access' by Claes H. de Vreese and Rebekah Tromble.
    This work examines the evolving landscape of platform data availability and
    its implications for academic inquiry.
  url: https://doi.org/10.1080/10584609.2026.2681041
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-01'
  content: >-
    New insights into platform data access for election research were shared,
    drawing attention to 'Price, proficiency, or permission: assessing platform
    data access for election research' by Josephine Lukito and Kayo Mimizuka.
    This research evaluates the various barriers and facilitators to obtaining
    crucial data for studying electoral processes online.
  url: https://doi.org/10.1080/1369118x.2026.2667921
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-31'
