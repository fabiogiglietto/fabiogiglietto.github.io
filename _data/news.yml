- date: '2026-07-15'
  content: >-
    Addressing the limitations of traditional fact-checking, a new publication
    by Celia Ramos, Clara Jiménez-Cruz, and Pablo Hernández-Escayola proposes a
    novel framework for combating online falsehoods. The authors advocate for
    combining "narrative monitoring" with "argument-checking" to proactively
    counter systemic disinformation campaigns rather than merely reacting to
    isolated claims.
