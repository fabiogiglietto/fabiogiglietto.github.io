- date: '2026-03-16'
  content: >-
    Several new papers address the impact of AI on various aspects of society.
    One study focuses on AI hype within journalism, exploring visibility, power
    dynamics, and the politics of media narratives. Another investigates whether
    large language models can infer political alignment from online
    conversations. Finally, research examines the potential for deepfake
    technology to be used in financial fraud, and considers global regulatory
    approaches.
  url: https://aoir.social/@fabiogiglietto/116240626949041455
