- date: '2026-03-30'
  content: >-
    Recent publications highlight the growing concern around the exploitation of
    algorithmic systems and content moderation. One study examines how jihadist
    supporters leverage TikTok's algorithmic recommendations to evade content
    moderation. Another investigates how recommender systems on X (formerly
    Twitter) can inadvertently profile users' ideological positions.
