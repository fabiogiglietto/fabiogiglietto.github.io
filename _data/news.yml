- date: '2026-07-18'
  content: >-
    A critical examination of platform data access is offered in a new paper by
    Axel Bruns and Laura Vodden. The study investigates the logistical,
    methodological, and ethical challenges researchers face when working with
    restricted platform data within highly controlled 'clean room' environments,
    contributing directly to ongoing debates around academic data transparency.
  url: https://doi.org/10.25358/openscience-15825
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-18'
  content: >-
    New research explores the critical intersection of digital media and
    democratic integrity. Authors Patrícia Rossini, Camila Mont'Alverne, and
    Antonis Kalogeropoulos analyze how specific digital informational pathways
    and the spread of misinformation directly impact public trust in election
    outcomes.
  url: https://doi.org/10.1080/17457289.2026.2701896
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-14'
  content: >-
    Methodological innovations in social media research are highlighted by the
    introduction of TubeStats and TokStats. Developed by Kevin Zheng and
    co-authors, these new tools aim to assist academics in gathering
    representative, random samples from YouTube and TikTok to enable more robust
    cross-platform analysis.
  url: https://doi.org/10.17645/mac.12085
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    Crowdsourced moderation systems are under scrutiny in a new study by Paul
    Bouchaud and Pedro Ramaciotti. The authors argue that the design of X's
    'Community Notes' feature structurally undermoderates polarizing content,
    presenting significant systemic risks to the integrity of electoral
    processes.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
