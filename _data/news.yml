- date: '2026-04-30'
  content: >-
    An academic paper explores the application of multimodal Large Language
    Models (LLMs) for understanding visual political communication on Instagram.
    The study, 'Seeing candidates at scale,' by Michael Achmann-Denkler, Mario
    Haim, and Christian Wolff, highlights novel methods for analyzing political
    messaging.
  url: http://arxiv.org/abs/2604.19489v1
