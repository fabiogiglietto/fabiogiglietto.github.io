- date: '2026-03-11'
  content: >-
    Recent studies are exploring the impact of Large Language Models (LLMs) on
    various aspects of communication and information dissemination. One paper
    investigates whether perceived political bias in LLMs reduces their
    persuasive abilities. Another study critiques the unreflective adoption of
    LLMs in communication research. Further research examines whether LLMs
    require curated context for reliable political fact-checking, even with
    reasoning and web search capabilities.
  url: https://aoir.social/@fabiogiglietto/116209897073522284
