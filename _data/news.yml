- date: '2026-07-01'
  content: >-
    In a newly released paper, researcher Anja Bechmann advocates for a
    conceptual shift in how we analyze platform impacts under the European
    Union’s Digital Services Act (DSA). The study proposes evaluating platform
    collective behavior as democratic infrastructure, moving beyond simplistic
    causal-effect models to better address systemic digital risks.
