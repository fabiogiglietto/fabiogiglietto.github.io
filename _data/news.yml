- date: '2026-07-14'
  content: >-
    The societal impact of generative artificial intelligence is being mapped
    through a growing body of research on trust and public discourse. Recent
    literature evaluates how conversational AI can shift beliefs and policy
    support among skeptics on highly contested issues, provides a multilevel
    framework for understanding trust in these new technologies, and measures
    how audience perceptions of news quality change when content is AI-generated
    versus AI-assisted.
  url: https://aoir.social/@fabiogiglietto/116916978635429067
