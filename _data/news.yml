    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-04'
  content: >-
    Key discussions in recent academic discourse center on the evolving
    challenges of social media data access for research, especially concerning
    electoral processes. Featured analyses address the 'moving targets' in data
    access policies, the impact of platform permissions and proficiency on
    election research, the design of algorithms to address social norm
    misperceptions during elections, and the infrastructure problems associated
    with multi-platform electoral discourse analysis.
  url: https://doi.org/10.1080/10584609.2026.2681041
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-31'
  content: >-
    A collection of significant studies examines the pervasive issues of
    misinformation, conspiracy theories, and online extremism. Research explores
    disinformation as narratives in hybrid media ecosystems, how individuals
    engage in symbolic boundary work during 'Great Reset' debates, the 'hostile
    misinformation effect' driven by ideological congruence, and the
    connectivity and hybridisation within far-right online networks, including
    analyses of groups like the Proud Boys. Further insights consider media's
    role in disseminating conspiracy beliefs and an expert assessment of
    challenges and interventions in digital media.
  url: https://doi.org/10.1177/14648849241303249
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-06'
  content: >-
    Recent scholarly contributions delve into the dynamics of online public
    discourse and the evolving role of digital platforms. Research highlights
    include exploring temporal dynamics in digital trace data for communication
    research, reflections on the 'death of Twitter' and its implications for
    public debate, and investigations into how political actors, such as
    Brazilian parliamentarians, establish epistemic authority during times of
    crisis.
  url: https://doi.org/10.1080/19312458.2026.2664873
  platforms:
    - Mastodon
    - BlueSky
  toread: true
