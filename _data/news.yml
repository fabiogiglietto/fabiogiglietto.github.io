- date: '2026-06-29'
  content: >-
    A two-decade analysis of troll behavior in Korea revealed insights into
    cross-national information attacks, providing a deeper understanding of
    digital disinformation campaigns and their long-term dynamics.
  url: http://arxiv.org/abs/2606.22785v1
