- date: '2026-07-01'
  content: >-
    New studies investigate public trust, cognitive engagement, and systemic
    attitudes toward artificial intelligence as it integrates into global media.
    Research within this cohort addresses user engagement with AI-assisted
    journalism, multi-level trust frameworks for generative AI, and longitudinal
    analyses of how AI hype is constructed by stakeholders in national
    discourses.
