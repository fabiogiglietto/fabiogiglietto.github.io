- date: '2026-07-18'
  content: >-
    Navigating the complexities of platform-mediated research remains a critical
    challenge for social scientists. Crucial updates in methodology include
    critiques of the politics of API access, practical insights into the
    limitations of working with platform data in restricted clean room
    environments, and the release of new open-source research tools like
    TubeStats and TokStats designed to extract random samples from YouTube and
    TikTok.
  url: https://aoir.social/@fabiogiglietto/116939450343343743
