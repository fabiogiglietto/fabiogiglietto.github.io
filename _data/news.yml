- date: '2026-06-13'
  content: >-
    Curated research examines the complex dynamics of misinformation and
    disinformation online. This includes evaluating echo chambers, rabbit holes,
    and radicalization pathways on YouTube, exploring how algorithms can
    intervene on social norm misperceptions during elections, understanding
    disinformation as narratives, analyzing boundary work in "Great Reset"
    debates, and detailing the hostile misinformation effect.
  url: https://doi.org/10.1080/10584609.2026.2671765
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-06'
  content: >-
    Recent scholarly articles highlight critical challenges and methodologies in
    digital research. Featured topics include exploring temporal dynamics in
    digital trace data, assessing the current state of social media data access
    for research (considering price, proficiency, and permission), and
    addressing the complexities of multi-platform analysis for electoral
    discourse.
  url: https://doi.org/10.1080/19312458.2026.2664873
  platforms:
    - Mastodon
    - BlueSky
  toread: true
