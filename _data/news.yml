- date: '2026-07-08'
  content: >-
    Exploring the intersection of emerging technology and state control, a
    comparative study by Gabrielle D. Beacken, Inga K. Trauthig, and Samuel C.
    Woolley sheds light on how generative AI is utilized for propaganda. The
    research analyzes deployments across six democratically weakened nations to
    map the evolving tactics of digital authoritarianism.
  url: https://aoir.social/@fabiogiglietto/116883181119840106
