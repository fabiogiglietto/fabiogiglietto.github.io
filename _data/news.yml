- date: '2026-07-02'
  content: >-
    As global regulatory frameworks shift, new research evaluates the mechanisms
    and legalities of online content moderation. Key studies investigate how
    decentralized moderation systems like X’s Community Notes may undermoderate
    polarizing content during elections, compare EU and US platform regulations
    through the lens of traffic control, and conceptualize platform collective
    behavior as vital democratic infrastructure under the Digital Services Act
    (DSA).
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-01'
  content: >-
    New cognitive and behavioral research explores the growing influence of
    generative artificial intelligence on public trust and persuasion. Studies
    examine how AI systems can out-persuade human experts, the potential for AI
    dialogues to durably reduce conspiracy beliefs, and a newly proposed
    multi-level framework for mapping how trust in generative AI travels across
    different media layers.
  url: https://doi.org/10.1080/08838151.2026.2694048
  platforms:
    - Mastodon
    - BlueSky
  toread: true
