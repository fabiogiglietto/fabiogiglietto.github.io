- date: '2026-06-28'
  content: >-
    Key research shared focuses on the evolving landscape of digital platforms,
    including regulatory frameworks and user behavior. Noteworthy papers examine
    content moderation policies in the EU and US, cross-country analyses of
    alternative and mainstream media audience overlaps, and evaluations of echo
    chambers and radicalization pathways on platforms like YouTube. The state of
    social media data access for research and factors decoding informativeness
    perceptions among young adults on audio-visual platforms are also critically
    explored.
  url: https://aoir.social/@fabiogiglietto/116826381633799312
