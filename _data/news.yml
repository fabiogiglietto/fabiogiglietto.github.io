- date: '2026-03-18'
  content: >-
    Several new papers address critical issues at the intersection of AI,
    politics, and online behavior. One study examines how recommender systems in
    X (formerly Twitter) can inadvertently profile users' ideological positions.
    Another investigates whether LLMs can infer political alignment from online
    conversations. A third explores whether perceived political bias in LLMs
    reduces their persuasive abilities.
