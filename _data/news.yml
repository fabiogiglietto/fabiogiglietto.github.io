- date: '2026-05-29'
  content: >-
    Recent research on the multifaceted impact of AI and algorithms on society
    has been highlighted. Featured articles explore the political economy of AI,
    the design of algorithms to counter social norm misperceptions in elections,
    the imaginative landscape of AI, and the critical role of social theory in
    understanding multi-agent AI systems. Additionally, analyses of generative
    AI's framing in news media and the economics of AI are presented.
  url: https://aoir.social/@fabiogiglietto/116656334785408405
