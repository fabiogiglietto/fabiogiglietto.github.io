- date: '2026-05-18'
  content: >-
    Academic discussions highlighted by Prof. Giglietto delve into the
    multifaceted impact of Artificial Intelligence and Large Language Models in
    contemporary society. Noteworthy publications examine how social theory can
    serve as a structural prior for agentic AI, the framing of generative AI in
    news media, the influence of state media control on LLM outputs,
    cross-national sociotechnical imaginaries of generative AI, and the
    application of multimodal LLMs for analyzing visual political communication
    on platforms such as Instagram.
