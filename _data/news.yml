- date: '2026-04-04'
  content: >-
    Recent publications highlight the evolving landscape of online information
    ecosystems. This includes explorations into the affective-discursive
    ecologies of the far-right on Instagram, analysis of misinformation spread
    on major European platforms, and investigations into how jihadist supporters
    exploit algorithmic recommendations on TikTok.
