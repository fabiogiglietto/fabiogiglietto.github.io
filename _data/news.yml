- date: '2026-04-27'
  content: >-
    Insights into how Article 40 of the Digital Services Act (DSA) is
    transforming platform research practices are shared in a new publication.
    Jakob Ohme and LK Seiling examine the practical implications of improved
    data access provisions for scholars.
  url: https://doi.org/10.1080/10584609.2026.2664157
  platforms:
