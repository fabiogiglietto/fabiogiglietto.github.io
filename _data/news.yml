- date: '2026-03-22'
  content: >-
    Recent publications address key issues at the intersection of AI, media, and
    society. One study examines the role of platform actors and news media in
    shaping information pathways in online science communication. Another
    investigates the phenomenon of AI hype in journalism, focusing on
    visibility, power, and the politics of media narratives. Finally, research
    explores the potential for large language models to infer political
    alignment from online conversations.
