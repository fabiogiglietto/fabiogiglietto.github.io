- date: '2026-03-22'
  content: >-
    Several new papers on online communication and AI have been highlighted.
    These include studies on information pathways in online science
    communication, dark patterns and the EU Digital Services Act, the failed
    migration of academics from Twitter, representativeness and response
    validity across online samples, and recommender systems on X (formerly
    Twitter) inadvertently profiling user ideologies. Other papers of interest
    include AI hype in journalism, LLMs inferring political alignment,
    connective action and digital repression during China's COVID-19 protests,
    deepfake financial fraud, electoral misinformation in Brazil, and political
    persuasion using conversational AI.
