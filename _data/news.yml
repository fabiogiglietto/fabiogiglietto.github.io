  content: >-
    The alternative influence network (AIN) of far-right YouTubers in Sweden is
    the subject of new research by Tina Askanius et al. The study explores the
    connectivity and hybridisation of online extremism, particularly during the
    COVID-19 pandemic, offering insights into digital radicalization.
