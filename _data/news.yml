- date: '2026-03-06'
  content: >-
    Several new articles on misinformation and related topics were highlighted.
    These include studies on everyday encounters with misinformation online, the
    role of AI-generated disclosure in user credibility on platforms like
    TikTok, and the impact of difficulty in identifying deepfakes on subsequent
    disinformation susceptibility. Also included are papers on fact-checking
    partnerships with platforms and the effects of social media algorithms.
  url: https://aoir.social/@fabiogiglietto/116180996499748212
