- date: '2026-03-06'
  content: >-
    Several studies have focused on the dynamics of misinformation and
    disinformation online. Research explores everyday encounters with
    misinformation, examining sources, topics, and modes of dissemination. Other
    investigations delve into how elected officials share misinformation online,
    considering institutional and ideological factors. Further, a paper analyzes
    how the Serbian SNS party mimics authentic support through coordinated
    inauthentic behavior.
  url: https://aoir.social/@fabiogiglietto/116180996499748212
  platforms:
    - Mastodon
    - BlueSky
- date: '2026-02-18'
  content: >-
    The challenge of detecting and addressing manipulated or misleading content
    is a recurring theme in recent academic literature. One study examines how
    difficulty in identifying deepfakes impacts self-confidence in truth
    discernment. Further research considers what constitutes a 'fact' in the age
    of generative AI, utilizing fact-checking as an epistemological lens.
    Additionally, a paper explores the governance-embedded interactive media
    effect, specifically the role of AI-generated disclosure in user credibility
    and engagement on Chinese TikTok (Douyin).
  url: https://aoir.social/@fabiogiglietto/116090280780555776
  platforms:
