- date: '2026-06-19'
  content: >-
    A new study explores Italian public sentiment regarding AI, analyzing how
    technology-related issues disseminate across social conversations. This
    research, authored by Eliana Fattorini et al., offers insights into
    attitudes towards artificial intelligence in Italy.
  url: https://doi.org/10.1080/1369118x.2026.2689030
  platforms:
