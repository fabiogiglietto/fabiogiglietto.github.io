- date: '2026-04-30'
  content: >-
    Emerging research explores the application of multimodal Large Language
    Models (LLMs) for analyzing visual political communication on Instagram,
    offering new methods for understanding how candidates are perceived at
    scale. This new paper, 'Seeing candidates at scale: Multimodal LLMs for
    Visual Political Communication on Instagram' by Michael Achmann-Denkler,
    Mario Haim, and Christian Wolff, highlights significant advancements in this
    area.
  url: http://arxiv.org/abs/2604.19489v1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-27'
  content: >-
    Recent academic discussions highlight the profound impact of Article 40 of
    the Digital Services Act (DSA) on practical platform research. The paper
    'Finally, access: How article 40 DSA changes platform research in practice'
    by Jakob Ohme and LK Seiling, along with conceptual pieces such as 'Towards
    a Post-Social Media Studies' by Petter Törnberg and Richard Rogers,
    contribute to understanding the evolving landscape and regulatory
    environment of social media platforms.
  url: https://doi.org/10.1080/10584609.2026.2664157
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-23'
  content: >-
    New analyses provide a comprehensive review of 25 years of online
    radicalization research, as detailed in 'Radicalization and the internet: 25
    years of (online) radicalization research' by Sophia Rothut et al. Further
    contributions, like 'Disinformation as cultural narrative' by Alice E.
    Marwick et al., conceptualize disinformation as potent cultural narratives
    that are cross-platform, identity-affirming, and cathartic.
  url: https://doi.org/10.1080/10714421.2026.2658935
  platforms:
    - Mastodon
    - BlueSky
  toread: true
