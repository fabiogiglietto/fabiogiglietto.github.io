- date: '2026-07-15'
  content: >-
    A newly highlighted paper by Celia Ramos, Clara Jiménez-Cruz, and Pablo
    Hernández-Escayola explores the limitations of traditional fact-checking,
    proposing 'narrative monitoring' and 'argument-checking' as more robust
    frameworks to counter sophisticated disinformation campaigns.
  url: https://doi.org/10.37016/mr-2020-198
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-14'
  content: >-
    New methodology tools offer a breakthrough for social media researchers.
    Developed by Kevin Zheng and colleagues, 'TubeStats' and 'TokStats' enable
    academics to generate random, representative samples from YouTube and
    TikTok, addressing a critical bottleneck in platform-mediated public sphere
    research.
  url: https://doi.org/10.17645/mac.12085
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-12'
  content: >-
    Addressing the power of conversational AI, a study by Johannes Kotz et al.
    demonstrates how interactive AI systems can successfully shift beliefs and
    build policy support among skeptics facing highly contested societal issues,
    outlining new dimensions in AI-driven persuasion.
  url: https://doi.org/10.31234/osf.io/7szrn_v1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    Crowdsourced moderation systems are under the microscope in a new study
    published in Science Advances. Researchers Paul Bouchaud and Pedro
    Ramaciotti reveal that X's (formerly Twitter) 'Community Notes' system
    structurally undermoderates highly polarizing content, introducing potential
    integrity risks during critical electoral cycles.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
