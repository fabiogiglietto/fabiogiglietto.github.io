- date: '2026-04-27'
  content: >-
    Recent academic discussions highlight critical perspectives on platform
    regulation, with new research examining how Article 40 of the Digital
    Services Act (DSA) is reshaping platform research practices. Complementary
    analyses also explore the quality of online platform data within the
    framework of the DSA.
  url: https://doi.org/10.1080/10584609.2026.2664157
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-25'
  content: >-
    Several noteworthy publications offer insights into the evolving landscape
    of social media, particularly focusing on the algorithmic transformation of
    platforms like TikTok and the emergence of 'post-social media studies.'
    Topics addressed include the phenomenon of social media as 'parasocial
    media,' the 'platformization of everything' from a critical perspective,
    social dynamics in the 'scam age,' and the exploitation of algorithmic
    recommendations by groups like jihadist supporters on platforms such as
    TikTok. This collection also includes reflections on 'broken connections'
    from the early internet.
  url: https://doi.org/10.1177/14614448241304106
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-23'
  content: >-
    New scholarly works delve into critical issues surrounding online
    misinformation, radicalization, and polarization. Highlights include a
    retrospective on 25 years of online radicalization research, evaluations of
    strategies for depolarization, and analyses of deceptive online networks'
    impact on elections. Further research explores YouTube's influence on
    conspiracy mentality, conceptualizes disinformation as cultural narratives,
    investigates affective-discursive ecologies of the far right on Instagram,
    and provides measurements of misinformation on major European platforms.
  url: https://doi.org/10.1080/10714421.2026.2658935
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-07'
  content: >-
    A systematic literature review provides a comprehensive overview of
    visualizing climate change in the media, addressing current challenges and
    outlining future research directions in this vital area of public
    communication.
  url: https://doi.org/10.1093/anncom/wlag011
  platforms:
    - Mastodon
    - BlueSky
  toread: true
