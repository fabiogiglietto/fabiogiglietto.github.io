- date: '2026-05-19'
  content: >-
    A recent collection of shared papers explores the multifaceted impact of
    Artificial Intelligence and Large Language Models, covering topics from the
    discursive framing of Google's AI Overviews to the influence of state media
    control on LLMs. This curated selection also delves into the application of
    social theory for agentic AI systems, the representation of generative AI in
    news media, and multimodal LLMs in political communication on platforms like
    Instagram.
  url: https://doi.org/10.1177/17504813261447684
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-18'
  content: >-
    Recent academic insights highlight critical research on online extremism,
    misinformation, and conspiracy theories. Featured studies investigate the
    alternative influence networks of far-right YouTubers, the relationship
    between online discourse and offline activities of groups like the Proud
    Boys, and how media contributes to the spread of conspiracy beliefs. The
    collection further includes expert assessments on challenges and
    interventions regarding misinformation in digital media and climate
    psychology perspectives on the topic, alongside analyses of protest
    movements mainstreaming radical ideologies.
  url: https://doi.org/10.2478/nor-2026-0008
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-17'
  content: >-
    A series of shared papers provides timely analysis of social media platform
    dynamics and research methodologies. Topics include examinations of
    Twitter's decline and its impact on public debate, how Brazilian
    parliamentarians establish epistemic authority in crises, and
    micro-influencers' strategies for navigating platform cultures. The curated
    literature also reviews social science studies analyzing social media data,
    discusses how Article 40 DSA influences platform research, and explores
    TikTok's algorithmic transformation of social media publics, moving towards
    a 'Post-Social Media Studies' framework.
  url: https://doi.org/10.5204/mcj.3247
  platforms:
    - Mastodon
    - BlueSky
  toread: true
