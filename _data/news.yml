- date: '2026-07-02'
  content: >-
    Recent academic discussions highlight the evolving landscape of digital
    platforms, focusing on their governance, content moderation strategies, and
    impact on information ecosystems. New research examines topics such as the
    effectiveness of platforms' community notes in moderating polarizing
    content, cross-national information attacks, and the intricate dynamics of
    alternative media within the broader digital news environment. Studies also
    analyze the legislative approaches to platform regulation in the EU and US,
    alongside investigations into phenomena like echo chambers on YouTube and
    challenges in social media data access for researchers.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-01'
  content: >-
    A significant body of new research explores the multifaceted impact of
    Artificial Intelligence on media, information consumption, and public
    perception. Studies delve into how AI-generated and AI-assisted news
    influences quality perceptions and engagement, the development of frameworks
    for understanding trust in generative AI, and the broader societal attitudes
    towards AI. Other investigations demonstrate AI systems' capacity to
    out-persuade humans, their potential in reducing conspiracy beliefs through
    dialogues, and the ability of AI coding agents to reproduce social science
    findings.
  url: https://doi.org/10.1038/s41598-026-58743-0
  platforms:
    - Mastodon
    - BlueSky
  toread: true
