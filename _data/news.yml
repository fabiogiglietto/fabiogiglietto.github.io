- date: '2026-05-18'
  content: >-
    Several recent studies shared investigate online extremism and
    radicalization. Research focuses on the alternative influence networks of
    far-right YouTubers, the interplay between online discourse and offline
    activities of groups such as the Proud Boys, and how protest movements can
    contribute to the mainstreaming of radical ideologies, particularly
    exemplified by COVID-19 protests.
