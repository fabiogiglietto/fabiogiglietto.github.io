- date: '2026-06-29'
  content: >-
    The latest curated academic papers, shared by Professor Giglietto, delve
    into critical issues concerning digital platforms, information flows, and
    regulation. Key topics include analyses of cross-national information
    attacks and troll behavior, the integration of alternative media within
    digital news ecosystems, and the evolving landscape of content moderation
    and platform regulation. Further insights cover how young adults perceive
    informativeness on digital platforms, the dynamics of echo chambers and
    radicalization on YouTube, and the characteristics of disinformation
    narratives in hybrid media environments.
