- date: '2026-07-18'
  content: >-
    Methodological hurdles in platform governance research are the focus of a
    new paper by Axel Bruns and Laura Vodden. The study details the practical
    and analytical challenges academics encounter when working with platform
    data restricted to secure, clean room environments.
