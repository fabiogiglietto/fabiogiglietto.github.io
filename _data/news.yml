- date: '2026-07-04'
  content: >-
    Current academic discourse critically examines the complexities of
    disinformation, digital platform behavior, and content regulation. Recent
    literature addresses the strategic deployment of fake news, the
    effectiveness of moderation tools like Community Notes in electoral
    contexts, and the broader implications of platform collective behavior
    within regulatory frameworks such as the DSA. Studies also investigate
    cross-national information attacks and the role of alternative media.
  url: https://doi.org/10.1177/02673231261458935
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    A range of recent academic papers highlight the pervasive influence of
    Artificial Intelligence across society and media. Topics explored include
    AI's role in automating scientific review processes, shaping public
    perception of news, and fostering trust in generative AI, alongside analyses
    of AI's persuasive capabilities and public attitudes towards the technology.
  url: http://arxiv.org/abs/2606.28277v1
