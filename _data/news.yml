- date: '2026-05-29'
  content: >-
    A recent publication titled 'Redesigning algorithms to intervene on social
    norm misperceptions during a national election' by William J. Brady et al.
    explores the potential of algorithmic interventions to address
    misperceptions of social norms, particularly in the context of national
    elections.
