- date: '2026-06-01'
  content: >-
    Insights into platform data access for election research are provided in a
    recent paper by Josephine Lukito and Kayo Mimizuka. The study, 'Price,
    proficiency, or permission,' critically assesses the factors influencing
    researchers' ability to utilize platform data for electoral analysis.
  url: https://doi.org/10.1080/1369118x.2026.2667921
