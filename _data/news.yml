- date: '2026-07-14'
  content: >-
    Recent research highlights a shifting landscape in public persuasion and
    trust as generative AI systems increasingly match or exceed human
    capabilities. A series of newly highlighted studies explore how
    conversational AI alters beliefs on contested societal issues, how users
    perceive the quality of AI-generated news, and the broader implications of
    these technologies for digital public squares.
  url: https://doi.org/10.1177/26339137261459441
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    The efficacy of content moderation and platform regulation remains a central
    debate in digital democracy. Recent literature examines platform collective
    behavior under the EU’s Digital Services Act (DSA), analyzes Western
    legislative frameworks as forms of traffic control, and warns of risks in
    crowd-sourced moderation systems like Community Notes during electoral
    processes.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-12'
  content: >-
    Scholars are offering new insights into how media narratives, partisan
    slants, and state-sponsored propaganda drive domestic and international
    polarization. New studies analyze these dynamics across various contexts,
    including strategic 'fake news' labeling in Italian newspapers, state media
    tactics in the Russo-Ukrainian war, and the methodological challenges of
    measuring polarization in the United States.
  url: https://doi.org/10.1080/10584609.2026.2699105
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-14'
  content: >-
    Methodological innovations are expanding the toolkit for platform
    researchers. A newly highlighted paper introduces TubeStats and TokStats,
    tools designed to help academics extract and analyze random samples from
    YouTube and TikTok, addressing long-standing data access challenges on
    video-centric platforms.
  url: https://doi.org/10.17645/mac.12085
  platforms:
    - Mastodon
    - BlueSky
  toread: true
