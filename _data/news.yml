- date: '2026-03-05'
  content: >-
    The impact of perceived political bias in Large Language Models (LLMs) on
    their persuasive abilities is explored in a newly shared paper. Other
    research investigates how Serbia's SNS party mimics authentic support
    through coordinated inauthentic behavior.
