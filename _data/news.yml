- date: '2026-07-14'
  content: >-
    The evolution of generative artificial intelligence continues to redefine
    public discourse and media trust. New scholarship examines how AI shapes
    digital public squares, shifts beliefs among skeptics on contested issues,
    and influences audience engagement with AI-assisted news platforms.
  url: https://doi.org/10.1177/26339137261459441
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-14'
  content: >-
    A new wave of methodological studies addresses critical hurdles in digital
    platform research and governance. Key publications introduce specialized
    sampling tools for platforms like TikTok and YouTube, analyze API access
    politics, and critically evaluate content moderation as a form of traffic
    control under EU and US regulatory frameworks.
  url: https://doi.org/10.1177/20539517261461463
  platforms:
    - Mastodon
    - BlueSky
