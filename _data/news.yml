- date: '2026-07-04'
  content: >-
    Analyzing the European media landscape, a newly published study by Lorenzo
    Mosca and Fred Paxton investigates how Italian newspapers employ the concept
    of 'fake news' as a rhetorical weapon. The authors document how the term is
    strategically used for delegitimization and selective political
    amplification.
