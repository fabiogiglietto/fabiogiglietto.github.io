- date: '2026-05-17'
  content: >-
    Recent academic insights into the evolving landscape of social media
    platforms are being shared. Noteworthy discussions include the decline of
    platforms like Twitter and its implications for public debate, the
    algorithmic transformation observed on TikTok, the broader 'platformization
    of everything,' and explorations towards a post-social media studies
    framework. The role of micro-influencers and challenges like the 'scam age'
    in social media are also featured.
  url: https://doi.org/10.5204/mcj.3247
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-17'
  content: >-
    A collection of significant research on misinformation, conspiracy theories,
    and radicalization within digital environments has been highlighted. This
    includes investigations into groups like the Proud Boys' online activities,
    the media's influence on the spread of COVID-19 conspiracy beliefs,
    international expert assessments of digital misinformation challenges,
    insights from climate psychology regarding false information, and analyses
    of protest movements leading to the mainstreaming of extremist ideologies.
  url: https://doi.org/10.1017/s0003055423001478
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-15'
  content: >-
    Recent academic explorations into the impact of Artificial Intelligence and
    Large Language Models (LLMs) on media and political communication are being
    spotlighted. Featured studies examine the portrayal of generative AI and
    LLMs in news media, the influence of state media control on LLM outputs,
    cross-national mappings of generative AI imaginaries in newspapers, and the
    application of multimodal LLMs for analyzing visual political communication
    on platforms like Instagram.
  url: https://doi.org/10.1007/s00146-026-03070-1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-17'
  content: >-
    Key publications addressing advancements in social science methodologies and
    the regulatory aspects of digital platforms are being shared. These include
    a comprehensive systematic review of social science studies utilizing social
    media data, discussions on the practical implications of Article 40 of the
    Digital Services Act (DSA) for platform research, and investigations into
    how parliamentarians assert epistemic authority and control narratives
    during times of crisis.
  url: https://doi.org/10.1080/21670811.2026.2669534
  platforms:
    - Mastodon
    - BlueSky
  toread: true
