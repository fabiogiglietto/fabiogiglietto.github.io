- date: '2026-05-18'
  content: >-
    A collection of significant studies has been highlighted, delving into the
    dynamics of online extremism, misinformation, and radicalization. Featured
    research includes an examination of the alternative influence network of
    far-right YouTubers in Sweden, the relationship between groups like the
    Proud Boys' online discourse and offline activities, and how media
    contributes to the dissemination of conspiracy beliefs. Other papers offer
    an international expert assessment of misinformation challenges and provide
    insights from climate psychology for its study, alongside analyses of
    protest movements mainstreaming radical ideologies and 25 years of online
    radicalization research.
  url: https://aoir.social/@fabiogiglietto/116594462275492068
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-17'
  content: >-
    The changing landscape of digital media and platform research is a key area
    of focus in recent academic discussions. Highlighted papers address critical
    topics such as the perceived 'death of Twitter' and its implications for
    public debate, a comprehensive systematic review of social science studies
    analyzing social media data from 2010-2024, and the transformative impact of
    Article 40 of the Digital Services Act (DSA) on platform research practices.
    Further insights are offered on TikTok's algorithmic transformation of
    social media publics and the emerging field of 'Post-Social Media Studies'.
  url: https://aoir.social/@fabiogiglietto/116591218264010991
