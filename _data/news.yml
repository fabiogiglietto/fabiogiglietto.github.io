- date: '2026-05-27'
  content: >-
    Recent scholarship brought attention to the societal and political economy
    dimensions of Artificial Intelligence. Highlighted papers investigate the
    "quiet futuring" within Silicon Valley's imaginative landscape of AI, the
    economics of AI based on public sentiment, and the pursuit of accountability
    in the political economy of AI. Further research includes a discourse
    analysis of Google’s AI Overviews, exploring how search is being framed, and
    a theoretical framework proposing social theory as a structural prior for
    agentic AI.
  url: https://aoir.social/@fabiogiglietto/116648313314249923
