- date: '2026-05-26'
  content: >-
    Recent scholarship highlighted examines the complexities of electoral
    discourse on social media platforms, identifying it as a critical research
    infrastructure challenge. Other featured studies explore the changing
    landscape of online public debate, including the reported decline of
    platforms like Twitter, and how political actors, such as Brazilian
    parliamentarians, navigate and pursue epistemic authority in times of
    crisis.
  url: https://doi.org/10.1145/3795513.3807440
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-21'
  content: >-
    A collection of recent papers underscores ongoing academic scrutiny into the
    mechanisms and impact of misinformation, conspiracy theories, and online
    extremism. These studies delve into how individuals engage in symbolic
    boundary work within 'Great Reset' debates, the influence of ideological
    congruence on misinformation assessment, the role of media in disseminating
    conspiracy beliefs during the COVID-19 pandemic, and the dynamics of
    far-right alternative influence networks on platforms like YouTube.
  url: https://doi.org/10.1177/14614448261446590
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-20'
  content: >-
    Several recent publications focus on the societal implications of Artificial
    Intelligence and Large Language Models. Featured research investigates the
    economics of AI based on extensive surveys, analyzes the framing of
    generative AI in news media and Google's AI Overviews, explores the
    influence of state media control on LLMs, and proposes formal frameworks for
    integrating social theory into agentic AI systems.
  url: >-
    https://scholar.google.com/scholar?q=What%2081%2C000%20people%20told%20us%20about%20the%20economics%20of%20AI
  platforms:
    - Mastodon
    - BlueSky
  toread: true
