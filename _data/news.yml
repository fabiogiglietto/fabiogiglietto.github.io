- date: '2026-05-15'
  content: >-
    The intersection of Artificial Intelligence, large language models (LLMs),
    and media/politics is a prominent area of recent academic interest. Shared
    studies address how generative AI is framed in news media, the influence of
    state media control on LLMs, and mapping the sociotechnical imaginaries of
    AI in global newspapers. Research on utilizing multimodal LLMs for analyzing
    visual political communication on platforms like Instagram also drew
    attention.
  url: https://aoir.social/@fabiogiglietto/116577063374814418
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-09'
  content: >-
    Crucial developments in platform research and data access have been
    highlighted. A systematic review of social science studies analyzing social
    media data from 2010-2024 was noted, alongside discussions on how Article 40
    of the Digital Services Act (DSA) is transforming practical access for
    platform research.
