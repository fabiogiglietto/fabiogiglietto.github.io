- date: '2026-06-01'
  content: >-
    A series of recent publications delves into various facets of
    disinformation, misinformation, and conspiracy theories. Topics covered
    include understanding disinformation narratives within hybrid media
    ecosystems, exploring algorithmic interventions to correct social norm
    misperceptions during elections, analyzing symbolic boundary work in 'Great
    Reset' debates, investigating the 'hostile misinformation effect' and
    ideological congruence, examining media's role in spreading conspiracy
    beliefs during the COVID-19 pandemic, and presenting an international expert
    assessment on challenges, trends, and interventions in digital
    misinformation. Additionally, insights from climate psychology are applied
    to the study of misinformation.
  url: https://aoir.social/@fabiogiglietto/116673911616599932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-27'
  content: >-
    New academic insights critically examine the political economy and societal
    implications of Artificial Intelligence. Featured research includes
    discussions on accountability in AI's political economy, exploring the
    'imaginative landscape' of AI and Silicon Valley's 'quiet futuring,' public
    perceptions of AI economics, a discourse analysis of Google’s AI Overviews,
    proposals for incorporating social theory as a structural prior for agentic
    AI, and an analysis of how generative AI and large language models are
    framed in news media.
  url: https://aoir.social/@fabiogiglietto/116648313314249923
  platforms:
    - Mastodon
    - BlueSky
