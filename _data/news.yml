- date: '2026-05-27'
  content: >-
    A collection of recent research explores the diverse dimensions of
    Artificial Intelligence, including its political economy, imaginative
    landscapes, and economic impacts. These highlighted papers delve into the
    framing of AI in news media, its susceptibility to state media control, and
    the integration of social theory into frameworks for agentic AI systems,
    bringing crucial discussions to the forefront of AI's societal implications.
  url: http://arxiv.org/abs/2604.16106v2
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-29'
  content: >-
    Key scholarly articles have been highlighted, addressing the complex
    dynamics of misinformation and conspiracy theories. Featured research
    includes studies on algorithmic interventions to correct social norm
    misperceptions during elections, how individuals engage with 'Great Reset'
    conspiracy theories across platforms, the 'hostile misinformation effect'
    driven by ideological congruence, and media's role in disseminating
    conspiracy beliefs, alongside expert assessments and climate psychology
    insights into misinformation.
  url: https://doi.org/10.1038/s41586-026-10536-1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-26'
  content: >-
    Recent analyses shed light on the evolving landscape of social media, from
    multi-platform studies of electoral discourse to examinations of online
    extremism, such as the alternative influence network of far-right YouTubers
    and the discourse of groups like the Proud Boys. These papers also consider
    how platform changes impact public debate, how political actors pursue
    epistemic authority, how micro-influencers operate within platform cultures,
    and include a systematic review of social science studies analyzing social
    media data.
  url: https://doi.org/10.1145/3795513.3807440
  platforms:
    - Mastodon
    - BlueSky
  toread: true
