- date: '2026-05-31'
  content: >-
    A selection of recent research delves into the complexities of
    misinformation, disinformation, and the dynamics of online public
    deliberation. Highlighted studies analyze disinformation narratives in
    hybrid media ecosystems, the 'hostile misinformation effect' driven by
    ideological congruence, and how individuals perform symbolic boundary work
    in 'Great Reset' conspiracy debates across platforms. Further contributions
    assess media's role in disseminating conspiracy beliefs and offer an
    international expert assessment of interventions against digital media
    misinformation.
  url: https://aoir.social/@fabiogiglietto/116670726588688843
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-06'
  content: >-
    The evolving landscape of social media platforms and their impact on
    political communication and data access remains a prominent area of
    research. Recent papers explore temporal dynamics in digital trace data, the
    challenges and implications of social media data access for election
    research, and the difficulties of multi-platform analysis of electoral
    discourse. Discussions also touch upon the potential decline of public
    debate online following changes to major platforms and how political actors
    strive for epistemic authority during crises.
  url: https://aoir.social/@fabiogiglietto/116702871922444303
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-18'
  content: >-
    Research spotlighted focuses on online extremism and the architecture of
    far-right networks. Investigations cover the connectivity and hybridization
    within the alternative influence network (AIN) of far-right YouTubers during
    events like the Covid-19 pandemic. Other studies examine the intricate
    relationship between the online discourse and offline activities of groups
    such as the Proud Boys, shedding light on how these dynamics contribute to
    their operations.
  url: https://aoir.social/@fabiogiglietto/116594462275492068
