- date: '2026-07-08'
  content: >-
    Recent research highlights how generative AI is reshaping human persuasion,
    trust, and public discourse. Newly published studies demonstrate that AI
    systems can out-persuade human experts and durably reduce conspiracy beliefs
    through targeted dialogue, while comparative frameworks analyze how public
    trust and quality perceptions of AI-assisted news vary across different
    democratic contexts.
  url: https://doi.org/10.1177/20539517251410064
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    Crucial questions about digital governance and algorithm design are raised
    in a series of studies analyzing platform moderation. Researchers critique
    the limitations of crowd-sourced moderation—showing that systems like X's
    Community Notes may undermoderate polarizing content during elections by
    design—and explore how legislative frameworks like the EU's Digital Services
    Act (DSA) redefine platforms as democratic infrastructure.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-08'
  content: >-
    Fresh insights into state-sponsored influence operations reveal the evolving
    strategies of digital propaganda and election interference. Analytical
    papers investigate how media narratives surrounding foreign interference
    shape public polarization, the strategic dual-targeting of state propaganda
    in the Russo-Ukrainian war, and the long-term patterns of state-backed
    trolling across borders.
  url: https://doi.org/10.1177/14614448251410509
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-04'
  content: >-
    An empirical study examines the weaponization of disinformation narratives
    in Southern European media. Focusing on the Italian press, the research
    analyzes how the term 'fake news' is strategically deployed by mainstream
    newspapers as a rhetorical tool to delegitimize political opponents and
    selectively amplify partisan agendas.
  url: https://doi.org/10.1177/02673231261458935
  platforms:
    - Mastodon
    - BlueSky
  toread: true
