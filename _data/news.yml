- date: '2026-07-01'
  content: >-
    Recent scholarly discussions curated by Prof. Giglietto highlight critical
    research into public perception and trust in Artificial Intelligence. This
    includes analyses of generative AI's trustworthiness, comprehensive surveys
    on American and Italian attitudes toward AI, and insights into how AI issues
    traverse social conversations. Other featured studies delve into the
    persuasive capabilities of AI systems, efforts to reduce conspiracy beliefs
    through AI dialogues, and longitudinal analyses of the stakeholders shaping
    AI discourse.
