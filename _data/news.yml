- date: '2026-07-02'
  content: >-
    A collection of recent academic papers highlighted a broad spectrum of
    research on Artificial Intelligence. Topics explored include the automation
    of scientific review processes, public perceptions and trust in generative
    AI and AI-assisted news, the persuasive capabilities of AI systems, and
    strategies for reducing conspiracy beliefs through AI dialogues. Further
    studies examined Italians' attitudes towards AI and the longitudinal
    analysis of stakeholders driving the AI discourse.
  url: http://arxiv.org/abs/2606.28277v1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    Recent academic discussions have centered on platform governance, focusing
    on how content moderation practices, such as "Community Notes," might
    inadvertently create risks in electoral processes by undermoderating
    polarizing content. Other research delved into platform collective behavior
    as a democratic infrastructure, the analysis of EU and US legislation on
    platform regulation, and the evaluation of echo chambers, rabbit holes, and
    radicalization pathways on platforms like YouTube.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-28'
  content: >-
    New studies in digital media explore the landscape of alternative media
    within the broader news ecosystem, examining cross-country comparative
    audience overlap networks. Additional research investigates what young
    adults deem informative across audio-visual digital platforms and introduces
    methodologies for exploring temporal dynamics and mining user-sequences in
    digital trace data for communication research.
  url: https://doi.org/10.1080/21670811.2026.2683342
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-03'
  content: >-
    A recent paper addresses critical questions in survey research, specifically
    "Where's the Evidence that Respondents Understand Your Survey Questions?" by
    Hinck, Musashi et al., emphasizing the importance of robust methodological
    approaches to ensure data validity.
  url: >-
    https://scholar.google.com/scholar?q=Where%27s%20the%20Evidence%20that%20Respondents%20Understand%20Your%20Survey%20Questions%3F
