- date: '2026-07-08'
  content: >-
    Recent academic discussions underscore the multifaceted impact of Artificial
    Intelligence on society, particularly concerning its role in propaganda and
    digital authoritarianism. Studies explore how generative AI influences
    public trust, perceptions of news quality, and even its persuasive
    capabilities compared to human experts. Further insights shed light on
    evolving public attitudes towards AI, including efforts to reduce conspiracy
    beliefs through AI-driven dialogues, and an analysis of stakeholders driving
    the AI hype.
  url: https://doi.org/10.1177/20539517251410064
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-08'
  content: >-
    New scholarship investigates critical aspects of media polarization,
    election interference, and the spread of misinformation in contemporary
    digital landscapes. Key studies examine the impact of media narratives on
    political polarization during elections, the dual objectives of state media
    propaganda in conflicts like the Russo-Ukrainian war, and the strategic use
    of fake news as a rhetorical weapon in national contexts. Additionally,
    research highlights risks in electoral processes due to potential
    undermoderation of polarizing content by platforms like Community Notes,
    alongside a two-decade analysis of cross-national troll behavior.
  url: https://doi.org/10.1177/14614448251410509
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-01'
  content: >-
    Recent analyses address crucial aspects of platform governance and their
    role within democratic media ecosystems. Research examines platform
    collective behavior as a form of democratic infrastructure, moving beyond
    mere causal effects in the Digital Services Act (DSA) era. Further studies
    analyze content moderation as 'traffic control,' comparing EU and US
    legislative approaches to platform regulation, and investigate how
    alternative media integrates into the broader digital news ecosystem through
    audience overlap networks.
  url: https://doi.org/10.1080/10584609.2026.2679475
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-03'
  content: >-
    Insights are shared on advancements and challenges in research methodology
    and scientific processes. Featured work addresses the fundamental question
    of whether survey respondents truly understand the questions posed to them,
    a critical concern for data validity. Additionally, an exploration into
    automating scientific review via tools like Google's Paper Assistant Tool
    indicates emerging trends in enhancing research efficiency.
  url: >-
    https://scholar.google.com/scholar?q=Where%27s%20the%20Evidence%20that%20Respondents%20Understand%20Your%20Survey%20Questions%3F
  platforms:
    - Mastodon
    - BlueSky
  toread: true
