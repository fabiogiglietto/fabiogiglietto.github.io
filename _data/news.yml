- date: '2026-07-01'
  content: >-
    A collection of recent academic papers shared explores the complex interplay
    of AI with societal structures and public perception. Topics included
    frameworks for understanding trust in generative AI, Americans' attitudes
    towards chatbots and smart devices, and the persuasive capabilities of AI
    systems. Further research examined the role of AI in media cognition, public
    attitudes in Italy, the dynamics of AI hype, and the potential for AI coding
    agents to reproduce social science findings, as well as its application in
    reducing conspiracy beliefs.
