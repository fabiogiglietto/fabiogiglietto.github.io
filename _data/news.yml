- date: '2026-06-28'
  content: >-
    A recent academic paper provides an in-depth look into content moderation
    practices, framing them as a form of traffic control. The analysis, authored
    by Valentine Crosset, Tommaso Venturini, and Benoît Dupont, examines EU and
    US legislation on platform regulation.
  url: https://doi.org/10.1080/21624887.2026.2692735
  platforms:
