- date: '2026-05-27'
  content: >-
    A collection of recent studies delves into the societal and economic
    implications of Artificial Intelligence. Key topics include reckoning with
    the political economy of AI and accountability, exploring the 'imaginative
    landscape' and 'quiet futuring' of AI in Silicon Valley, and examining the
    economic impact of AI as surveyed among a large population. Research also
    covers the framing of Google’s AI Overviews in discourse analysis, the
    integration of social theory into multi-Agent Social Systems, and the
    media's portrayal of generative AI and large language models.
  url: https://aoir.social/@fabiogiglietto/116648313314249923
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-31'
  content: >-
    New analyses explore the complex dynamics of disinformation, conspiracy
    theories, and online extremism. Publications address understanding
    disinformation as narratives in hybrid media ecosystems, redesigning
    algorithms to intervene on social norm misperceptions during elections, and
    how individuals engage in symbolic boundary work within conspiracy theory
    debates (e.g., 'The Great Reset'). Further research investigates the hostile
    misinformation effect driven by ideological congruence, the alternative
    influence network of far-right YouTubers, and the relationship between
    extremist online discourse and offline activities. Other studies shed light
    on how media contribute to conspiracy belief dissemination and provide an
    international expert assessment of challenges and interventions in digital
    misinformation.
  url: https://aoir.social/@fabiogiglietto/116670726588688843
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-17'
  content: >-
    Academic commentary addresses the significant transformations in online
    public debate. A recent paper examines the 'death of Twitter' and its
    implications for the decline of public discourse online, reflecting on the
    changing landscape of social media platforms and their impact on civic
    engagement.
  url: https://aoir.social/@fabiogiglietto/116591218264010991
