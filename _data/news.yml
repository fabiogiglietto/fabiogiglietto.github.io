- date: '2026-05-27'
  content: >-
    The academic community is actively exploring the multifaceted societal
    implications of Artificial Intelligence and Large Language Models.
    Discussions include the political economy of AI accountability,
    understanding Silicon Valley’s 'quiet futuring' of AI, and analyzing how
    generative AI is framed in news media. Furthermore, researchers advocate for
    social theory as a structural prior for agentic AI, providing formal
    frameworks for multi-agent social systems, and new data reveals public
    perceptions on the economics of AI.
  url: https://aoir.social/@fabiogiglietto/116648313314249923
  platforms:
