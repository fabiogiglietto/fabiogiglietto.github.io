- date: '2026-04-30'
  content: >-
    A selection of recent scholarship curated by Prof. Giglietto delves into the
    intricate landscape of digital political communication and disinformation.
    Highlighted papers examine the use of multimodal LLMs in visual political
    communication on Instagram, the practical implications of Article 40 of the
    Digital Services Act for platform research, and the dynamics of online
    radicalization over 25 years. Further insights include evaluations of
    recommendations for depolarization, analysis of deceptive online networks in
    US elections, the influence of YouTube on conspiracy mentalities, and
    conceptualizations of disinformation as cultural narratives. The collection
    also features research on the quality of online platform data and
    affective-discursive ecologies of the far right on Instagram.
  url: http://arxiv.org/abs/2604.19489v1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-25'
  content: >-
    Prof. Giglietto has shared several academic works exploring the evolving
    nature and challenges of social media platforms. These include analyses of
    TikTok's algorithmic transformation from social networks to social interest
    clusters and theoretical discussions proposing a 'Post-Social Media
    Studies.' Additional research investigates the phenomenon of social media in
    the 'scam age,' the widespread 'platformization' of various aspects of life,
    and the shift towards social media becoming 'parasocial media.' Critiques of
    the contemporary digital landscape, like 'Broken connections: Fieldnotes
    from the old internet,' are also featured.
  url: https://doi.org/10.1177/14614448241304106
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-07'
  content: >-
    Among recent academic interests, Prof. Giglietto highlighted a systematic
    literature review on visualizing climate change in the media. This
    comprehensive paper discusses current challenges and outlines future
    research directions critical for understanding how climate change is
    communicated and perceived.
  url: https://doi.org/10.1093/anncom/wlag011
  platforms:
    - Mastodon
    - BlueSky
  toread: true
