- date: '2026-05-19'
  content: >-
    Recent academic discourse highlights the multifaceted impact of Artificial
    Intelligence and Large Language Models across digital communication.
    Featured studies explore how AI Overviews are framing the future of search,
    advocate for social theory as a structural prior for agentic AI, and analyze
    the agentic framing of generative AI and LLMs in news media. Further
    research examines the influence of state media control on LLMs, maps the
    sociotechnical imaginaries of generative AI across global newspapers, and
    investigates the use of multimodal LLMs in visual political communication on
    Instagram.
  url: https://doi.org/10.1177/17504813261447684
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-18'
  content: >-
    A collection of significant papers delves into the dynamics of
    misinformation, conspiracy theories, and the spread of extremist ideologies
    online. Topics include the alternative influence networks of far-right
    YouTubers and the hybridisation of online extremism during the Covid-19
    pandemic, the relationship between groups like the Proud Boys' online
    discourse and offline activities, and how media contributes to the
    dissemination of conspiracy beliefs. Additional research provides an
    international expert assessment of challenges and interventions related to
    digital media misinformation and conspiracy theories, offers climate
    psychology insights for studying misinformation, and analyzes the
    mainstreaming of radical ideologies through protest movements, particularly
    concerning COVID-19.
  url: https://doi.org/10.2478/nor-2026-0008
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-17'
  content: >-
    The evolving landscape of social media platforms and digital research is the
    focus of several recent studies. Key papers analyze the 'death of Twitter'
    and its implications for public debate, how Brazilian parliamentarians
    establish epistemic authority in crises, and survival strategies for
    micro-influencers amidst platform culture demands. Methodological insights
    are provided through a systematic review of social science studies analyzing
    social media data. Furthermore, new research explores the practical changes
    to platform research brought by Article 40 of the Digital Services Act
    (DSA), the algorithmic transformation of social media publics by platforms
    like TikTok, and theoretical perspectives 'Towards a Post-Social Media
    Studies.'
  url: https://doi.org/10.5204/mcj.3247
  platforms:
    - Mastodon
    - BlueSky
  toread: true
