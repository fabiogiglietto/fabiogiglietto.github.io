- date: '2026-07-02'
  content: >-
    The effectiveness of social media platform governance and the Digital
    Services Act (DSA) framework is under active academic scrutiny. New analyses
    evaluate how crowdsourced moderation systems, such as X's Community Notes,
    may inadvertently undermoderate polarizing content, alongside comparative
    studies viewing content moderation through the lens of 'traffic control'
    across the US and EU.
