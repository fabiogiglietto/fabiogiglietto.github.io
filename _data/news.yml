  content: >-
    A significant paper by Claes H. de Vreese and Rebekah Tromble addresses the
    evolving landscape of social media data access for research. Titled 'Moving
    targets, moving politics: The state of play in social media data access,'
    the publication highlights critical challenges and policy considerations.
  url: https://doi.org/10.1080/10584609.2026.2681041
