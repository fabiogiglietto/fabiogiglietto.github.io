- date: '2026-05-31'
  content: >-
    A collection of studies addressing the pervasive issues of misinformation
    and conspiracy theories in digital media has been recommended. Topics
    include understanding disinformation as narratives in hybrid media, the
    "hostile misinformation effect" driven by ideological congruence, and how
    individuals engage in symbolic boundary work around topics like the "Great
    Reset." The selection also incorporates an international expert assessment
    of current challenges and interventions in this field.
  url: https://aoir.social/@fabiogiglietto/116670726588688843
