- date: '2026-05-05'
  content: >-
    Recent academic discussions highlight the rapidly changing landscape of
    social media, with new research exploring the societal imaginaries
    surrounding generative AI and its applications in visual political
    communication. Other significant contributions delve into the practical
    implications of Article 40 DSA for platform research, the algorithmic
    transformation of platforms like TikTok, and broader shifts towards
    'post-social media studies' and the 'platformization of everything.' The
    role of social media in fostering parasocial interactions and facilitating
    online scams is also under scrutiny, alongside reflections on 'broken
    connections' from earlier internet eras.
  url: https://aoir.social/@fabiogiglietto/116523152520043761
