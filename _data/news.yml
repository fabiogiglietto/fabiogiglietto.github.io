- date: '2026-05-26'
  content: >-
    Recommended academic research delves into various aspects of social media
    dynamics and platform studies. Key areas covered include the challenges of
    multi-platform analysis for electoral discourse, discussions surrounding the
    evolution of platforms like Twitter and its impact on public debate, the
    pursuit of epistemic authority by parliamentarians in times of crisis,
    strategies employed by micro-influencers, and a comprehensive systematic
    review of social science studies using social media data from 2010-2024.
  url: https://aoir.social/@fabiogiglietto/116642061044802188
