  toread: true
- date: '2026-05-18'
  content: >-
    Analyses in contemporary academic literature shed light on crucial aspects
    of social media dynamics and political communication. Featured studies
    include an examination of the alternative influence network of far-right
    YouTubers in Sweden, exploring connectivity and hybridisation of online
    extremism during the Covid-19 pandemic. Other notable works analyze the
    'death of Twitter' and its implications for public debate, investigate how
    Brazilian parliamentarians pursue epistemic authority, and uncover
    strategies micro-influencers use to thrive amidst platform culture demands.
    This collection also includes a systematic review of social science studies
    analyzing social media data from 2010 to 2024.
  url: https://doi.org/10.2478/nor-2026-0008
  platforms:
    - Mastodon
    - BlueSky
  toread: true
