- date: '2026-06-01'
  content: >-
    Recommended reading on the intersection of election research and digital
    platforms, highlighting new studies on platform data access for election
    analysis, the redesign of algorithms to address social norm misperceptions
    during elections, and challenges in multi-platform analysis of electoral
    discourse on social media.
  url: https://doi.org/10.1080/1369118x.2026.2667921
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-31'
  content: >-
    A collection of suggested articles exploring the complex landscape of
    disinformation, misinformation, and conspiracy theories. Topics include
    understanding disinformation as narratives in hybrid media ecosystems, how
    individuals engage in symbolic boundary work around movements like the
    "Great Reset," the impact of ideological congruence on misinformation
    assessment, media's role in disseminating conspiracy beliefs, and an
    international expert assessment of challenges and interventions in digital
    media.
  url: https://doi.org/10.1177/14648849241303249
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-27'
  content: >-
    Insights into the political economy and societal implications of artificial
    intelligence and large language models are offered through a series of
    recommended readings. These cover critical examinations of AI
    accountability, the "imaginative landscape" of AI in Silicon Valley, the
    economics of AI based on public sentiment, discourse analysis of Google's AI
    Overviews, the role of social theory for agentic AI, framing of generative
    AI in news media, and how state media control influences LLMs.
  url: http://arxiv.org/abs/2604.16106v2
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-18'
  content: >-
    Recent academic papers recommended for their contributions to understanding
    online extremism and evolving social media dynamics. Featured studies
    include an analysis of the alternative influence network of far-right
    YouTubers in Sweden, the relationship between the Proud Boys’ online
    discourse and offline activities, an examination of the decline of public
    debate following changes at Twitter, and how Brazilian parliamentarians
    establish epistemic authority during crises.
  url: https://doi.org/10.2478/nor-2026-0008
  platforms:
    - Mastodon
    - BlueSky
  toread: true
