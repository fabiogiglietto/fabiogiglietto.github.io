- date: '2026-06-15'
  content: >-
    Important developments in social science methodology are highlighted,
    including research demonstrating how AI coding agents can reproduce social
    science findings. Additionally, studies exploring temporal dynamics in
    digital trace data, such as mining user-sequences for communication
    research, are presented, offering new tools and perspectives for digital
    scholarship.
