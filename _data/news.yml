  content: >-
    A formal framework for multi-Agent Social Systems proposes that social
    theory should be a structural prior for agentic AI. This paper, led by
    Lynnette Hui Xian Ng et al., advocates for integrating robust social
    theoretical foundations into the development of AI.
  url: https://arxiv.org/abs/2605.07069
