- date: '2026-06-06'
  content: >-
    Several studies examine key aspects of social media research, focusing on
    the challenges of data access, its implications for election studies, and
    broader discussions on platform politics. Featured papers delve into
    exploring temporal dynamics in digital trace data, mining user-sequences for
    communication research, and assessing the state of play in social media data
    access. Other analyses cover the multi-platform analysis of electoral
    discourse as a research infrastructure problem, how Brazilian
    parliamentarians pursue epistemic authority in times of crisis, and
    reflections on the decline of public debate online following the evolution
    of platforms like Twitter.
  url: https://aoir.social/@fabiogiglietto/116702871922444303
