- date: '2026-07-14'
  content: >-
    To address the persistent difficulty of extracting representative data from
    black-box video platforms, a research team has developed TubeStats and
    TokStats. These open-source tools facilitate the generation of random,
    systematic samples from YouTube and TikTok, offering a significant boon for
    digital media researchers.
  url: https://aoir.social/@fabiogiglietto/116916978067512949
