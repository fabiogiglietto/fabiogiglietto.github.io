- date: '2026-06-28'
  content: >-
    Recent academic discussions address the complex landscape of digital
    platform governance and data accessibility for research. New analyses
    examine content moderation as 'traffic control' within EU and US legislation
    on platform regulation. Further scholarship investigates the evolving
    challenges and 'moving politics' concerning social media data access,
    particularly for critical areas like election research, assessing factors
    such as price, proficiency, and permission barriers.
  url: https://doi.org/10.1080/21624887.2026.2692735
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-28'
  content: >-
    Key research underscores critical issues within contemporary digital media
    ecosystems, particularly concerning the spread and understanding of
    information. Studies explore how alternative media are situated within the
    broader digital news environment through audience overlap networks. Other
    significant works analyze phenomena such as echo chambers, rabbit holes, and
    radicalization pathways on platforms like YouTube, alongside understanding
    disinformation as distinct narratives within hybrid media environments.
  url: https://doi.org/10.1080/21670811.2026.2683342
  platforms:
    - Mastodon
    - BlueSky
