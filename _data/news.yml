- date: '2026-03-16'
  content: >-
    The impact of AI on journalism and political discourse is examined in
    several recent publications. One study analyzes the "AI hype" in journalism,
    focusing on visibility, power, and media narratives. Another investigates
    how Large Language Models (LLMs) can infer political alignment from online
    conversations, while a third explores whether perceived political bias in
    LLMs affects their persuasive abilities. Additionally, a paper examines how
    conversational AI can be used for political persuasion.
