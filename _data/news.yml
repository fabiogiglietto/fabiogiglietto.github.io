- date: '2026-05-15'
  content: >-
    New research investigates the agentic framing of Generative AI and large
    language models within news media, shedding light on how these powerful
    tools are represented publicly. The paper is titled 'Generative AI, large
    language models, and their agentic framing in news media' by Dennis Nguyen
    and Magdalena Wischnewski.
  url: https://doi.org/10.1007/s00146-026-03070-1
