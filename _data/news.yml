- date: '2026-03-05'
  content: >-
    Research examining the influence of Large Language Models (LLMs) is among
    the shared readings. One paper investigates how perceived political bias in
    LLMs affects their persuasive abilities. Another explores the need for
    curated context for reliable political fact-checking, even with reasoning
    and web search capabilities. A third article critiques the unreflective
    adoption of LLMs in communication research.
  url: https://aoir.social/@fabiogiglietto/116178577531184258
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-02-19'
  content: >-
    The impact of platform governance and algorithmic effects are explored in
    recently shared papers. One study investigates the political effects of X's
    feed algorithm. Another examines election research in the context of
    regulated data access under the EU Digital Services Act.
  url: https://aoir.social/@fabiogiglietto/116095943026857124
