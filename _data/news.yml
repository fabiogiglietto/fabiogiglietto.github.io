- date: '2026-05-21'
  content: >-
    Recent scholarly work has explored various dimensions of online
    misinformation and conspiracy theories. Key studies highlighted include
    analysis of how individuals engage in symbolic boundary work within “Great
    Reset” debates, investigations into the “hostile misinformation effect”
    driven by ideological congruence, and assessments of how media contribute to
    the dissemination of conspiracy beliefs during crises like the COVID-19
    pandemic. Further research examined the relationship between extremist
    groups’ online discourse and their offline activities, the pursuit of
    epistemic authority by parliamentarians in times of crisis, and an
    international expert assessment of challenges and interventions related to
    digital misinformation.
  url: https://doi.org/10.1177/14614448261446590
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-20'
  content: >-
    A collection of significant papers has focused on the burgeoning field of
    Artificial Intelligence, large language models (LLMs), and their
    far-reaching societal implications. Featured research delves into public
    perceptions regarding the economics of AI, analyzes the framing of
    generative AI and LLMs in news media, and considers how state media control
    can influence these models. Other studies investigate the application of
    multimodal LLMs for visual political communication on platforms like
    Instagram and explore the potential for social theory to serve as a
    structural prior for agentic AI systems.
  url: >-
    https://scholar.google.com/scholar?q=What%2081%2C000%20people%20told%20us%20about%20the%20economics%20of%20AI
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-18'
  content: >-
    Academic discussions continue regarding the evolving landscape of social
    media platforms and their impact on public discourse. Noteworthy
    contributions include an analysis of the “death of Twitter” and its
    implications for online public debate, alongside examinations of how
    micro-influencers navigate platform culture. Additionally, new
    methodological guidance for researchers is provided through a systematic
    review of social science studies analyzing social media data from 2010 to
    2024, offering a comprehensive overview of analytical approaches in the
    field.
  url: https://doi.org/10.5204/mcj.3247
  platforms:
    - Mastodon
    - BlueSky
  toread: true
