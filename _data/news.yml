- date: '2026-05-21'
  content: >-
    A collection of papers exploring various aspects of misinformation and
    conspiracy theories was recently shared. These include studies on how
    individuals engage in symbolic boundary work within "Great Reset" debates
    across social media platforms, and the 'hostile misinformation effect' and
    how ideological congruence impacts the assessment of misinformation. Further
    insights were provided on media's role in disseminating conspiracy beliefs
    during crises like the COVID-19 pandemic, an international expert assessment
    of challenges and interventions in digital media, and applications of
    climate psychology to the study of misinformation.
  url: https://aoir.social/@fabiogiglietto/116612097993858415
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-26'
  content: >-
    A systematic review of social science studies analyzing social media data
    from 2010-2024 was among the recent papers highlighted. Other significant
    research covers multi-platform analysis of electoral discourse as a research
    infrastructure problem, the dynamics of far-right alternative influence
    networks on YouTube, and the relationship between online discourse and
    offline activities of groups like the Proud Boys. The collection also
    features discussions on the decline of public debate following changes on
    platforms like Twitter, how Brazilian parliamentarians establish epistemic
    authority in crises, and strategies micro-influencers employ to navigate
    platform culture demands.
  url: https://aoir.social/@fabiogiglietto/116642061044802188
