- date: '2026-05-18'
  content: >-
    Recent scholarly articles shedding light on online extremism and political
    discourse have been highlighted. These include analyses of the alternative
    influence network of far-right YouTubers in Sweden, the connection between
    the Proud Boys’ online communication and their offline activities, and how
    Brazilian parliamentarians assert epistemic authority during periods of
    crisis.
