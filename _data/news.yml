- date: '2026-05-21'
  content: >-
    Recent academic literature, drawing attention, delves into the complex
    dynamics of conspiracy theories and misinformation across digital platforms.
    Highlighted studies explore how individuals engage in symbolic boundary work
    within debates like the 'Great Reset,' analyze the 'hostile misinformation
    effect' driven by ideological congruence, and examine the relationship
    between extremist online discourse and offline activities, exemplified by
    groups like the Proud Boys. Further research examines media's role in
    disseminating conspiracy beliefs during crises such as the COVID-19
    pandemic, presents an international expert assessment of challenges and
    interventions in digital media, and offers insights from climate psychology
    for understanding misinformation and protest movements.
  url: https://doi.org/10.1177/14614448261446590
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-20'
  content: >-
    New research studies on Artificial Intelligence and Large Language Models
    are highlighted, exploring their multifaceted impact and societal
    implications. Papers investigate the economic considerations of AI, analyze
    the framing of Google’s AI Overviews, and discuss the imperative for social
    theory to serve as a structural prior for agentic AI development. Other key
    research explores how generative AI and LLMs are portrayed in news media,
    the influence of state media control on LLMs, the sociotechnical imaginaries
    surrounding generative AI in diverse national contexts, and the application
    of multimodal LLMs in visual political communication, particularly on
    platforms like Instagram.
  url: >-
    https://scholar.google.com/scholar?q=What%2081%2C000%20people%20told%20us%20about%20the%20economics%20of%20AI
  platforms:
