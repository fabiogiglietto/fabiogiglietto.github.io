- date: '2026-06-06'
  content: >-
    Crucial discussions regarding social media data access for academic research
    are being advanced through new publications. These include explorations of
    temporal dynamics in digital trace data for communication research,
    assessments of the current state of platform data access, and analyses of
    how multi-platform electoral discourse presents challenges for research
    infrastructure. Papers also consider the factors of price, proficiency, and
    permission in accessing platform data for election studies.
  url: https://aoir.social/@fabiogiglietto/116702871922444303
