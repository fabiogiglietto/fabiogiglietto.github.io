- date: '2026-07-18'
  content: >-
    Recent literature addresses the shifting landscape of academic data access.
    A new paper by Axel Bruns and Laura Vodden explores the practical and
    methodological challenges of analyzing platform data within clean room
    environments, complemented by research from Zoë Natalia Cullen, Nicole B.
    Ellison, and Irene V. Pasquetto examining the politics of API-mediated
    access.
  url: https://doi.org/10.25358/openscience-15825
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-15'
  content: >-
    Emerging research offers new strategic frameworks for countering
    disinformation and media manipulation. Scholars Celia Ramos, Clara
    Jiménez-Cruz, and Pablo Hernández-Escayola propose narrative monitoring and
    argument-checking as tools to move beyond standard fact-checking, while
    Lorenzo Mosca and Fred Paxton analyze the weaponization of the 'fake news'
    label within Italian newspapers.
  url: https://doi.org/10.37016/mr-2020-198
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-14'
  content: >-
    The evolving role of artificial intelligence in public discourse is the
    focus of several new studies. Research by Beth Goldberg and colleagues maps
    out the future of digital public squares in the age of generative AI, while
    a study by Johannes Kotz et al. investigates how conversational AI tools can
    shift beliefs and policy support among skeptics on highly contested societal
    issues.
  url: https://doi.org/10.1177/26339137261459441
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    A new study published in Science Advances evaluates crowdsourced platform
    moderation systems. Authors Paul Bouchaud and Pedro Ramaciotti argue that
    X's Community Notes feature, by design, undermoderates polarizing content,
    potentially creating significant risks for democratic electoral processes.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
