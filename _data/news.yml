- date: '2026-07-08'
  content: >-
    State-sponsored propaganda and rhetorical manipulation are undergoing deep
    structural shifts worldwide. Recent studies dissect the dual-objective
    strategies used by state media during the Russo-Ukrainian war, the strategic
    use of 'fake news' as a delegitimization weapon within mainstream Italian
    news outlets, and the compounding threats of generative AI and digital
    authoritarianism in democratically weakened nations.
