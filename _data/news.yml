- date: '2026-03-22'
  content: >-
    Several studies explore the impact of algorithmic systems and online
    communication. One paper examines how recommender systems on X (formerly
    Twitter) inadvertently profile users' ideological positions. Another
    investigates how large language models (LLMs) can infer political alignment
    from online conversations. Further research considers the role of platform
    actors and news media in information pathways within online science
    communication.
  url: https://aoir.social/@fabiogiglietto/116273892936349129
