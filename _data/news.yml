- date: '2026-07-04'
  content: >-
    Recent academic discourse highlights critical issues in online information
    environments. Key research explores the use of 'fake news' as a rhetorical
    weapon, examines how community moderation systems may undermoderate
    polarizing content, and analyzes the dynamics of cross-national troll
    behavior. Further studies investigate content moderation policies in the EU
    and US, the role of platform collective behavior, methods for reducing
    conspiracy beliefs through AI, and the formation of echo chambers on
    platforms like YouTube.
  url: https://aoir.social/@fabiogiglietto/116860118988675999
