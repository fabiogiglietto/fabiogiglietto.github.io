- date: '2026-07-02'
  content: >-
    A recent collection of shared papers highlights various dimensions of
    Artificial Intelligence's impact on digital media and information. Topics
    include the effectiveness of AI systems in persuasion, public perceptions
    and trust in AI-generated news, the role of AI in automating scientific
    review, and its potential in reducing conspiracy beliefs. Other discussions
    revolve around the evolving discourse and stakeholders driving the AI hype.
  url: http://arxiv.org/abs/2606.28277v1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    Recent literature curated by Prof. Giglietto explores critical issues in
    platform governance and content moderation. This includes analyses of how
    platforms like Community Notes manage polarizing content, the implications
    of platform collective behavior in the DSA era, comparative studies of EU
    and US legislation on platform regulation, and research on alternative media
    within the digital news ecosystem. Investigations into echo chambers, rabbit
    holes, and radicalization pathways on YouTube are also featured.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-03'
  content: >-
    Prof. Giglietto has highlighted several papers focusing on advancements in
    digital research methodologies and their applications in social sciences.
    Featured topics range from assessing respondent understanding in surveys,
    analyzing cross-national information attacks and troll behavior, to decoding
    informativeness perceptions among young adults on digital platforms. Further
    insights include exploring temporal dynamics in digital trace data and the
    capability of AI coding agents to reproduce social science findings.
  url: >-
    https://scholar.google.com/scholar?q=Where%27s%20the%20Evidence%20that%20Respondents%20Understand%20Your%20Survey%20Questions%3F
