- date: '2026-05-17'
  content: >-
    Developments in social media and platform dynamics are explored through
    papers discussing the perceived decline of public debate on platforms like
    Twitter, the strategies micro-influencers employ to thrive within platform
    cultures, and a comprehensive systematic review of social science studies
    analyzing social media data from 2010 to 2024.
