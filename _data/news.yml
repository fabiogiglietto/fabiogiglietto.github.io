- date: '2026-07-12'
  content: >-
    Understanding the drivers of political divide remains a central focus of
    media research, with several new papers examining how editorial choices and
    research methodologies shape our view of polarization. A study by Christian
    Schemer et al. investigates how measurement choices of partisan slant affect
    findings on US polarization, complemented by Emelie Karlsson's exploration
    of media narratives on digital election interference, and Lorenzo Mosca and
    Fred Paxton's analysis of the strategic use of 'fake news' accusations in
    Italian media.
