- date: '2026-05-15'
  content: >-
    Recent academic discussions highlighted several critical perspectives on the
    role of AI and large language models (LLMs) in contemporary media and
    political communication. Featured papers explored their agentic framing in
    news, the influence of state media control on LLMs, sociotechnical
    imaginaries of generative AI in global newspapers, and the application of
    multimodal LLMs for analyzing visual political communication on Instagram.
  url: https://doi.org/10.1007/s00146-026-03070-1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-15'
  content: >-
    Insights into the pervasive challenges of misinformation and conspiracy
    theories in digital media were recently underscored through prominent
    academic work. Noteworthy studies included an international expert
    assessment of trends and interventions, alongside an examination of six key
    insights from climate psychology pertinent to the study of misinformation.
  url: https://doi.org/10.1515/commun-2024-0123
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-13'
  content: >-
    The dynamic landscape of social media and digital platforms is a recurring
    theme in recent academic attention, with various papers delving into
    critical developments. Research covered how micro-influencers navigate
    platform demands, a systematic review of social science studies utilizing
    social media data, implications of Article 40 DSA for platform research,
    TikTok's role in algorithmic transformation, the conceptual shift towards
    'Post-Social Media Studies,' the rise of 'scam age' social media, the
    'platformization of everything,' and the evolving nature of social media
    into 'parasocial media,' alongside reflections on 'broken connections' from
    the old internet.
  url: >-
    https://scholar.google.com/scholar?q=Posting%20what%20you%20know%20and%20caring%20for%20the%20niche%3A%20How%20micro-influencers%20survive%20platform%20culture%20demands
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-05'
  content: >-
    Key research on online radicalization and protest movements drew attention
    to their complex interplay within digital spaces. Notable papers
    investigated the mainstreaming of radical and extremist ideologies through
    COVID-19 protests and offered a comprehensive 25-year review of online
    radicalization research, highlighting significant trends and challenges.
  url: https://doi.org/10.1080/1369118x.2026.2654668
  platforms:
