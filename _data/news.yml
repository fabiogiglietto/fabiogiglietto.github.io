  content: >-
    Investigating the intersection of artificial intelligence and online
    discourse, a collaborative study by Beth Goldberg and co-authors maps out
    how generative AI technologies are reshaping digital public squares. The
    paper offers critical insights into preserving democratic deliberation in
    environments increasingly populated by automated conversational systems.
