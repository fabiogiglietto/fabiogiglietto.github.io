- date: '2026-07-01'
  content: >-
    Recent scholarship highlights various facets of AI's societal implications,
    including public attitudes towards generative AI, its influence on media
    cognition and engagement, and its persuasive capabilities. Studies explore
    frameworks for understanding trust in AI, the roles of different
    stakeholders in shaping AI discourse, and AI's potential to reproduce social
    science findings or even reduce conspiracy beliefs through dialogue.
  url: https://doi.org/10.1038/s41598-026-58743-0
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    New research delves into critical aspects of platform governance, content
    moderation, and the spread of misinformation. Papers examine how community
    notes might undermoderate polarizing content, the evolving landscape of
    platform collective behavior in the Digital Services Act (DSA) era, and
    analyses of EU and US legislation on platform regulation. Other studies
    investigate cross-national information attacks and the evaluation of echo
    chambers and radicalization pathways on platforms like YouTube.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-03'
  content: >-
    A collection of recent papers addresses advancements and challenges in
    digital media research and methodologies. Topics include the crucial
    question of respondents' comprehension in surveys, potential automation of
    scientific review processes using tools like Google's Paper Assistant, and
    studies on locating alternative media within the digital news ecosystem.
    Research also covers understanding what young adults perceive as informative
    on audio-visual platforms and techniques for mining temporal dynamics in
    digital trace data for communication studies.
  url: >-
    https://scholar.google.com/scholar?q=Where%27s%20the%20Evidence%20that%20Respondents%20Understand%20Your%20Survey%20Questions%3F
  platforms:
    - Mastodon
    - BlueSky
  toread: true
