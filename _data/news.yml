- date: '2026-06-06'
  content: >-
    Emerging scholarship addresses critical methodological and data access
    challenges in contemporary social media research. Recent papers examine the
    evolving state of play in social media data access, focusing on obstacles
    and opportunities for election research. Discussions also include the
    complexities of multi-platform analysis of electoral discourse as a research
    infrastructure problem. Furthermore, new approaches are being explored for
    mining user-sequences to understand temporal dynamics in digital trace data,
    enhancing methods for communication research.
  url: https://doi.org/10.1080/19312458.2026.2664873
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-31'
  content: >-
    A significant body of new research delves into the dynamics of
    misinformation, conspiracy theories, and online extremism within digital
    media ecosystems. Scholars have explored how disinformation operates as
    narratives in hybrid media, the 'hostile misinformation effect' driven by
    ideological congruence, and how people engage in symbolic boundary work
    around topics like the 'Great Reset.' Investigations also include the role
    of media in disseminating conspiracy beliefs during crises such as the
    COVID-19 pandemic, and analyses of online extremist networks, including
    far-right YouTubers and the discourse of groups like the Proud Boys.
  url: https://doi.org/10.1177/14648849241303249
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-29'
  content: >-
    Recent academic literature critically examines the multifaceted impact of
    Artificial Intelligence on society. Key research highlights include
    algorithm redesign for intervening on social norm misperceptions during
    elections, the political economy of AI and accountability, and the
    imaginative landscape of AI. Further studies explore the economics of AI,
    its agentic framing in news media, and discourse analysis surrounding
    Google’s AI Overviews. These analyses collectively emphasize AI's
    transformative role and the ongoing discussions about its ethical and social
    implications.
  url: https://doi.org/10.1038/s41586-026-10536-1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
