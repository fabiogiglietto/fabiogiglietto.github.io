- date: '2026-07-08'
  content: >-
    New academic analyses shared examine critical aspects of disinformation and
    propaganda within contemporary media landscapes. Featured studies
    investigate the impact of media narratives on digital election interference
    and political polarization, alongside the dual objectives of state media
    propaganda, particularly in conflicts like the Russo-Ukrainian war. Further
    research explores the strategic use of fake news as a rhetorical weapon in
    Italian newspapers, cross-national information attacks, and the positioning
    of alternative media within the digital news ecosystem.
  url: https://aoir.social/@fabiogiglietto/116883181696282906
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    Recent scholarship highlighted focuses on key challenges in platform
    governance and content moderation. Included studies critically assess how
    platforms like Community Notes might undermoderate polarizing content,
    posing risks to electoral processes. Other analyses explore platform
    collective behavior as a crucial democratic infrastructure in the DSA era
    and examine content moderation through the lens of traffic control,
    analyzing relevant EU and US legislation.
  url: https://aoir.social/@fabiogiglietto/116848735402994028
