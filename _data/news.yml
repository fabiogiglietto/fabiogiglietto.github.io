- date: '2026-03-05'
  content: >-
    Recent scholarly attention has been directed towards the impact of Large
    Language Models (LLMs) on various aspects of society. One paper examines how
    perceived political bias in LLMs reduces their persuasive abilities, while
    another critiques the unreflective adoption of LLMs in communication
    research. Additionally, researchers are exploring whether LLMs require
    curated context for reliable political fact-checking, even with reasoning
    and web search capabilities.
  url: https://aoir.social/@fabiogiglietto/116178577531184258
