- date: '2026-05-18'
  content: >-
    Research published recently sheds light on the dynamics of online extremism
    and the evolving landscape of public discourse. Papers explore the
    'alternative influence network' of far-right YouTubers in Sweden, the
    implications of 'the death of Twitter' for online public debate, the
    relationship between online discourse and offline activities of groups such
    as the Proud Boys, and how Brazilian parliamentarians exert epistemic
    authority during times of crisis.
  url: https://aoir.social/@fabiogiglietto/116594462275492068
