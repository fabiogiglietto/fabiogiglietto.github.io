- date: '2026-06-06'
  content: >-
    A recent study, 'Exploring temporal dynamics in digital trace data: mining
    user-sequences for communication research' by Yangliu Fan, Jakob Ohme, and
    Lion Wedel, was highlighted as important reading. The paper delves into
    methodologies for leveraging digital trace data to understand user behaviors
    and patterns in communication research.
  url: https://doi.org/10.1080/19312458.2026.2664873
