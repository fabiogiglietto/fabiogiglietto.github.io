- date: '2026-06-04'
  content: >-
    Recent scholarship explores the intricate challenges of accessing social
    media data for research, particularly in electoral contexts. Key topics
    include navigating technical, financial, and permission-based hurdles in
    platform data access, and the broader implications for conducting
    multi-platform analyses of electoral discourse.
