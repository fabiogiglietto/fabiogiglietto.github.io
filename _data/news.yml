- date: '2026-07-02'
  content: >-
    Crowdsourced moderation systems like X's Community Notes may actively
    undermoderate polarizing content by design. A recent paper in Science
    Advances by Paul Bouchaud and Pedro Ramaciotti reveals how these platform
    design choices introduce significant risks to electoral processes.
