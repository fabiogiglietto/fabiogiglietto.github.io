- date: '2026-07-08'
  content: >-
    Recent scholarship highlights the evolving threat of digital election
    interference and state-sponsored propaganda. Key newly published studies
    analyze the impact of media narratives on polarization during elections,
    comparative insights into generative AI-driven propaganda across
    democratically weakened nations, and the dual domestic and international
    objectives of Russian state media during the Russo-Ukrainian war.
  url: https://doi.org/10.1177/14614448251410509
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-03'
  content: >-
    Emerging tools and methodology assessments are reshaping academic workflows
    and survey design. Notable new papers investigate the automation of
    scientific reviews using Google's Paper Assistant Tool, alongside critical
    evaluations of whether survey respondents genuinely comprehend standard
    questionnaire items.
  url: >-
    https://scholar.google.com/scholar?q=Where%27s%20the%20Evidence%20that%20Respondents%20Understand%20Your%20Survey%20Questions%3F
