  content: >-
    Recent research unpacks critical aspects of misinformation and deceptive
    online networks, including studies on their reach in the US 2020 elections
    (Appel et al.), YouTube's role in shaping conspiracy mentality (Li, Lee,
    Kim), and the conceptualization of disinformation as a cultural narrative
    (Marwick et al.). Further insights detail misinformation measurements on
    major European platforms.
