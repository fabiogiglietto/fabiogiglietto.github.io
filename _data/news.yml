  content: >-
    Recent updates on social media showcase a diverse range of critical academic
    literature in digital media studies, curated by Professor Giglietto. The
    featured papers delve into key contemporary issues, including the
    imaginative landscapes and economic implications of AI, multi-platform
    analyses of electoral discourse, and the complex dynamics of conspiracy
    theories and misinformation across online environments. Further highlighted
    research explores the role of social theory in developing agentic AI, the
    evolving nature of public debate on social platforms, and the influence of
    state media control on large language models. This ongoing curation reflects
    a sustained engagement with cutting-edge research at the intersection of
    technology, society, and communication.
