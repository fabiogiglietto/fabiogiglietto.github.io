  toread: true
- date: '2026-07-02'
  content: >-
    Recent academic papers focusing on digital platform governance and social
    media dynamics have been shared. These include analyses of how community
    notes moderate polarizing content, collective platform behavior as
    democratic infrastructure, and cross-national information attacks. Further
    insights cover the role of alternative media within the digital news
    ecosystem, comparative studies of EU and US content moderation legislation,
    assessments of echo chambers and radicalization pathways on YouTube, and the
    challenges in accessing social media data for research.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
