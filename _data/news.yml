- date: '2026-03-22'
  content: >-
    Several new papers address the influence of algorithms and platform design
    on user autonomy and political discourse. One examines dark patterns in the
    context of the EU Digital Services Act, while another investigates how
    recommender systems on X (formerly Twitter) can inadvertently profile users'
    ideological positions. Additionally, research analyzes how Serbia's SNS
    party utilizes coordinated inauthentic behavior to mimic authentic support
    online.
  url: https://aoir.social/@fabiogiglietto/116271887986339084
