- date: '2026-03-05'
  content: >-
    Several recent publications address the impact and role of Large Language
    Models (LLMs). One paper examines how perceived political bias in LLMs
    reduces their persuasive abilities. Another critiques the unreflective
    adoption of LLMs in communication research. Additionally, a study explores
    how to integrate topic modeling and LLM prompt engineering into a
    human-driven approach for analyzing interview transcripts. Further research
    indicates that LLMs require curated context for reliable political
    fact-checking, even with reasoning and web search capabilities.
  url: https://aoir.social/@fabiogiglietto/116178577531184258
  platforms:
    - Mastodon
    - BlueSky
- date: '2026-03-05'
  content: >-
    New research investigates coordinated inauthentic behavior, with a focus on
    how Serbia's SNS party mimics authentic support. The study, by Ana
    Jovanovic-Harrington and Alessio Cornia, goes beyond simple detection to
    explore the mechanisms of this manipulation.
  url: https://aoir.social/@fabiogiglietto/116174861506023294
  platforms:
