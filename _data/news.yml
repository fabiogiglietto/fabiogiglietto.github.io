- date: '2026-03-14'
  content: >-
    Research is being conducted on the role of online platforms and coordinated
    behavior in political contexts. A paper analyzes connective action and
    digital repression during China’s COVID-19 protests through computational
    analysis of multilingual activity on Twitter. In addition, a study
    investigates how Serbia's SNS party employs coordinated inauthentic behavior
    to mimic genuine support online.
  url: https://aoir.social/@fabiogiglietto/116226824918036732
