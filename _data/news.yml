- date: '2026-07-08'
  content: >-
    A curated collection of recent studies highlights critical vulnerabilities
    in democratic digital infrastructures. Key publications examine how media
    narratives impact digital election interference, why crowdsourced moderation
    tools like Community Notes may systematically under-moderate polarizing
    content, and how platform collective behavior must be understood beyond
    simple causal effects in the era of the EU's Digital Services Act (DSA).
