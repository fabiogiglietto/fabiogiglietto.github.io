- date: '2026-05-17'
  content: >-
    Emerging research has focused on the complex dynamics of misinformation,
    conspiracy theories, and online radicalization. Recent papers explore topics
    such as the relationship between extremist online discourse and offline
    activities, media's role in spreading conspiracy beliefs during the COVID-19
    pandemic, and an international expert assessment of challenges and
    interventions in digital media. Additionally, insights from climate
    psychology for studying misinformation and a review of 25 years of online
    radicalization research were noted as key readings.
  url: https://aoir.social/@fabiogiglietto/116588918319552332
  platforms:
