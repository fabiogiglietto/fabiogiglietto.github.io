- date: '2026-05-31'
  content: >-
    Recent academic work highlights critical aspects of online information
    environments, including the understanding of disinformation as narratives,
    the dynamics of conspiracy theories and their media dissemination, the
    hostile misinformation effect, and the rise of alternative influence
    networks associated with far-right extremism.
  url: https://aoir.social/@fabiogiglietto/116670726588688843
