- date: '2026-07-12'
  content: >-
    Recent cognitive and behavioral research highlights the growing persuasive
    power of generative AI, demonstrating its ability to shift public beliefs on
    contested societal issues. Studies show that structured dialogues with
    conversational AI can durably reduce conspiracy beliefs and even
    out-persuade expert humans, prompting new discussions on the societal
    implications of AI-driven persuasion.
  url: https://doi.org/10.31234/osf.io/7szrn_v1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    As democratic institutions navigate the Digital Services Act (DSA) era, new
    academic analyses are evaluating the systemic impact of platform governance
    and moderation. Key findings suggest that decentralized moderation tools
    like Community Notes may structurally undermoderate polarizing content,
    while comparative studies of EU and US legislation conceptualize content
    moderation as a form of digital traffic control.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-01'
  content: >-
    Understanding how audiences perceive and trust generative AI remains a
    critical frontier in media studies. Recent empirical investigations reveal
    how users evaluate the quality of AI-generated versus AI-assisted news,
    while broader public opinion data maps the evolving multilevel frameworks
    through which the public establishes trust in these emerging technologies.
  url: https://doi.org/10.1038/s41598-026-58743-0
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-12'
  content: >-
    Scholars are sharpening their focus on the mechanisms of political
    polarization, questioning how methodological designs shape our understanding
    of partisan media slant. Concurrently, new research investigates the
    specific role of media narratives in facilitating digital election
    interference and amplifying both perceived and actual societal divisions.
  url: https://doi.org/10.1080/10584609.2026.2699105
  platforms:
    - Mastodon
    - BlueSky
  toread: true
