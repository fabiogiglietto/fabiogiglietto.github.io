- date: '2026-06-19'
  content: >-
    A recent compilation of academic papers, shared by Professor Giglietto,
    delves into various facets of Artificial Intelligence. These include
    research on Italian public attitudes towards AI, a longitudinal analysis of
    the drivers behind AI hype in US and German discourse, and explorations into
    the capacity of AI coding agents to reproduce social science findings.
    Further insights address the political economy of AI and its 'imaginative
    landscape.'
  url: https://doi.org/10.1080/1369118x.2026.2689030
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-15'
  content: >-
    Important new studies, curated and shared, examine critical areas within
    social media and digital platforms. Topics explored range from understanding
    how young adults perceive informativeness on audio-visual platforms and the
    evaluation of echo chambers, rabbit holes, and radicalization pathways on
    YouTube, to methodologies for exploring temporal dynamics in digital trace
    data. The collection also includes several significant articles on the
    evolving challenges of social media data access for election research, the
    role of disinformation as narratives in hybrid media ecosystems, algorithmic
    interventions on social norm misperceptions, and multi-platform analysis of
    electoral discourse.
  url: https://doi.org/10.1080/21670811.2026.2685660
  platforms:
    - Mastodon
    - BlueSky
  toread: true
