- date: '2026-07-08'
  content: >-
    A new comparative study examines the intersection of generative AI,
    propaganda, and digital authoritarianism across six democratically weakened
    nations. The research, co-authored by Gabrielle D. Beacken, Inga K.
    Trauthig, and Samuel C. Woolley, explores how emerging AI tools are being
    leveraged to manipulate information ecosystems and suppress democratic
    processes.
  url: https://doi.org/10.1177/20539517251410064
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-04'
  content: >-
    Investigating the domestic media landscape, a newly published paper by
    Lorenzo Mosca and Fred Paxton analyzes how "fake news" is deployed as a
    rhetorical weapon in Italian newspapers. The authors unpack how selective
    amplification and strategic delegitimization are used to shape public
    political discourse.
  url: https://doi.org/10.1177/02673231261458935
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    Recent research by Paul Bouchaud and Pedro Ramaciotti reveals structural
    flaws in crowdsourced moderation systems. The study demonstrates that
    platform features like X's Community Notes systematically undermoderate
    polarizing content, introducing significant risks to democratic integrity
    during electoral processes.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-21'
  content: >-
    Can artificial intelligence help combat misinformation? A groundbreaking
    study by Thomas H. Costello, Gordon Pennycook, and David Rand suggests that
    tailored dialogues with AI can durably reduce conspiracy beliefs, offering
    potential new avenues for scalable psychological interventions.
  url: https://doi.org/10.31234/osf.io/xcwdn
