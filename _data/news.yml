- date: '2026-07-18'
  content: >-
    Navigating the complexities of platform data remains a major focus for
    digital media researchers. Recently highlighted publications tackle these
    methodological hurdles, offering insights into the limitations of
    platform-mediated APIs, the technical challenges of working within
    restricted data clean rooms, and new random-sampling tools designed to study
    video-heavy platforms like YouTube and TikTok.
