- date: '2026-05-18'
  content: >-
    Recent academic discussions highlighted by Prof. Giglietto explore the
    complex landscape of online extremism and misinformation. Noteworthy studies
    delve into the alternative influence networks of far-right YouTubers during
    the COVID-19 pandemic, examine the relationship between groups like the
    Proud Boys' online discourse and offline activities, and analyze how media
    platforms contribute to the dissemination of conspiracy beliefs. Further
    insights draw from climate psychology to combat misinformation and consider
    the mainstreaming of radical ideologies through protest movements, alongside
    a review of 25 years of online radicalization research.
  url: https://doi.org/10.2478/nor-2026-0008
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-15'
  content: >-
    Prof. Giglietto is following cutting-edge research on Generative AI and
    Large Language Models, specifically focusing on their societal implications.
    Papers shared include frameworks for multi-Agent Social Systems stressing
    the role of social theory, the framing of agentic AI in news media, the
    influence of state media control on LLMs, and an exploration of the
    sociotechnical imaginaries surrounding generative AI across international
    newspapers. The applications of multimodal LLMs in visual political
    communication are also a point of interest.
  url: https://doi.org/10.1007/s00146-026-03070-1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-17'
  content: >-
    The shifting landscape of digital platforms and social media research
    methodologies are key areas of interest. Recent shared studies explore the
    "death of Twitter" and its implications for public debate, the survival
    strategies of micro-influencers within platform cultures, and a
    comprehensive systematic review of social science studies analyzing social
    media data from 2010-2024. Discussions also cover the transformative impact
    of algorithmic systems like TikTok's on social media publics and the crucial
    changes brought by Article 40 DSA for platform research access, alongside
    reflections on the future direction of "Post-Social Media Studies."
  url: https://doi.org/10.5204/mcj.3247
  platforms:
    - Mastodon
    - BlueSky
  toread: true
