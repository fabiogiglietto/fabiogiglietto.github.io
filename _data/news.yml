- date: '2026-07-14'
  content: >-
    Critical insights into platform-mediated research are explored in a newly
    published paper analyzing API access and the politics of data availability.
    The authors examine how platform-dictated access limits academic inquiry and
    influences the broader landscape of digital social research.
  url: https://doi.org/10.1177/20539517261461463
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-08'
  content: >-
    The intersection of emerging technologies and democratic backsliding is the
    focus of a comparative study investigating how generative AI is weaponized
    for state propaganda. Drawing on evidence from six democratically weakened
    nations, the research highlights the growing challenges of digital
    authoritarianism.
  url: https://doi.org/10.1177/20539517251410064
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-04'
  content: >-
    Strategic delegitimization in political discourse is examined in a new paper
    focusing on the Italian press. Researchers analyze how major domestic
    newspapers utilize the label of 'fake news' as a rhetorical weapon to
    selectively amplify or discredit specific public narratives.
  url: https://doi.org/10.1177/02673231261458935
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    A newly published study evaluates the design limitations of crowd-sourced
    moderation, revealing that platform features like 'Community Notes' may
    systematically undermoderate polarizing content, posing distinct risks
    during democratic electoral processes.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
