- date: '2026-05-20'
  content: >-
    Recent academic discussions highlight the multifaceted impact of Artificial
    Intelligence and Large Language Models (LLMs). Key papers explore the
    economics of AI, analyze how Google's AI Overviews frame the future of
    search, and advocate for integrating social theory as a structural prior for
    agentic AI. Further insights reveal how generative AI and LLMs are framed in
    news media, the influence of state media control on LLMs, and the
    application of multimodal LLMs in visual political communication on
    platforms like Instagram.
  url: >-
    https://scholar.google.com/scholar?q=What%2081%2C000%20people%20told%20us%20about%20the%20economics%20of%20AI
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-18'
  content: >-
    The evolving landscape of online misinformation, conspiracy theories, and
    extremism continues to be a critical area of study. New research examines
    the alternative influence network of far-right YouTubers, analyzes the
    relationship between online discourse and offline activities of groups like
    the Proud Boys, and investigates how media contribute to the dissemination
    of conspiracy beliefs. Additional work provides an international expert
    assessment of challenges and interventions related to misinformation, offers
    insights from climate psychology for its study, and explores the
    mainstreaming of radical ideologies within protest movements.
  url: https://doi.org/10.2478/nor-2026-0008
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-17'
  content: >-
    Significant academic discourse focuses on the dynamics and governance of
    social media platforms. Recent publications address the potential decline of
    public debate online, particularly in light of events like the
    transformations at Twitter, and investigate how micro-influencers navigate
    platform culture. Methodological advancements include a systematic review of
    social science studies analyzing social media data, while platform changes
    are explored through TikTok's algorithmic transformation into social
    interest clusters and the practical implications of Europe's Digital
    Services Act (DSA) Article 40 for platform research.
  url: https://doi.org/10.5204/mcj.3247
  platforms:
    - Mastodon
    - BlueSky
  toread: true
