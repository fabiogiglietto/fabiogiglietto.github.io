- date: '2026-07-18'
  content: >-
    A cluster of newly highlighted literature explores how digital
    disinformation, media narratives, and platform moderation policies shape
    democratic trust. Key studies examine how informational pathways affect
    election integrity, the limits of crowd-sourced moderation systems like
    Community Notes, and the impact of narrative monitoring in countering
    polarization.
  url: https://doi.org/10.1080/17457289.2026.2701896
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-18'
  content: >-
    Recent research highlights the shifting methodologies of platform-mediated
    academic studies. Contributions analyze the strict governance of clean room
    data environments, the sociopolitical barriers of API access, and introduce
    open-source sampling tools like TubeStats and TokStats for studying YouTube
    and TikTok.
  url: https://doi.org/10.25358/openscience-15825
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-14'
  content: >-
    Scholars are rapidly defining frameworks to evaluate the democratic and
    psychological footprints of generative artificial intelligence. Newly
    curated publications explore AI's role in digital public squares, its
    efficacy in shifting the beliefs of skeptics on contested societal issues,
    and the rise of AI-driven state propaganda.
  url: https://doi.org/10.1177/26339137261459441
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-12'
  content: >-
    New political communication studies analyze the strategic weaponization of
    news media narratives. This research spans from the dual domestic and
    international goals of Russian state propaganda to how European newspapers
    leverage the term 'fake news' as a rhetorical tool for political
    delegitimization.
  url: https://doi.org/10.1080/10584609.2026.2699105
  platforms:
    - Mastodon
    - BlueSky
  toread: true
