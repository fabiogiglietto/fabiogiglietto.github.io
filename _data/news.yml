- date: '2026-05-20'
  content: >-
    New research exploring the societal impact of artificial intelligence and
    large language models (LLMs) has been shared. Among the highlighted works
    are an analysis of 81,000 people's perspectives on the economics of AI, and
    a discourse analysis examining the framing of Google's AI Overviews.
    Additional studies delve into the influence of state media control on LLMs
    and how generative AI is presented with agentic framing in news media.
