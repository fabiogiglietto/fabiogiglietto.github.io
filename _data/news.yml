- date: '2026-05-15'
  content: >-
    An international expert assessment details the ongoing challenges, trends,
    and interventions related to conspiracy theories and misinformation
    prevalent in digital media. This critical work, 'Conspiracy theories and
    misinformation in digital media: An international expert assessment of
    challenges, trends, and interventions' is authored by Daniela Mahl et al.
  url: https://doi.org/10.1515/commun-2024-0123
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-13'
  content: >-
    A recent paper explores how micro-influencers sustain their presence and
    niche engagement amidst the evolving demands of platform culture, focusing
    on authenticity and specialized content. The study, titled 'Posting what you
    know and caring for the niche: How micro-influencers survive platform
    culture demands,' is by Camilla Volpe.
  url: >-
