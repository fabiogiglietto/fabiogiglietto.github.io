- date: '2026-03-18'
  content: >-
    Several papers analyze the role of algorithms and online platforms in
    shaping user experiences and behaviors. One study delves into whether
    YouTube shapes conspiracy mentality through partisan channel use and
    discussions. Another investigates how a recommender system on X
    inadvertently profiles users' ideological positions.
