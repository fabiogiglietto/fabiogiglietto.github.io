- date: '2026-05-31'
  content: >-
    Disinformation in electoral contexts remains a significant area of inquiry.
    Recent papers analyze disinformation as narratives within the hybrid media
    ecosystem, with a specific focus on evidence from the US, and explore
    algorithmic design strategies aimed at intervening on social norm
    misperceptions during national elections.
