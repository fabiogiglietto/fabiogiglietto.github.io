- date: '2026-07-08'
  content: >-
    Emerging literature on digital authoritarianism highlights how states
    leverage advanced technologies and coordinated networks to manipulate public
    discourse. Featured research includes a comparative analysis by Gabrielle D.
    Beacken et al. on generative AI and propaganda in democratically weakened
    countries, an investigation by Makeev et al. into Russian state media
    strategies during the Russo-Ukrainian war, and Jaehong Kim et al.'s
    two-decade historical review of troll behavior and information attacks in
    Korea.
  url: https://aoir.social/@fabiogiglietto/116883181119840106
