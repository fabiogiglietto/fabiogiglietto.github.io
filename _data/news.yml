- date: '2026-07-22'
  content: >-
    A new longitudinal study co-authored with Giada Marino and Bruna Paroni
    examines affective engagement within pro-Bolsonaro Facebook networks.
    Published in Information, Communication & Society, the research measures
    partisan community dynamics to understand how online political groups
    sustain cohesion and engagement over time.
  url: https://doi.org/10.1080/1369118x.2026.2696929
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-14'
  content: >-
    To help scholars overcome the persistent limitations of platform API
    restrictions, a new methodological paper introduces TubeStats and TokStats.
    These open-source tools enable researchers to generate random public samples
    from YouTube and TikTok, facilitating more rigorous and transparent
    video-based social media analysis.
  url: https://doi.org/10.17645/mac.12085
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-04'
  content: >-
    How mainstream media outlets weaponize accusations of disinformation is the
    focus of a new study on Italian journalism. Analyzing national newspapers,
    researchers Lorenzo Mosca and Fred Paxton outline how the term 'fake news'
    is frequently deployed as a strategic rhetorical tool for selective
    political amplification and delegitimization.
  url: https://doi.org/10.1177/02673231261458935
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    Critical design flaws in crowd-sourced moderation systems are highlighted in
    a new Science Advances paper. The study demonstrates how X's Community Notes
    feature systematically undermoderates highly polarizing content, posing
    significant integrity risks during democratic electoral processes.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
