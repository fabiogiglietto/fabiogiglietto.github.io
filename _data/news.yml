    - BlueSky
  toread: true
- date: '2026-04-25'
  content: >-
    A collection of recent papers offers critical perspectives on the changing
    landscape of social media. These studies examine the algorithmic
    transformation of social media publics, moving from social networks to
    interest clusters (as seen with TikTok), propose a new framework for
    'Post-Social Media Studies,' investigate the rise of 'social media in the
    scam age,' analyze the extensive 'platformization of everything,' and
    discuss the transition of social media towards 'parasocial media' dynamics.
  url: https://aoir.social/@fabiogiglietto/116464465146454193
  platforms:
    - Mastodon
