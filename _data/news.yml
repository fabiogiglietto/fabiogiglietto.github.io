    An investigation into Italian media dynamics reveals how mainstream
    newspapers employ accusations of "fake news" as a strategic rhetorical
    weapon. Authors Lorenzo Mosca and Fred Paxton analyze the patterns of
    strategic delegitimization and selective amplification within the national
    press landscape.
