- date: '2026-07-01'
  content: >-
    Recent academic discussions highlight the profound impact of Artificial
    Intelligence on media landscapes, public perception, and trust. Key papers
    explore how AI influences news quality perceptions, affects public
    opinion—including specific studies on US and Italian attitudes towards
    AI—and its potent persuasive capabilities, suggesting AI systems can even
    out-persuade human experts. Furthermore, research delves into frameworks for
    understanding trust in generative AI and analyzes the stakeholders driving
    the AI discourse on social media.
  url: https://aoir.social/@fabiogiglietto/116844370697637250
