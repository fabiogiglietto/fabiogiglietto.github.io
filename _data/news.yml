    - BlueSky
  toread: true
- date: '2026-05-17'
  content: >-
    New scholarly publications address significant methodological and governance
    challenges in digital research. Featured topics include how parliamentarians
    assert epistemic authority during times of crisis, the practical
    implications of Article 40 of the Digital Services Act (DSA) for accessing
    platform data, and a systematic review of social science studies utilizing
    social media data from 2010 to 2024.
  url: https://aoir.social/@fabiogiglietto/116588917891434780
