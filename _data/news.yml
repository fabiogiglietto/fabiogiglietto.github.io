- date: '2026-06-28'
  content: >-
    A collection of recent academic papers has been highlighted, addressing
    various facets of Artificial Intelligence, including its role in media
    cognition, its persuasive capabilities compared to human experts, and
    strategies for reducing conspiracy beliefs through AI dialogues. Further
    studies explore public attitudes towards AI in Italy, the stakeholders
    driving the AI hype, and the potential for AI coding agents to replicate
    social science findings.
