- date: '2026-03-13'
  content: >-
    Scholarly attention is being directed toward the evolving threat of
    AI-driven scams, particularly deepfake financial fraud, and the global
    regulatory responses. Additionally, a new paper investigates coordinated
    inauthentic behavior by Serbia's SNS party to mimic authentic support
    online. These studies highlight the growing need for effective strategies to
    combat online manipulation and protect individuals from fraud.
