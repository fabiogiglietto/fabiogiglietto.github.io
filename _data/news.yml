- date: '2026-07-02'
  content: >-
    As the Digital Services Act (DSA) usher in a new era of platform
    accountability, curated academic contributions examine the mechanics of
    digital governance and content moderation. This includes Paul Bouchaud and
    Pedro Ramaciotti’s study on the structural electoral risks of Twitter's
    Community Notes, Anja Bechmann’s conceptual framework for collective
    platform behavior under the DSA, and a comparative study by Valentine
    Crosset et al. framing content moderation as a form of traffic control.
  url: https://aoir.social/@fabiogiglietto/116848735402994028
