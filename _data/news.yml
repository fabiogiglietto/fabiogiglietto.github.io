  content: >-
    Recent scholarship extensively featured by Professor Giglietto showcases
    advancements in digital communication research, particularly concerning
    artificial intelligence and online ecosystems. Key papers explore public
    perceptions of and trust in AI-generated news, the persuasive capabilities
    of AI systems, and strategies for using AI to reduce conspiracy beliefs.
    Further highlighted research delves into the dynamics of digital platforms,
    including analyses of cross-national information attacks, the role of
    alternative media, and the legislative landscape of content moderation in
    the EU and US. These curated studies offer vital insights into the evolving
    interplay between technology, media, and societal information flows.
