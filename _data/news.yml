- date: '2026-06-13'
  content: >-
    New scholarship addresses the complex dynamics of online misinformation,
    disinformation, and radicalization. Recent findings evaluate echo chambers
    and pathways to radicalization on platforms like YouTube, analyze
    disinformation as narratives in hybrid media ecosystems, and explore how
    algorithms can intervene on social norm misperceptions during elections.
    Other research investigates the 'hostile misinformation effect' and how
    individuals engage in symbolic boundary work within 'Great Reset' conspiracy
    debates.
  url: https://aoir.social/@fabiogiglietto/116745221330173366
