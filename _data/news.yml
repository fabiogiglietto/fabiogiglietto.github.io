- date: '2026-06-19'
  content: >-
    Recent academic research in digital media studies, artificial intelligence,
    and political communication has been highlighted, showcasing cutting-edge
    papers that explore public attitudes towards AI, the political economy of
    AI, critical issues in social media data access for research, the dynamics
    of disinformation, electoral discourse, and the analysis of echo chambers
    and radicalization pathways on digital platforms. This ongoing curation
    activity provides a valuable overview of current scholarly advancements in
    the field.
