- date: '2026-04-25'
  content: >-
    A paper by Paolo Gerbaudo investigates TikTok and its role in the
    algorithmic transformation of social media publics, arguing a shift from
    traditional social networks to social interest clusters. The analysis sheds
    light on the platform's unique impact on online communities.
  url: https://doi.org/10.1177/14614448241304106
