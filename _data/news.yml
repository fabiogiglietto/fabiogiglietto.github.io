- date: '2026-05-17'
  content: >-
    Emerging trends and critical analyses in social media studies have been
    brought to light by Prof. Giglietto. Featured research addresses the decline
    of public debate following changes on platforms like Twitter, how Brazilian
    parliamentarians establish epistemic authority during crises, and the
    strategies micro-influencers employ to thrive within platform cultures.
    Further insights cover a systematic review of social science studies
    utilizing social media data, the practical implications of the Digital
    Services Act (DSA) for platform research, TikTok’s role in transforming
    social media publics into interest clusters, and theoretical propositions
    for a 'Post-Social Media Studies' framework.
