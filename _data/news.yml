- date: '2026-04-27'
  content: >-
    The Digital Services Act (DSA) is a focal point in recent academic
    discourse, particularly regarding its implications for platform research.
    New papers highlight how Article 40 of the DSA is set to transform practical
    aspects of data access and examine the quality and relevance of online
    platform data within its context.
  url: https://doi.org/10.1080/10584609.2026.2664157
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-25'
  content: >-
    Recent scholarship delves into the profound transformations of social media,
    examining shifts from traditional social networks to algorithmically driven
    interest clusters, the rise of parasocial interactions, and the overarching
    'platformization of everything.' Researchers are also exploring the
    challenges of the 'scam age' and reflecting on 'broken connections' within
    the evolving digital landscape, suggesting a need for a 'post-social media
    studies' approach.
  url: https://doi.org/10.1177/14614448241304106
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-23'
  content: >-
    An extensive body of recent research investigates critical issues
    surrounding online radicalization, disinformation, and political
    polarization. Studies include a 25-year review of online radicalization
    research, analyses of deceptive networks impacting elections, and
    explorations into how platforms like YouTube contribute to conspiracy
    mentality. There is also a focus on effective depolarization strategies and
    conceptualizing disinformation as powerful cultural narratives.
  url: https://doi.org/10.1080/10714421.2026.2658935
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-07'
  content: >-
    A new systematic literature review sheds light on the visualization of
    climate change in media, addressing current challenges and outlining
    directions for future research in this crucial area of communication.
  url: https://doi.org/10.1093/anncom/wlag011
