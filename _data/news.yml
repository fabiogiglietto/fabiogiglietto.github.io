- date: '2026-04-23'
  content: >-
    Recent scholarly discourse highlights critical issues in online
    radicalization and disinformation. New research provides a 25-year
    retrospective on online radicalization, alongside examinations of social
    media's role in the 'scam age' and the pervasive nature of deceptive online
    networks, particularly their impact on the 2020 US elections. Further
    studies delve into how YouTube may influence conspiracy mentality and
    conceptualize disinformation as identity-affirming cultural narratives.
    Monitoring efforts also offer a second measurement of misinformation across
    major European platforms, providing vital insights into the evolving
    landscape of online manipulation.
