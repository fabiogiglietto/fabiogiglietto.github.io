- date: '2026-06-04'
  content: >-
    Recent analyses delve into the critical challenges of social media data
    access for research, particularly concerning electoral studies and platform
    accountability. New findings explore algorithmic interventions to counter
    misperceptions during elections, along with methods for multi-platform
    analysis of political discourse and the dynamics of narrative control among
    parliamentarians in times of crisis.
  url: https://doi.org/10.1080/10584609.2026.2681041
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-31'
  content: >-
    A series of recent academic papers examines the complex landscape of
    disinformation and conspiracy beliefs. Research highlights how
    disinformation functions as narratives within hybrid media ecosystems,
    explores the hostile misinformation effect driven by ideological congruence,
    and assesses the role of media in spreading conspiracy theories, offering
    insights into challenges, trends, and potential interventions.
  url: https://doi.org/10.1177/14648849241303249
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-27'
  content: >-
    Emerging scholarship critically examines the profound societal implications
    of Artificial Intelligence. Recent studies explore the political economy of
    AI accountability, the 'imaginative landscape' of AI in Silicon Valley, and
    public perspectives on the economics of AI. Further analysis scrutinizes the
    framing of generative AI and large language models in news media, alongside
    discussions on applying social theory to agentic AI systems.
  url: http://arxiv.org/abs/2604.16106v2
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-18'
  content: >-
    New research sheds light on the evolving dynamics of online extremism and
    its impact on public debate. Studies investigate the 'alternative influence
    network' of far-right YouTubers and the relationship between extremist
    online discourse and offline activities, such as those by the Proud Boys.
    Additionally, critical discussions assess the 'death of Twitter' and its
    implications for the decline of online public debate.
  url: https://doi.org/10.2478/nor-2026-0008
  platforms:
    - Mastodon
    - BlueSky
  toread: true
