- date: '2026-05-19'
  content: >-
    Recent academic papers highlight various dimensions of Artificial
    Intelligence and Large Language Models. Featured topics include a discourse
    analysis of Google’s AI Overviews, the importance of incorporating social
    theory into agentic AI frameworks, the representation of generative AI in
    news media, the influence of state media control on LLMs, and a comparative
    study mapping the sociotechnical imaginaries of generative AI across
    international newspapers, alongside multimodal LLMs for visual political
    communication on Instagram.
  url: https://doi.org/10.1177/17504813261447684
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-18'
  content: >-
    A selection of newly released research focuses on online extremism,
    misinformation, and conspiracy theories. Key studies examine the alternative
    influence network of far-right YouTubers and the hybridisation of online
    extremism, the relationship between the Proud Boys’ online discourse and
    their offline activities, the media's role in disseminating conspiracy
    beliefs during crises like the COVID-19 pandemic, and an international
    expert assessment addressing challenges and interventions regarding
    conspiracy theories in digital media. Additionally, insights from climate
    psychology for understanding misinformation are explored, as are protest
    movements' role in mainstreaming radical ideologies.
  url: https://doi.org/10.2478/nor-2026-0008
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-17'
  content: >-
    The evolving landscape of social media, its impact on public debate, and
    challenges in platform research are addressed in several notable papers.
    These include analyses of the decline of public debate following changes to
    platforms like Twitter, how Brazilian parliamentarians establish epistemic
    authority in times of crisis, and the algorithmic transformation of social
    media publics exemplified by TikTok. Methodologically, a systematic review
    of social science studies analyzing social media data from 2010-2024
    provides a comprehensive overview, while another paper explores how Article
    40 of the Digital Services Act (DSA) is reshaping access for platform
    research. Broader conceptual work also considers the emerging field of
    'Post-Social Media Studies'.
  url: https://doi.org/10.5204/mcj.3247
  platforms:
    - Mastodon
    - BlueSky
  toread: true
