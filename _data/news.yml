- date: '2026-07-18'
  content: >-
    Methodological challenges and opportunities in platform-mediated research
    are highlighted in a series of recently curated papers. The featured work
    addresses the complexities of working with platform data in clean room
    environments, the political dynamics of API access, and innovative
    open-source tools like TubeStats and TokStats designed for TikTok and
    YouTube research.
  url: https://doi.org/10.25358/openscience-15825
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-14'
  content: >-
    A collection of newly highlighted studies explores the evolving intersection
    of generative AI and public discourse. The research spans multiple facets of
    this transformation, analyzing how conversational AI shifts user beliefs on
    contested societal issues, its strategic deployment for propaganda in
    digitally authoritarian contexts, and how audiences perceive the credibility
    of AI-assisted news.
  url: https://doi.org/10.1177/26339137261459441
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-18'
  content: >-
    Recent research spotlighted on social media delves into the systemic threats
    facing modern democratic processes and election integrity. The selected
    publications examine how informational pathways and misinformation shape
    trust in election results, the structural limitations of moderation features
    like Community Notes, and how media narratives drive political polarization.
  url: https://doi.org/10.1080/17457289.2026.2701896
  platforms:
    - Mastodon
    - BlueSky
  toread: true
