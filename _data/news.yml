- date: '2026-07-02'
  content: >-
    A critical assessment of crowdsourced fact-checking reveals that X's
    'Community Notes' system systemically undermoderates highly polarizing
    content. The study, co-authored by Paul Bouchaud and Pedro Ramaciotti,
    suggests that the platform's design introduces significant risks during
    electoral processes by failing to address divisive narratives.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-21'
  content: >-
    Can artificial intelligence help combat misinformation? Promising new
    research published by Thomas H. Costello, Gordon Pennycook, and David G.
    Rand demonstrates that engaging in personalized dialogues with generative AI
    can durably reduce conspiracy beliefs, opening up potential new avenues for
    scalable cognitive interventions.
  url: https://doi.org/10.31234/osf.io/xcwdn
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-08'
  content: >-
    Investigating the geopolitical impact of emerging technologies, a
    comparative study by Gabrielle D. Beacken, Inga K. Trauthig, and Samuel C.
    Woolley examines the role of generative AI in state propaganda. The authors
    provide insights into how democratically weakened nations are leveraging
    these tools to reinforce digital authoritarianism.
  url: https://doi.org/10.1177/20539517251410064
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-04'
  content: >-
    New research by Lorenzo Mosca and Fred Paxton shines a light on the Italian
    news ecosystem, mapping how domestic newspapers utilize the 'fake news'
    framing. Rather than acting as neutral arbiters, some outlets are found to
    use the label as a rhetorical weapon for strategic delegitimization and
    selective narrative amplification.
  url: https://doi.org/10.1177/02673231261458935
  platforms:
    - Mastodon
    - BlueSky
  toread: true
