- date: '2026-04-19'
  content: >-
    Exploring the evolving architecture and regulation of digital platforms, a
    collection of papers sheds light on several key areas. Investigations cover
    the 'platformization of everything,' charting the shift from simple social
    features to complex AI infrastructures, and analyzing the transformation of
    social media into 'parasocial media.' Historical perspectives revisit
    'broken connections' from the early internet, while contemporary analyses
    scrutinize the quality of online platform data under the Digital Services
    Act. Additionally, the partisan effects resulting from social media bans are
    explored, contributing to a deeper understanding of platform governance.
  url: https://aoir.social/@fabiogiglietto/116430314384497486
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-04'
  content: >-
    The dynamics of extremism and the challenges of content moderation on social
    media platforms are a focal point of recent academic work. Studies examine
    the 'affective-discursive ecologies of the far right,' detailing their
    multimodal strategies for softening messages, mobilization, and leveraging
    algorithmic proximity on platforms like Instagram. Concurrently, research
    exposes how groups like jihadist supporters exploit algorithmic
    recommendations on platforms such as TikTok to evade content moderation,
    highlighting persistent vulnerabilities in platform security and policy
    enforcement.
  url: https://aoir.social/@fabiogiglietto/116346323497414707
