- date: '2026-06-15'
  content: >-
    Recent research highlighted the evolving impact of artificial intelligence
    on social science methodologies and digital communication. Featured studies
    explore the capacity of AI coding agents to reproduce social science
    findings, critically examine the political economy of AI and its
    implications for accountability, and analyze how platforms like Google are
    framing the future of search through AI Overviews. These publications
    collectively advocate for integrating social theory as a foundational
    framework for agentic AI systems.
  url: http://arxiv.org/abs/2606.11447v1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-06'
  content: >-
    Academic discussions are underway regarding the complex landscape of social
    media data access and its implications for research. Recent papers examine
    the dynamic challenges involved in gaining and maintaining access to
    platform data, proposing methodologies for exploring temporal dynamics in
    digital trace data. The publications also address the critical need for
    robust research infrastructure to facilitate multi-platform analysis of
    electoral discourse, highlighting ongoing debates about the state of play in
    social media data access.
  url: https://doi.org/10.1080/19312458.2026.2664873
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-13'
  content: >-
    Cutting-edge research investigates critical aspects of online
    misinformation, extremism, and narrative control. Studies delve into the
    mechanisms of echo chambers, rabbit holes, and radicalization pathways on
    platforms like YouTube, while also analyzing disinformation as narratives
    within hybrid media ecosystems. Further insights explore how symbolic
    boundary work occurs in conspiracy theory debates, the factors driving the
    assessment of misinformation targets, and the structure of alternative
    influence networks used by far-right groups. This body of work also examines
    how political actors assert epistemic authority during crises.
  url: https://doi.org/10.1080/10584609.2026.2671765
  platforms:
    - Mastodon
    - BlueSky
  toread: true
