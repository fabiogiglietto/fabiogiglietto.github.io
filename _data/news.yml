- date: '2026-05-27'
  content: >-
    A selection of studies delves into the profound societal implications of
    Artificial Intelligence and Large Language Models. These papers explore the
    political economy of AI and accountability, its imaginative landscape and
    "quiet futuring," public perceptions of its economic impact, the framing of
    AI Overviews in search engines, and proposals for integrating social theory
    into agentic AI frameworks.
  url: https://aoir.social/@fabiogiglietto/116648313314249923
