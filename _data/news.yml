  content: >-
    Several articles on misinformation and fact-checking have been highlighted
    recently. These include studies on everyday encounters with misinformation
    online, defenses of fact-checking partnerships with platform companies, and
    the impact of difficulty in identifying deepfakes on truth discernment. Also
    included are articles on the governance of AI and its effects on credibility
    within fact-checking videos and the epistemological implications of
    fact-checking in the era of generative AI.
