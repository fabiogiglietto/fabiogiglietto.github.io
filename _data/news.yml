- date: '2026-03-16'
  content: >-
    Emerging research emphasizes the role of AI in various domains. Studies
    examine the 'AI hype' within journalism, analyzing visibility, power
    dynamics, and the politics of media narratives. Additionally, findings
    suggest that Large Language Models (LLMs) can infer political alignment from
    online conversations, raising concerns about potential biases and
    applications.
