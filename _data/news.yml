- date: '2026-06-19'
  content: >-
    A collection of recent papers investigates public attitudes towards
    Artificial Intelligence and the dynamics driving its discourse. One study by
    Eliana Fattorini et al. delves into Italian public perceptions of AI and how
    technology-related issues traverse social conversations. Another analysis by
    Vanessa Richter et al. provides a longitudinal perspective on who has been
    fueling the "AI hype" in its formative phase, examining the roles of various
    stakeholders in US and German AI discourse on Twitter between 2012 and 2021.
  url: https://aoir.social/@fabiogiglietto/116777720588518320
  platforms:
    - Mastodon
    - BlueSky
