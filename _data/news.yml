- date: '2026-05-18'
  content: >-
    Prof. Giglietto has recently drawn attention to influential research
    exploring the dynamic landscape of misinformation, conspiracy theories, and
    online extremism. Featured papers analyze the alternative influence networks
    of far-right YouTubers, the interplay between extremist group discourse and
    real-world activities, media's contribution to conspiracy belief
    dissemination during the COVID-19 pandemic, and expert assessments of global
    misinformation challenges. Other highlighted topics include climate
    psychology's insights for misinformation studies, the mainstreaming of
    radical ideologies through protest movements, and a comprehensive review of
    25 years of online radicalization research.
