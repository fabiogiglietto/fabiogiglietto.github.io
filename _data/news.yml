- date: '2026-07-22'
  content: >-
    A new co-authored study published in Information, Communication & Society
    examines partisan community dynamics on social media. The paper, 'Measuring
    partisan community dynamics: a longitudinal analysis of affective engagement
    in pro-Bolsonaro Facebook networks,' offers a longitudinal analysis of how
    affective engagement shapes political networks on Facebook.
  url: https://doi.org/10.1080/1369118x.2026.2696929
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-18'
  content: >-
    Methodological challenges in the era of restricted API access are the focus
    of a recent paper by Axel Bruns and Laura Vodden. The authors evaluate the
    practical hurdles researchers face when analyzing social media data within
    secure 'clean room' environments, pointing to crucial implications for
    independent platform oversight.
  url: https://doi.org/10.25358/openscience-15825
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    Newly released research in Science Advances reveals that crowdsourced
    fact-checking systems may fall short during elections. The study
    demonstrates how X's Community Notes feature, by design, undermoderates
    highly polarizing content, highlighting potential vulnerabilities in
    platform-led democratic safeguards.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-01'
  content: >-
    An investigation into public trust in automated journalism suggests that AI
    involvement affects reader engagement. Published in Scientific Reports, the
    paper analyzes how audience perceptions of news quality and their
    willingness to engage change when encountering AI-generated versus
    AI-assisted articles.
  url: https://doi.org/10.1038/s41598-026-58743-0
  platforms:
    - Mastodon
    - BlueSky
  toread: true
