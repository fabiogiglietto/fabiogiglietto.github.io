- date: '2026-07-12'
  content: >-
    Recent research highlights the evolving persuasive power of generative AI,
    exploring how conversational models can shift public beliefs and even
    counter misinformation. Notable additions to the literature include a study
    by Johannes Kotz et al. on conversational AI's capacity to sway skeptics on
    contested issues, findings from Kobi Hackenburg et al. demonstrating AI's
    ability to out-persuade expert humans, and work by Thomas H. Costello et al.
    showing how structured dialogues with AI can durably reduce conspiracy
    beliefs.
