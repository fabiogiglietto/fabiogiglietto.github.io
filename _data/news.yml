- date: '2026-07-15'
  content: >-
    Understanding and countering digital propaganda remains a primary focus of
    global communication research. Newly highlighted work by Ramos et al.
    advocates for narrative monitoring to elevate disinformation countermeasures
    beyond traditional fact-checking. Complementing this, research from Karlsson
    explores how media narratives during digital election interference shape
    polarization, while Beacken et al. investigate the intersection of
    generative AI, propaganda, and digital authoritarianism across six
    democratically weakened nations.
  url: https://doi.org/10.37016/mr-2020-198
