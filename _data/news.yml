- date: '2026-07-18'
  content: >-
    Amid growing concerns over democratic resilience, new academic literature
    highlights how digital architectures and informational pathways shape public
    trust. Recent studies examine the direct links between misinformation and
    confidence in election results, analyze the systemic risks of crowd-sourced
    moderation systems like Community Notes, and explore the effectiveness of
    moving beyond standard fact-checking toward broader narrative monitoring.
  url: https://doi.org/10.1080/17457289.2026.2701896
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-18'
  content: >-
    Methodological access to platform data remains a critical flashpoint for
    digital media scholars. Recent publications delve into the structural
    challenges of working within restricted clean room environments, discuss the
    politics of API-mediated academic access, and introduce new open-source
    tools like TubeStats and TokStats designed for drawing random samples from
    YouTube and TikTok.
  url: https://doi.org/10.25358/openscience-15825
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-14'
  content: >-
    As generative AI tools become deeply integrated into online communication,
    researchers are tracking their shifting impact on public trust and opinion.
    Key insights from recent papers explore how conversational AI influences the
    beliefs of skeptics on contested societal issues, investigate multi-level
    frameworks for trust in generative systems, and assess how audiences
    perceive the quality of AI-assisted news reporting.
  url: https://doi.org/10.1177/26339137261459441
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-07'
  content: >-
    Geopolitical tensions and domestic media dynamics are fueling new research
    into state-backed propaganda and media manipulation. Scholars are analyzing
    Russian domestic and international media strategies in the Russo-Ukrainian
    war, evaluating two decades of cross-national troll behavior in East Asia,
    and exploring how European newspapers use charges of 'fake news'
    strategically to delegitimize political opponents.
  url: https://doi.org/10.1177/02673231261458935
  platforms:
    - Mastodon
    - BlueSky
  toread: true
