- date: '2026-05-17'
  content: >-
    A series of recent scholarly works draws attention to the critical issues of
    misinformation, conspiracy theories, and online radicalization. These papers
    investigate the mechanisms through which media contribute to the
    dissemination of conspiracy beliefs, the mainstreaming of radical ideologies
    via protest movements, and the tangible links between online discourse and
    offline extremist activities, exemplified by groups such as the Proud Boys.
  url: https://aoir.social/@fabiogiglietto/116588918319552332
