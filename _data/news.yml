- date: '2026-07-02'
  content: >-
    Emerging scholarship delves into the expanding role of Artificial
    Intelligence across media, public perception, and research methodologies.
    Papers investigate the automation of scientific review processes, public
    perceptions and intended engagement with AI-generated news, and the evolving
    framework for understanding trust in generative AI. Researchers are also
    examining how AI systems can out-persuade humans, general attitudes towards
    AI (including a specific study on Italians), the stakeholders driving the AI
    hype, and the potential for AI coding agents to reproduce social science
    findings.
  url: https://aoir.social/@fabiogiglietto/116850092010165499
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-03'
  content: >-
    A significant methodological paper poses a fundamental question for survey
    research: 'Where's the Evidence that Respondents Understand Your Survey
    Questions?' This work highlights the crucial need for robust methods to
    ensure participant comprehension, a cornerstone of valid social science data
    collection.
  url: https://aoir.social/@fabiogiglietto/116854456723341205
