- date: '2026-05-19'
  content: >-
    Important contributions to understanding the societal implications of
    Artificial Intelligence and Large Language Models have been noted. This
    includes a discourse analysis of Google’s AI Overviews, a formal framework
    advocating for social theory as a structural prior for agentic AI, research
    mapping the sociotechnical imaginaries of generative AI in international
    newspapers, and the application of multimodal LLMs for analyzing visual
    political communication on Instagram.
