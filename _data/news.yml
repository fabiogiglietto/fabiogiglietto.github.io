- date: '2026-06-16'
  content: >-
    Recent research by Vanessa Richter et al. offers a longitudinal analysis of
    the stakeholders contributing to AI discourse and the development of 'AI
    hype' on Twitter in the US and Germany between 2012 and 2021. The paper
    investigates who has been driving conversations during the formative phase
    of AI.
  url: https://doi.org/10.1007/s00146-026-03079-6
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-15'
  content: >-
    A paper by Lion Wedel investigates how young adults perceive informativeness
    on audio-visual digital platforms. This study, titled 'What is informative
    to young adults? Decoding informativeness perceptions among audiences of
    audio-visual digital platforms,' provides valuable insights into
    contemporary media consumption habits.
  url: https://doi.org/10.1080/21670811.2026.2685660
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-15'
  content: >-
    New findings published by Meysam Alizadeh et al. suggest that AI coding
    agents are capable of replicating results from social science research. This
    development highlights potential advancements and implications for
    methodologies in the social sciences.
  url: http://arxiv.org/abs/2606.11447v1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-13'
  content: >-
    Research by Megan A. Brown et al. delves into the mechanisms of echo
    chambers, 'rabbit holes,' and radicalization pathways specifically within
    the YouTube platform. The study provides an evaluation of these phenomena,
    crucial for understanding digital media effects.
  url: https://doi.org/10.1080/10584609.2026.2671765
  platforms:
    - Mastodon
