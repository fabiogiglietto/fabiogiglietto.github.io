- date: '2026-06-16'
  content: >-
    New findings from Vanessa Richter et al. delve into the early stages of
    artificial intelligence discourse, examining stakeholders responsible for
    driving the AI hype. This longitudinal analysis focuses on US and German AI
    discourse on Twitter from 2012–2021.
  url: https://doi.org/10.1007/s00146-026-03079-6
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-15'
  content: >-
    Insights into youth media consumption and perception are offered by a paper
    exploring what young adults find informative. Authored by Lion Wedel, the
    research decodes informativeness perceptions among audiences of audio-visual
    digital platforms.
  url: https://doi.org/10.1080/21670811.2026.2685660
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-06'
  content: >-
    Communication research benefits from new methodological approaches for
    exploring temporal dynamics in digital trace data. A paper by Yangliu Fan,
    Jakob Ohme, and Lion Wedel introduces methods for mining user-sequences to
    advance understanding in the field.
  url: https://doi.org/10.1080/19312458.2026.2664873
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-04'
  content: >-
    The evolving landscape of social media data access for research is
    critically examined in a recent publication. Claes H. de Vreese and Rebekah
    Tromble discuss the challenges and current state of play, titled 'Moving
    targets, moving politics: The state of play in social media data access.'
  url: https://doi.org/10.1080/10584609.2026.2681041
  platforms:
