- date: '2026-05-18'
  content: >-
    Current scholarship investigates the rise and impact of online extremism and
    the dynamics of political discourse on social media. Recent studies analyze
    the alternative influence networks of far-right YouTubers, detailing the
    connectivity and hybridization of online extremism, particularly during the
    Covid-19 pandemic. Other research examines the relationship between specific
    groups like the Proud Boys' online discourse and their offline activities,
    and how parliamentarians leverage digital platforms to establish epistemic
    authority in times of crisis.
  url: https://aoir.social/@fabiogiglietto/116594462275492068
