- date: '2026-07-08'
  content: >-
    Democratically weakened nations face distinct threats from modern
    disinformation campaigns, according to a comparative study by Gabrielle D.
    Beacken, Inga K. Trauthig, and Samuel C. Woolley. The authors analyze how
    generative AI and state propaganda intersect to foster digital
    authoritarianism across six different countries.
  url: https://doi.org/10.1177/20539517251410064
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    A critical study published in Science Advances examines the design of X's
    (formerly Twitter) Community Notes, suggesting that the crowdsourced
    moderation system inherently undermoderates highly polarizing content.
    Authors Paul Bouchaud and Pedro Ramaciotti argue that this structural
    limitation poses significant risks, particularly during crucial electoral
    processes.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-27'
  content: >-
    New research on the communicative capabilities of large language models
    shows that AI systems are now capable of out-persuading expert humans in
    debate environments. The pre-print study, authored by Kobi Hackenburg and
    colleagues, highlights the rapidly evolving social and political
    implications of persuasive AI technologies.
  url: http://arxiv.org/abs/2606.16475v1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-21'
  content: >-
    In a novel intervention study, researchers Thomas H. Costello, Gordon
    Pennycook, and David G. Rand demonstrate that personalized dialogues with
    generative AI can durably reduce individuals' conspiracy beliefs. The
    findings point to potential scalable avenues for addressing misinformation
    through conversational technology.
  url: https://doi.org/10.31234/osf.io/xcwdn
  platforms:
    - Mastodon
    - BlueSky
  toread: true
