- date: '2026-06-01'
  content: >-
    New research sheds light on the complex dynamics of misinformation and
    conspiracy beliefs in digital environments. Papers explore how
    disinformation is understood as narratives within hybrid media ecosystems,
    the impact of ideological congruence on misinformation assessment, and the
    role of media in spreading conspiracy theories during crises like the
    COVID-19 pandemic. Insights from climate psychology are also being applied
    to the study of misinformation, alongside international expert assessments
    on trends and interventions.
  url: https://aoir.social/@fabiogiglietto/116673911616599932
