- date: '2026-06-21'
  content: >-
    Recent scholarship explores various facets of Artificial Intelligence and
    its societal implications. Key papers examine methods for durably reducing
    conspiracy beliefs through dialogues with AI, analyze Italian public
    attitudes towards AI and how technology issues permeate social conversation,
    investigate the drivers of AI hype among stakeholders, assess AI coding
    agents' capacity to reproduce social science findings, and discuss the
    political economy of AI in the pursuit of accountability.
  url: https://doi.org/10.31234/osf.io/xcwdn
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-15'
  content: >-
    A collection of recent studies delves into social media dynamics,
    disinformation, and challenges in platform data access. Highlighted research
    includes decoding informativeness perceptions among young adults on
    audio-visual digital platforms, evaluating echo chambers, rabbit holes, and
    radicalization pathways on YouTube, exploring temporal dynamics in digital
    trace data for communication research, and analyzing the evolving landscape
    of social media data access for research.
  url: https://doi.org/10.1080/21670811.2026.2685660
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-01'
  content: >-
    New academic insights have been shared concerning algorithms,
    misinformation, and their role in election contexts. This includes an
    assessment of platform data access for election research, focusing on price,
    proficiency, and permission, alongside studies on redesigning algorithms to
    intervene on social norm misperceptions during national elections, and
    understanding disinformation as narratives within hybrid media ecosystems.
  url: https://doi.org/10.1080/1369118x.2026.2667921
  platforms:
    - Mastodon
    - BlueSky
  toread: true
