- date: '2026-07-14'
  content: >-
    A new study examines the shifting landscape of platform-mediated research
    and the politics of data access. Authors Zoë Natalia Cullen, Nicole B.
    Ellison, and Irene V. Pasquetto explore how APIs shape scientific inquiry
    and evaluate the broader academic implications of restricted platform access
    in the current digital research era.
