- date: '2026-07-08'
  content: >-
    A new wave of research examines the evolving tactics of digital propaganda
    and election interference. Key studies investigate the impact of media
    narratives on political polarization, the deployment of generative AI by
    authoritarian regimes, and the strategic use of fake news rhetoric in
    national media systems.
  url: https://doi.org/10.1177/14614448251410509
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-03'
  content: >-
    Methodological advancements and the automation of academic workflows are the
    focus of recent literature. Key discussions center on verifying respondent
    comprehension in survey-based research and evaluating the capabilities of
    automated platforms like Google's Paper Assistant Tool to streamline peer
    review.
  url: http://arxiv.org/abs/2606.28277v1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    Academic interest in platform governance has intensified with new analyses
    of content moderation. Recent papers evaluate the structural limitations of
    crowd-sourced systems like Community Notes during elections and
    contextualize platform regulation under the EU Digital Services Act (DSA) as
    a form of systemic traffic control.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-01'
  content: >-
    A series of newly published papers explores the cognitive and social impacts
    of generative AI. Researchers are addressing how AI-generated news affects
    audience engagement, how trust in generative systems is built across media
    levels, and the potential for AI models to out-persuade human experts or
    dismantle deeply held conspiracy beliefs.
  url: https://doi.org/10.1038/s41598-026-58743-0
  platforms:
    - Mastodon
    - BlueSky
  toread: true
