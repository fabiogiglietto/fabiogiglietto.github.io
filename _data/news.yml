- date: '2026-03-16'
  content: >-
    New research examines the role of AI in various domains, including
    journalism and political persuasion. One study focuses on AI hype in
    journalism, exploring visibility, power, and the politics of media
    narratives. Another investigates the levers of political persuasion with
    conversational artificial intelligence. In addition, studies explore the use
    of LLMs to infer political alignment from online conversations, and the rise
    of deepfake financial fraud and its global regulation.
  url: https://aoir.social/@fabiogiglietto/116240626949041455
