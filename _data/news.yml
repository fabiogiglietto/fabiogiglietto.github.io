- date: '2026-06-28'
  content: >-
    Emerging research critically examines the evolving landscape of platform
    regulation and data access. This includes comparative analyses of content
    moderation legislation in the EU and US, alongside discussions on the
    current state of social media data accessibility for academic research,
    particularly concerning election studies.
