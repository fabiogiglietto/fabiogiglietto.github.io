- date: '2026-06-06'
  content: >-
    Recent academic discussions highlight critical issues surrounding social
    media data access for research. Multiple papers explore challenges in mining
    user-sequences for communication research, analyze the evolving political
    landscape of data access, assess the barriers related to price, proficiency,
    and permission for election research, and discuss multi-platform analysis of
    electoral discourse as a research infrastructure problem.
