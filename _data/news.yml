- date: '2026-05-17'
  content: >-
    Recent academic discussions highlighted for review delve into the evolving
    landscape of social media, examining the implications of Twitter's decline
    on public debate, the algorithmic transformation of platforms like TikTok,
    and broader shifts towards a 'post-social media' era. Topics also explore
    the 'platformization of everything' and the rise of scam culture on these
    digital spaces.
