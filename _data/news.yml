- date: '2026-07-07'
  content: >-
    Several key studies analyzing critical aspects of online information
    environments, from disinformation to platform governance, have been brought
    to attention. Recent research investigates state media propaganda tactics in
    conflicts such as the Russo-Ukrainian war, the strategic deployment of fake
    news, and the efficacy of content moderation mechanisms like 'Community
    Notes' in addressing polarizing content. Further insights include analyses
    of content moderation legislation in the EU and US, cross-national
    information attacks, and the intricate dynamics of alternative media within
    digital news ecosystems.
  url: >-
    https://scholar.google.com/scholar?q=Selling%20war%20at%20home%20and%20abroad%3A%20The%20dual%20objective%20of%20state%20media%20propaganda%20in%20the%20Russo-Ukrainian%20war
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    Recent scholarship highlighted delves into the profound impact of Artificial
    Intelligence on society and media. Featured research explores public trust
    and perceptions of generative AI, its role in shaping public attitudes, and
    the dynamics of 'AI hype.' Other studies examine the persuasive power of AI
    systems, their potential applications in scientific review and social
    science research, and their influence on news consumption, especially
    concerning AI-generated content.
  url: http://arxiv.org/abs/2606.28277v1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
