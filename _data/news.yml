- date: '2026-05-21'
  content: >-
    A recent collection of academic publications extensively covers the dynamics
    of misinformation and conspiracy theories across digital platforms. Key
    research explores how individuals engage in symbolic boundary work during
    major debates like the “Great Reset,” investigates the hostile
    misinformation effect driven by ideological congruence, and analyzes the
    media's role in disseminating conspiracy beliefs, particularly during crises
    such as the COVID-19 pandemic. Further studies examine the link between the
    online discourse and offline activities of groups like the Proud Boys, offer
    international expert assessments on intervention strategies, and provide
    insights from climate psychology relevant to misinformation.
  url: https://doi.org/10.1177/14614448261446590
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-20'
  content: >-
    Emerging research delves into the multifaceted societal implications of
    Generative AI and Large Language Models (LLMs). Publications highlight
    findings on the economic perceptions of AI based on large-scale surveys and
    analyze the framing of AI Overviews in search engines. Other studies
    emphasize the importance of social theory as a structural prior for agentic
    AI systems, examine the agentic portrayal of these technologies in news
    media, and investigate how state media control can influence LLMs.
    Additionally, research explores the sociotechnical imaginaries surrounding
    GenAI in global newspapers and the application of multimodal LLMs for visual
    political communication on platforms like Instagram.
  url: >-
    https://scholar.google.com/scholar?q=What%2081%2C000%20people%20told%20us%20about%20the%20economics%20of%20AI
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-18'
  content: >-
    Recent academic work sheds light on various aspects of social media dynamics
    and online discourse. Studies investigate the structure and impact of
    alternative influence networks, such as those involving far-right YouTubers,
    and analyze the perceived decline of public debate on platforms like
    Twitter. Other research provides insights into how micro-influencers adapt
    to platform culture demands and how political actors, like Brazilian
    parliamentarians, navigate online spaces to assert epistemic authority
    during times of crisis. This period also saw the publication of a
    comprehensive systematic review of social science studies analyzing social
    media data from 2010-2024.
  url: https://doi.org/10.2478/nor-2026-0008
  platforms:
    - Mastodon
    - BlueSky
  toread: true
