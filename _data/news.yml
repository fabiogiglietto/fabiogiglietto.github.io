- date: '2026-07-02'
  content: >-
    Recent academic discourse highlighted on Prof. Giglietto's social media
    platforms extensively explores the multifaceted impact of Artificial
    Intelligence on media, public perception, and societal trust. Discussions
    include how AI-generated news influences quality perceptions and engagement,
    frameworks for understanding trust in generative AI, and analyses of
    cross-national attitudes towards AI technology. Key research also delves
    into AI's persuasive capabilities and its potential in reducing conspiracy
    beliefs through dialogue.
  url: https://doi.org/10.1080/08838151.2026.2694048
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-04'
  content: >-
    Critical issues in misinformation and platform governance are underscored by
    academic discussions shared, focusing on the strategic use of fake news as a
    rhetorical weapon, the effectiveness of moderation tools like Community
    Notes, and cross-national analyses of troll behavior. Further commentary
    explores platform collective behavior within the Digital Services Act (DSA)
    framework and evaluates content moderation strategies as 'traffic control,'
    alongside studies on echo chambers and radicalization pathways on platforms
    like YouTube.
  url: https://doi.org/10.1177/02673231261458935
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-28'
  content: >-
    Research into the evolving digital news landscape examines how alternative
    media are positioned within the broader ecosystem through cross-country
    comparative studies of audience overlap networks. Additional insights
    analyze young adults' perceptions of informativeness across various
    audio-visual digital platforms, contributing to a deeper understanding of
    contemporary news consumption habits.
  url: https://doi.org/10.1080/21670811.2026.2683342
  platforms:
    - Mastodon
    - BlueSky
  toread: true
