- date: '2026-06-19'
  content: >-
    A collection of recent academic papers has shed light on various facets of
    Artificial Intelligence. These include research into Italians’ attitudes
    towards AI and the evolving discourse surrounding the technology, an
    analysis of stakeholders driving the AI hype in the US and Germany, and
    studies examining the political economy of AI and its imaginative landscape.
  url: https://doi.org/10.1080/1369118x.2026.2689030
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-06'
  content: >-
    Several new studies explored pivotal themes in social media research,
    specifically focusing on the challenges of platform data access for academic
    inquiry. Topics covered include the state of social media data access for
    election research, the complexities of multi-platform analysis in electoral
    discourse, and innovative methodologies for mining temporal dynamics in
    digital trace data.
  url: https://doi.org/10.1080/19312458.2026.2664873
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-13'
  content: >-
    New publications delve into the complex landscape of misinformation and
    online social dynamics. Research explores the evaluation of echo chambers
    and radicalization pathways on YouTube, the hostile misinformation effect
    driven by ideological congruence, algorithmic interventions designed to
    mitigate social norm misperceptions during elections, and the symbolic
    boundary work evident in 'Great Reset' debates across social media
    platforms.
  url: https://doi.org/10.1080/10584609.2026.2671765
  platforms:
    - Mastodon
    - BlueSky
  toread: true
