- date: '2026-07-02'
  content: >-
    A newly published study in Science Advances investigates how crowdsourced
    moderation systems like X's Community Notes function during elections.
    Authors Paul Bouchaud and Pedro Ramaciotti argue that the system's design
    inherently undermoderates highly polarizing content, posing significant
    risks to the integrity of democratic electoral processes.
