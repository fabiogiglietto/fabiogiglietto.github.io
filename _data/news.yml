- date: '2026-03-27'
  content: >-
    Several studies are exploring the impact of social media and digital
    platforms on political discourse and behavior. One paper investigates the
    partisan effects of social media bans. Other research analyzes electoral
    misinformation and political intolerance in Brazil and how connective action
    and digital repression played out during China's COVID-19 protests on
    Twitter.
  url: https://aoir.social/@fabiogiglietto/116302263923507409
