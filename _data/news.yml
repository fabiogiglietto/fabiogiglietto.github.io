  content: >-
    A recent study investigates how individuals engaging in 'Great Reset'
    debates across social media platforms perform symbolic boundary work,
    framing themselves as 'conspiracy theorists' to define their community. This
    research, authored by Kamile Grusauskaite et al., sheds light on online
    identity formation and contentious discourse.
