- date: '2026-07-01'
  content: >-
    A range of new academic research on Artificial Intelligence and its societal
    impact has been highlighted. Featured studies explore public trust in
    generative AI, how AI influences perceptions of news quality, its persuasive
    capabilities, and its potential in mitigating conspiracy beliefs. Other key
    discussions include national attitudes towards AI, the driving forces behind
    AI hype, and the capacity of AI coding agents to reproduce social science
    findings.
  url: https://doi.org/10.1038/s41598-026-58743-0
