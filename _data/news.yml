  content: >-
    Emerging cognitive science and AI research highlights the profound
    persuasive capabilities of conversational large language models. Recent
    studies demonstrate that AI systems can systematically shift beliefs on
    contested societal issues, out-persuade expert humans in structured debates,
    and even durably reduce deeply held conspiracy beliefs through personalized
    dialogues.
