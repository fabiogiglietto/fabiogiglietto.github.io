- date: '2026-05-18'
  content: >-
    Recent scholarly attention has been drawn to the evolving impact of
    Artificial Intelligence and Large Language Models (LLMs) on society. Newly
    shared research explores how social theory should serve as a structural
    prior for agentic AI, investigates the media's framing of generative AI, and
    examines the influence of state media control on LLMs. Further studies
    highlight the application of multimodal LLMs in visual political
    communication and analyze the sociotechnical imaginaries of generative AI
    across different national newspapers.
