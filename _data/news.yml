- date: '2026-06-04'
  content: >-
    The challenges and implications of social media data access for academic
    inquiry are examined in recent papers. Topics include the 'moving targets'
    of social media politics affecting data access, and an assessment of the
    factors—price, proficiency, or permission—influencing platform data
    availability for election research.
