- date: '2026-03-13'
  content: >-
    Research examines the influence of AI on online manipulation and fraud.
    Investigations explore the use of conversational AI in political persuasion,
    and the global regulation of AI-driven scams, specifically focusing on
    deepfake financial fraud.
