- date: '2026-05-18'
  content: >-
    New research in the field of artificial intelligence and large language
    models (LLMs) has been brought to attention, focusing on crucial societal
    and political dimensions. Noteworthy papers explore integrating social
    theory into agentic AI frameworks, analyze the media's framing of generative
    AI, investigate the influence of state media control on LLMs, and map
    sociotechnical imaginaries of AI in global newspapers. Additionally, studies
    on multimodal LLMs for visual political communication on Instagram are
    highlighted.
  url: https://aoir.social/@fabiogiglietto/116594108383730329
