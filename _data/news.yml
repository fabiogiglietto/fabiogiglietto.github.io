- date: '2026-06-16'
  content: >-
    A selection of recent academic papers exploring the societal impacts and
    discourse surrounding Artificial Intelligence have been highlighted. Topics
    include analyses of AI hype drivers, the capabilities of AI coding agents in
    social science research, the political economy of AI accountability, the
    "imaginative landscape" of AI from Silicon Valley, and insights into the
    economics of AI.
  url: https://doi.org/10.1007/s00146-026-03079-6
