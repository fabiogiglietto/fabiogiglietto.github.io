- date: '2026-04-11'
  content: >-
    Recent studies explore the multifaceted challenges of misinformation and
    platform governance. One paper examines how deceptive online networks
    reached millions during the US 2020 elections. Another investigates the
    quality of online platform data in the context of the Digital Services Act,
    highlighting the relevance of data despite potential limitations in mentions
    and attention.
