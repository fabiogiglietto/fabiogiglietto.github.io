- date: '2026-07-14'
  content: >-
    The rapid integration of generative artificial intelligence is reshaping the
    public sphere and public trust. Newly published studies investigate how
    conversational AI shifts beliefs on contested societal issues, how audiences
    perceive the quality of AI-generated news, and what these shifts mean for
    the future of digital public squares.
  url: https://doi.org/10.1177/26339137261459441
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-14'
  content: >-
    Navigating platform-mediated research has become increasingly complex,
    prompting the development of new methodology-focused literature. Recent
    studies introduce dedicated tools for generating random samples on YouTube
    and TikTok, while critically examining the political dimensions of platform
    API access and its downstream effects on academic freedom.
  url: https://doi.org/10.1177/20539517261461463
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-08'
  content: >-
    Scholars are mapping the global landscape of digital propaganda, focusing on
    how media narratives drive political polarization and digital interference.
    Recent comparative research highlights the role of generative AI in
    bolstering digital authoritarianism across democratically weakened nations,
    alongside long-term analyses of state-sponsored information attacks and
    trolling behaviors.
  url: https://doi.org/10.1177/20539517251410064
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    Critical discussions around digital governance are gaining momentum as new
    scholarship evaluates platform regulation in the EU and US. Key analyses
    focus on content moderation frameworks under the Digital Services Act (DSA)
    and highlight design vulnerabilities in crowdsourced moderation tools, such
    as Community Notes, which may inadvertently undermoderate polarizing content
    during electoral processes.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
