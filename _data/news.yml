- date: '2026-06-28'
  content: >-
    Focusing on the rapidly evolving landscape of artificial intelligence, a
    collection of recently highlighted academic papers explores various facets
    of AI's societal impact. Topics include the role of content moderation in
    platform regulation, how generative AI influences media cognition, the
    persuasive capabilities of AI systems, and novel approaches to reducing
    conspiracy beliefs through AI dialogues. Further studies investigate public
    attitudes towards AI in Italy and analyze the stakeholders driving AI
    discourse, alongside the capacity of AI coding agents to replicate social
    science findings. This curated selection points to ongoing critical research
    at the intersection of AI, communication, and social behavior.
  url: https://doi.org/10.1080/21624887.2026.2692735
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-13'
  content: >-
    Several recent academic publications draw attention to critical issues
    within social media dynamics and digital research methodologies. Notable
    works address the evaluation of echo chambers, rabbit holes, and
    radicalization pathways on platforms like YouTube. Other research explores
    temporal dynamics in digital trace data, examines the evolving state of
    social media data access for election research, and analyzes disinformation
    as narratives within hybrid media ecosystems. These highlighted papers
    underscore the complex challenges and innovative methods in understanding
    online information environments.
  url: https://doi.org/10.1080/10584609.2026.2671765
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-15'
  content: >-
    Research into digital audiences recently highlighted focuses on
    understanding how young adults perceive informativeness on audio-visual
    digital platforms. This study sheds light on the factors that shape
    perceptions of valuable information among key demographic groups engaging
    with contemporary digital content.
  url: https://doi.org/10.1080/21670811.2026.2685660
  platforms:
