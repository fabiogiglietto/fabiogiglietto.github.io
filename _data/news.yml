- date: '2026-07-22'
  content: >-
    A newly published longitudinal study in Information, Communication & Society
    examines the dynamics of pro-Bolsonaro Facebook networks. Co-authored with
    Giada Marino and Bruna Paroni, the paper measures affective engagement to
    understand how partisan community dynamics evolve on social media platforms
    over time.
  url: https://doi.org/10.1080/1369118x.2026.2696929
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-14'
  content: >-
    The growing role of artificial intelligence in public discourse is the focus
    of several newly highlighted papers. These studies investigate how
    AI-generated news affects public quality perceptions, the capacity of
    conversational AI to shift skeptic beliefs on contested societal issues, and
    the broader implications of generative AI for the future of digital public
    squares.
  url: https://doi.org/10.1177/26339137261459441
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-18'
  content: >-
    Navigating the shifting landscape of social media research, recent
    publications address the methodologies of platform data collection. The
    featured literature details the practical challenges of working within
    platform-controlled 'clean room' environments and critiques the politics of
    access in platform-mediated API research.
  url: https://doi.org/10.25358/openscience-15825
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-18'
  content: >-
    New research addresses ongoing threats to democratic systems, exploring how
    misinformation and diverse informational pathways erode trust in election
    outcomes. Additionally, a highlighted study analyzes how crowdsourced
    moderation systems, such as X's Community Notes, may systematically
    undermoderate polarizing content by design during electoral processes.
  url: https://doi.org/10.1080/17457289.2026.2701896
  platforms:
    - Mastodon
    - BlueSky
  toread: true
