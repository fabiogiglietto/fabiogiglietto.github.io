- date: '2026-04-27'
  content: >-
    An important paper by Jakob Ohme and LK Seiling has been shared, discussing
    the practical implications of Article 40 of the Digital Services Act (DSA)
    for platform research. The article, titled 'Finally, access,' examines how
    this regulation changes the landscape for researchers engaging with social
    media platforms.
  url: https://doi.org/10.1080/10584609.2026.2664157
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-25'
  content: >-
    Paolo Gerbaudo's paper on 'TikTok and the algorithmic transformation of
    social media publics' has been noted. The research delves into how TikTok
    shifts social media from traditional social networks to new models of social
    interest clusters, offering a fresh perspective on platform dynamics.
  url: https://doi.org/10.1177/14614448241304106
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-17'
  content: >-
    A thought-provoking article by danah boyd, arguing that 'Social media is now
    parasocial media,' has been shared. This paper re-evaluates the nature of
    contemporary social media interactions, highlighting the increasing
    prevalence of one-sided, celebrity-like engagements between users and
    content creators.
  url: https://doi.org/10.1177/20563051261437487
