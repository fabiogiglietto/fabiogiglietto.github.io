- date: '2026-07-02'
  content: >-
    Platform governance faces critical scrutiny as new analyses assess
    democratic infrastructure in the Digital Services Act (DSA) era. Key
    findings suggest that decentralized moderation tools like X's 'Community
    Notes' may undermoderate polarizing content by design, while broader
    comparative studies analogize content moderation to traffic control under
    evolving Western regulatory frameworks.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-12'
  content: >-
    Unpacking the dynamics of political polarization, scholars are investigating
    how research methodologies and narrative framing affect our understanding of
    media slant. Recent publications highlight how choices in measuring partisan
    bias drive conclusions about polarization in the US, while related work
    explores the impact of media narratives on digital election interference.
  url: https://doi.org/10.1080/10584609.2026.2699105
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-08'
  content: >-
    The intersection of technology and state-sponsored messaging remains a
    critical focus of political communication research. New comparative studies
    examine how generative AI is leveraged for digital authoritarianism across
    democratically weakened nations, alongside analyses of Russian state media
    propaganda objectives and the strategic use of fake news rhetoric in
    European journalism.
  url: https://doi.org/10.1177/20539517251410064
