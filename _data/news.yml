- date: '2026-05-17'
  content: >-
    Recent academic discussions highlighted by Prof. Giglietto underscore the
    evolving landscape of digital platforms, social media dynamics, and their
    implications for public debate and political communication. Topics covered
    include the transformation of platforms like Twitter and TikTok, the role of
    micro-influencers, the impact of new regulations like Article 40 DSA on
    platform research, the concept of platformization, and the pursuit of
    epistemic authority by parliamentarians in crisis.
  url: https://doi.org/10.5204/mcj.3247
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-17'
  content: >-
    A collection of shared research delves into critical areas of
    misinformation, conspiracy theories, and radicalization within online
    environments. These studies investigate how media contribute to the spread
    of conspiracy beliefs, offer international expert assessments of challenges
    in digital media, provide insights from climate psychology for understanding
    misinformation, and analyze the mainstreaming of radical ideologies through
    protest movements, including a review of 25 years of online radicalization
    research.
  url: https://doi.org/10.1017/s0003055423001478
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-15'
  content: >-
    Academic papers shared by Prof. Giglietto explore the burgeoning field of
    Generative AI and Large Language Models (LLMs). Key areas of focus include
    how generative AI is framed in news media, the influence of state media
    control on LLMs, the mapping of sociotechnical imaginaries of generative AI
    across different national newspapers, and the application of multimodal LLMs
    for visual political communication on platforms like Instagram.
  url: https://doi.org/10.1007/s00146-026-03070-1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-09'
  content: >-
    A systematic review of social science studies analyzing social media data
    from 2010 to 2024 has been highlighted, offering a comprehensive look at
    evolving methodologies and research trends in this critical area.
