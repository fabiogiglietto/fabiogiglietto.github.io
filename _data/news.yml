- date: '2026-07-02'
  content: >-
    Emerging research raises critical concerns about crowd-sourced content
    moderation, demonstrating that X's (formerly Twitter) Community Notes system
    inherently undermoderates highly polarizing content. Authors Paul Bouchaud
    and Pedro Ramaciotti analyze how this design vulnerability introduces
    structural risks into democratic electoral processes.
  url: https://aoir.social/@fabiogiglietto/116848735402994028
