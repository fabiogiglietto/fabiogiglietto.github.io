- date: '2026-07-02'
  content: >-
    New research highlights how platforms like Community Notes, designed to
    moderate content, may inadvertently undermoderate polarizing material,
    potentially creating risks for electoral processes. The paper, by Paul
    Bouchaud and Pedro Ramaciotti, suggests inherent design limitations
    contribute to these challenges.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-01'
  content: >-
    A study by Fabrizio Gilardi et al. explores how quality perceptions and
    intended engagement with news are influenced by whether content is
    AI-generated or AI-assisted. This timely analysis contributes to
    understanding audience responses in an evolving media landscape.
  url: https://doi.org/10.1038/s41598-026-58743-0
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-01'
  content: >-
    Research by Anja Bechmann critically examines platform collective behavior
    as a form of democratic infrastructure, moving beyond simple causal effects
    in the era of the Digital Services Act (DSA). The paper advocates for a
    nuanced understanding of these dynamics.
  url: https://doi.org/10.1080/10584609.2026.2679475
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-04'
  content: >-
    Claes H. de Vreese and Rebekah Tromble discuss the evolving challenges of
    social media data access for researchers in their paper 'Moving targets,
    moving politics.' This analysis provides an important overview of the
    current state of play in platform data accessibility.
  url: https://doi.org/10.1080/10584609.2026.2681041
  platforms:
    - Mastodon
    - BlueSky
  toread: true
