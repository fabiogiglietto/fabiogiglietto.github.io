- date: '2026-05-13'
  content: >-
    Recent scholarship delves into the evolving landscape of platform dynamics
    and influencer culture. One highlighted study explores how micro-influencers
    sustain their presence amid platform demands by leveraging niche expertise.
    Another critically examines TikTok's algorithmic transformation, shifting
    social media publics from network-centric to interest-based clusters.
  url: >-
    https://scholar.google.com/scholar?q=Posting%20what%20you%20know%20and%20caring%20for%20the%20niche%3A%20How%20micro-influencers%20survive%20platform%20culture%20demands
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-09'
  content: >-
    A collection of significant new research explores the methodological and
    theoretical directions of social media studies and platform governance. Key
    papers include a systematic review of social science studies analyzing
    social media data from 2010-2024, discussions on the implications of Article
    40 DSA for platform research, and critical examinations of concepts such as
    "post-social media studies," "platformization," "parasocial media," and the
    challenges of the "scam age" in online environments.
  url: https://doi.org/10.31235/osf.io/yexp6_v1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-05'
  content: >-
    Fresh perspectives on online radicalization, protest movements, and
    polarization are presented in recent academic works. Research highlights the
    mainstreaming of radical and extremist ideologies during COVID-19 protests
    and offers a comprehensive 25-year review of online radicalization research.
    Another study evaluates the evidence base for depolarization strategies,
    providing insights into tackling societal divisions.
  url: https://doi.org/10.1080/1369118x.2026.2654668
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-05'
  content: >-
    The intersection of generative AI and political communication is a focus of
    new academic inquiries. One paper maps the sociotechnical imaginaries of
    generative AI across UK, US, Chinese, and Indian newspapers. Concurrently,
    another innovative study proposes using multimodal LLMs to analyze visual
    political communication on platforms like Instagram at scale.
  url: https://doi.org/10.1177/09636625251328518
  platforms:
    - Mastodon
    - BlueSky
  toread: true
