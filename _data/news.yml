    - BlueSky
  toread: true
- date: '2026-05-09'
  content: >-
    A systematic review comprehensively examines social science studies
    analyzing social media data from 2010 to 2024, providing a broad overview of
    methodologies and findings in the field. This significant review, 'A
    systematic review of social science studies analyzing social media data,
    2010-2024,' is authored by Kai-Cheng Yang et al.
  url: https://doi.org/10.31235/osf.io/yexp6_v1
