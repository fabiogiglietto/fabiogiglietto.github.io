- date: '2026-06-16'
  content: >-
    Recent academic discussions highlight the evolving societal implications and
    methodological applications of Artificial Intelligence. Key topics include
    understanding the drivers of AI hype, the political economy of AI
    accountability, the imaginative landscape shaped by Silicon Valley's 'quiet
    futuring', the economics of AI, and discourse analysis of platforms like
    Google's AI Overviews. Additionally, new research explores the potential for
    AI coding agents to reproduce social science findings and frameworks for
    integrating social theory into agentic AI design.
  url: https://doi.org/10.1007/s00146-026-03079-6
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-13'
  content: >-
    Emerging research delves into critical issues surrounding misinformation,
    disinformation, and online extremism. Notable studies explore the dynamics
    of echo chambers, rabbit holes, and radicalization pathways on YouTube, and
    analyze disinformation as narratives within hybrid media ecosystems. Further
    work investigates the 'hostile misinformation effect' driven by ideological
    congruence, efforts to redesign algorithms to address social norm
    misperceptions during elections, and how individuals engage in symbolic
    boundary work within conspiracy theory debates like the 'Great Reset'.
    Research also maps the 'alternative influence network' of far-right
    YouTubers.
  url: https://doi.org/10.1080/10584609.2026.2671765
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-15'
  content: >-
    New scholarly work focuses on understanding social media platforms, data
    access challenges, and advanced digital research methods. This includes
    decoding informativeness perceptions among young adults on audio-visual
    digital platforms, exploring temporal dynamics in digital trace data, and
    mining user-sequences for communication research. Significant attention is
    also given to the state of play in social media data access for election
    research, examining issues of price, proficiency, and permission, and
    addressing multi-platform analysis of electoral discourse as a research
    infrastructure problem. Commentary on the decline of public debate online,
    exemplified by the 'death of Twitter', is also featured.
  url: https://doi.org/10.1080/21670811.2026.2685660
  platforms:
    - Mastodon
    - BlueSky
  toread: true
