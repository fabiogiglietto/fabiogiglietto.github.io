- date: '2026-07-14'
  content: >-
    A series of newly published papers explore the growing influence of
    generative AI on media trust, journalism, and public discourse. Research by
    Goldberg et al. examines the future of digital public squares under AI
    influence, while Gilardi et al. analyze how audiences perceive the quality
    of and engage with AI-generated news. Additionally, Suk and Zhang propose a
    multilevel framework to understand public trust in generative AI.
  url: https://doi.org/10.1177/26339137261459441
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-14'
  content: >-
    Recent academic literature draws critical attention to platform governance
    and the methodologies of digital research. Key contributions include an
    analysis of platform-mediated research and API access politics by Cullen et
    al., alongside a study by Bouchaud and Ramaciotti exposing how X's Community
    Notes system may systematically undermoderate polarizing content during
    elections. Furthering this policy debate, Bechmann and Crosset et al. offer
    critical frameworks for platform collective behavior and content moderation
    under current European and US legislation.
  url: https://doi.org/10.1177/20539517261461463
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-14'
  content: >-
    Innovations and critical assessments in digital research methods are
    reshaping how scholars analyze modern media ecosystems. A study by Zheng et
    al. introduces TubeStats and TokStats, novel tools designed to extract
    random samples from YouTube and TikTok for academic study. Addressing
    structural measurement issues, Schemer et al. investigate how methodological
    choices regarding partisan slant and affective polarization influence
    research findings, while Mosca and Paxton examine the rhetorical use of
    'fake news' as a strategic weapon in mainstream Italian newspapers.
  url: https://doi.org/10.17645/mac.12085
