- date: '2026-05-17'
  content: >-
    The evolving dynamics of social media and digital communication platforms
    are a key focus in recently shared literature. Featured studies discuss the
    impact of platform shifts, such as the decline of Twitter and the
    algorithmic transformation of TikTok into social interest clusters. Other
    significant topics include how Brazilian parliamentarians assert epistemic
    authority online, the survival strategies of micro-influencers, a systematic
    review of social science studies using social media data, the implications
    of Article 40 DSA for platform research, and emerging perspectives towards a
    'Post-Social Media Studies'.
  url: https://aoir.social/@fabiogiglietto/116591218264010991
