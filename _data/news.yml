- date: '2026-05-17'
  content: >-
    Recent academic discussions illuminate critical aspects of misinformation,
    conspiracy theories, and online radicalization. Highlighted research
    includes an examination of the Proud Boys' online discourse and offline
    activities, analyses of how media contribute to the spread of conspiracy
    beliefs—particularly during the COVID-19 pandemic—and an international
    expert assessment of trends and interventions. Further studies explore
    insights from climate psychology for understanding misinformation and a
    systematic review of 25 years of online radicalization research, offering a
    comprehensive look at the complex dynamics of extremist ideologies and their
    dissemination in digital spaces.
  url: https://doi.org/10.1017/s0003055423001478
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-15'
  content: >-
    Developments in generative AI and Large Language Models (LLMs) continue to
    be a significant area of academic focus. Recent publications analyze the
    'agentic framing' of generative AI and LLMs in news media, investigate the
    influence of state media control on LLMs, and map the sociotechnical
    imaginaries of generative AI within global newspaper coverage. Additionally,
    research explores the application of multimodal LLMs for visual political
    communication on platforms like Instagram, indicating a burgeoning field of
    study at the intersection of AI, media, and politics.
  url: https://doi.org/10.1007/s00146-026-03070-1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-17'
  content: >-
    Insights into the evolving landscape of social media platforms and their
    societal impacts are regularly shared, reflecting current research
    interests. Noteworthy studies cover how Brazilian parliamentarians leverage
    platforms to assert epistemic authority during crises, the strategies
    micro-influencers employ to thrive within platform cultures, and a
    comprehensive systematic review of social science studies analyzing social
    media data from 2010 to 2024. Further discussions address the implications
    of the Digital Services Act (DSA) on platform research, the algorithmic
    transformation observed on platforms like TikTok, emerging concepts for a
    'Post-Social Media Studies,' and the challenges presented by the 'scam age'
    and the ongoing 'platformization of everything,' including the shift towards
    parasocial media interactions.
  url: https://doi.org/10.1080/21670811.2026.2669534
  platforms:
    - Mastodon
    - BlueSky
  toread: true
