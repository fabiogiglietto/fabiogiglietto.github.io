- date: '2026-06-13'
  content: >-
    A collection of recent academic papers highlighted research into critical
    online phenomena, including the evaluation of echo chambers, rabbit holes,
    and radicalization pathways on YouTube, the dynamics of disinformation
    narratives in hybrid media ecosystems, and the "hostile misinformation
    effect." Other studies explored the role of social media in spreading
    conspiracy beliefs, particularly during the COVID-19 pandemic, the
    alternative influence network of far-right YouTubers, and the relationship
    between online discourse and offline activities of groups like the Proud
    Boys. Additionally, one paper investigated algorithmic interventions
    designed to address social norm misperceptions during national elections.
  url: https://aoir.social/@fabiogiglietto/116745221330173366
