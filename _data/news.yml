- date: '2026-06-06'
  content: >-
    Recent scholarship addresses critical issues in social media and digital
    communication research, focusing on both methodological innovation and
    persistent challenges in data access. Papers by Claes H. de Vreese, Rebekah
    Tromble, and Josephine Lukito, Kayo Mimizuka explore the evolving landscape
    of platform data access for academic purposes, particularly for election
    research, examining factors like price, proficiency, and permission. Further
    studies by Yangliu Fan, Jakob Ohme, Lion Wedel introduce methods for
    exploring temporal dynamics in digital trace data by mining user-sequences
    and investigate what young adults perceive as informative on audio-visual
    digital platforms through research by Lion Wedel.
  url: https://aoir.social/@fabiogiglietto/116702871922444303
  platforms:
    - Mastodon
    - BlueSky
