- date: '2026-06-19'
  content: >-
    Recent research highlighted delves into the multifaceted societal engagement
    with Artificial Intelligence. Studies examine Italian attitudes towards AI
    and how technology issues travel through social conversation, alongside a
    longitudinal analysis identifying stakeholders driving the AI hype in US and
    German Twitter discourse between 2012 and 2021. Further insights include a
    critical reckoning with the political economy of AI, urging a focus on
    accountability, and an exploration of Silicon Valley’s "quiet futuring"
    shaping the imaginative landscape of AI.
  url: https://doi.org/10.1080/1369118x.2026.2689030
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-13'
  content: >-
    Several recent publications brought to attention examine critical aspects of
    online political communication and misinformation. Featured research
    includes an evaluation of echo chambers, rabbit holes, and radicalization
    pathways on YouTube. Other studies investigate disinformation as narratives
    within hybrid media ecosystems, explore methods for redesigning algorithms
    to intervene on social norm misperceptions during national elections, and
    analyze how individuals engage in symbolic boundary work within "Great
    Reset" conspiracy debates across various social media platforms.
  url: https://doi.org/10.1080/10584609.2026.2671765
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-15'
  content: >-
    A recent paper brought to attention focuses on digital content and audience
    engagement, specifically exploring what young adults perceive as
    informative. The research decodes informativeness perceptions among
    audiences of audio-visual digital platforms, providing insights into media
    consumption habits and content evaluation among younger demographics.
  url: https://doi.org/10.1080/21670811.2026.2685660
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-06'
  content: >-
    Papers recently shared shed light on critical challenges and methodologies
    for social media research. A key focus includes the "state of play" in
    social media data access and its political implications, as well as an
    assessment of platform data access for election research, considering
    factors like price, proficiency, and permission. Researchers also explored
    the mining of user-sequences to understand temporal dynamics in digital
    trace data for communication research, and the conceptualization of
    multi-platform analysis of electoral discourse as a significant research
    infrastructure problem.
  url: https://doi.org/10.1080/19312458.2026.2664873
  platforms:
    - Mastodon
    - BlueSky
  toread: true
