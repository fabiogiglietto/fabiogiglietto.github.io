- date: '2026-07-14'
  content: >-
    As generative artificial intelligence reshapes online communication, recent
    academic studies are analyzing its influence on public trust and opinion.
    Key literature investigates how conversational AI models can actively shift
    the beliefs of skeptics on controversial issues, how audiences perceive the
    quality of AI-assisted journalism, and what the future holds for digital
    public squares increasingly dominated by synthetic content.
