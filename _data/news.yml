- date: '2026-05-18'
  content: >-
    A recent collection of academic papers highlights critical issues
    surrounding online misinformation, extremism, and conspiracy theories. These
    studies delve into the alternative influence networks of far-right
    YouTubers, the relationship between extremist group discourse and offline
    activities, and how traditional media contribute to the spread of conspiracy
    beliefs, especially during events like the COVID-19 pandemic. Other research
    examines international expert assessments on challenges and interventions in
    digital misinformation, along with insights from climate psychology for
    understanding false narratives.
  url: https://doi.org/10.2478/nor-2026-0008
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-18'
  content: >-
    New research explores the burgeoning field of Artificial Intelligence and
    Large Language Models (LLMs), focusing on their complex interactions with
    social theory, media, and political communication. Featured publications
    investigate the necessity of social theory as a structural prior for agentic
    AI systems, the framing of generative AI in news media, and how state media
    control influences LLMs. Additional studies analyze the sociotechnical
    imaginaries of generative AI across different national newspapers and the
    use of multimodal LLMs for visual political communication on platforms such
    as Instagram.
  url: https://arxiv.org/abs/2605.07069
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-17'
  content: >-
    Key developments in social media platform dynamics, regulation, and research
    methodologies are highlighted in a series of academic papers. Topics cover
    the evolving landscape of public debate on platforms like Twitter and its
    potential decline, the strategies employed by micro-influencers to thrive
    within platform cultures, and the algorithmic transformation exemplified by
    TikTok's shift towards social interest clusters. Furthermore, new research
    addresses systematic reviews of social science studies utilizing social
    media data and the practical implications of regulations such as Article 40
    of the Digital Services Act (DSA) for platform research.
  url: https://doi.org/10.5204/mcj.3247
  platforms:
    - Mastodon
    - BlueSky
  toread: true
