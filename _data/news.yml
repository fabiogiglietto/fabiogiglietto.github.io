- date: '2026-05-05'
  content: >-
    Several recent studies investigate various aspects of online radicalization,
    disinformation, and political polarization. Topics covered include the
    mainstreaming of extremist ideologies within protest movements (specifically
    COVID-19 protests), a review of 25 years of online radicalization research,
    an evaluation of evidence-based recommendations for depolarization, and
    analyses of deceptive online networks in elections and YouTube's role in
    shaping conspiracy mentality.
  url: https://aoir.social/@fabiogiglietto/116523329518562598
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-27'
  content: >-
    Important discussions are circulating regarding the European Union's Digital
    Services Act (DSA), specifically how Article 40 is poised to change
    practical approaches to platform research. Related analyses delve into the
    quality of online platform data under the new regulatory framework.
  url: https://aoir.social/@fabiogiglietto/116478620874097428
  platforms:
