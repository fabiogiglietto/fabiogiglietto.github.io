- date: '2026-05-18'
  content: >-
    Recent academic findings delve into the dynamics of online extremism and
    political communication. Featured studies include analyses of far-right
    alternative influence networks on YouTube, the interplay between online
    rhetoric and offline activities of extremist groups like the Proud Boys, how
    political actors establish epistemic authority during crises, and the
    process of radical and extremist ideologies becoming mainstream through
    protest movements.
  url: https://aoir.social/@fabiogiglietto/116594462275492068
