- date: '2026-06-06'
  content: >-
    Timely academic contributions focusing on the evolving challenges of social
    media data access and platform dynamics were shared. These papers
    investigate methods for mining user-sequences in digital trace data, the
    state of platform data access for election research, and broader issues
    concerning the accessibility of social media data. Commentary on the decline
    of platforms like Twitter and its implications for public debate is also
    featured.
