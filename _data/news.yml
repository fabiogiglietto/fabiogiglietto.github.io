- date: '2026-06-13'
  content: >-
    Emerging research delves into the complexities of online information
    environments, including the evaluation of echo chambers, rabbit holes, and
    radicalization pathways on platforms like YouTube. Other studies investigate
    disinformation as narratives, how algorithms can intervene on social norm
    misperceptions during elections, and how individuals engage in symbolic
    boundary work around conspiracy theories, such as the 'Great Reset' debates.
    The phenomenon of the hostile misinformation effect is also being explored.
  url: https://aoir.social/@fabiogiglietto/116745221330173366
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-15'
  content: >-
    New studies explore how young adults perceive informativeness on
    audio-visual digital platforms. Complementary research investigates methods
    for mining user-sequences to understand temporal dynamics in digital trace
    data for communication research.
