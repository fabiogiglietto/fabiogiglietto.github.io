- date: '2026-05-31'
  content: >-
    A series of influential papers delves into the intricate dynamics of
    disinformation, misinformation, and online extremism. Featured research
    explores how disinformation operates as narratives within hybrid media
    ecosystems, the potential of algorithmic redesigns to counter social norm
    misperceptions during elections, and how individuals engage in symbolic
    boundary work within conspiracy theory debates like the “Great Reset.” Other
    studies examine the “hostile misinformation effect,” the connectivity of
    far-right alternative influence networks on platforms like YouTube, the
    relationship between online discourse and offline extremist activities, and
    how media shapes the dissemination of conspiracy beliefs during crises.
    Insights also emerge from international expert assessments of misinformation
    challenges and the application of climate psychology to this field.
  url: https://aoir.social/@fabiogiglietto/116670726588688843
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-27'
  content: >-
    The growing impact of Artificial Intelligence on society and politics is a
    prominent focus in recent scholarship. Featured papers tackle the political
    economy of AI, advocating for accountability and cautioning against “decoys”
    in its pursuit. Researchers also examine Silicon Valley's “quiet futuring”
    in shaping AI's imaginative landscape, analyze how generative AI and large
    language models are framed in news media, and discuss discourse surrounding
    new features like Google’s AI Overviews. Additionally, studies offer
    insights into the economics of AI based on large-scale surveys and propose
    integrating social theory as a structural prior for agentic AI systems.
  url: https://aoir.social/@fabiogiglietto/116648313314249923
