- date: '2026-05-31'
  content: >-
    The latest academic discussions highlight various facets of misinformation
    and conspiracy theories within digital media. Research delves into how
    disinformation operates as narratives in hybrid media ecosystems, how
    individuals engage in symbolic boundary work around topics like the “Great
    Reset,” the “hostile misinformation effect,” and media's role in
    disseminating conspiracy beliefs. Expert assessments on trends and
    interventions, alongside insights from climate psychology for studying
    misinformation, are also featured.
  url: https://aoir.social/@fabiogiglietto/116670726588688843
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-27'
  content: >-
    Contemporary academic discourse on artificial intelligence examines its
    societal impact, from the political economy of AI and the “quiet futuring”
    narratives emanating from Silicon Valley, to the framing of generative AI
    and large language models in news media. Further exploration includes the
    application of social theory as a structural prior for agentic AI, and a
    critical analysis of Google's AI Overviews.
  url: https://aoir.social/@fabiogiglietto/116648313314249923
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-18'
  content: >-
    Emerging research sheds light on the dynamics of online extremism and the
    evolving landscape of public debate. Featured studies investigate the
    alternative influence networks of far-right YouTubers, the relationship
    between online discourse and offline activities of groups like the Proud
    Boys, and how Brazilian parliamentarians assert epistemic authority during
    crises. The broader implications for online public discourse in the wake of
    platform changes, such as the “death of Twitter,” are also considered.
  url: https://aoir.social/@fabiogiglietto/116594462275492068
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-29'
  content: >-
    New findings highlight the potential for redesigning algorithms to intervene
    in social norm misperceptions during national elections. Complementary
    research explores the economic implications of AI, drawing insights from
    large-scale public surveys to understand perceptions and impacts.
