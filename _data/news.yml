- date: '2026-05-18'
  content: >-
    Recent academic discussions and research highlight the multifaceted impact
    of Artificial Intelligence and Large Language Models (LLMs) on society. Key
    studies explore the necessity of integrating social theory into agentic AI
    frameworks, analyze the framing of generative AI in news media, investigate
    the influence of state media control on LLMs, map the sociotechnical
    imaginaries of generative AI across different national newspapers, and delve
    into the application of multimodal LLMs for visual political communication
    on platforms like Instagram.
  url: https://arxiv.org/abs/2605.07069
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-18'
  content: >-
    A significant body of recent academic work explores the complex dynamics of
    online extremism and misinformation. Noteworthy papers analyze the
    alternative influence network of far-right YouTubers and the hybridisation
    of online extremism during the COVID-19 pandemic, examine the relationship
    between groups like the Proud Boys' online discourse and offline activities,
    investigate how media contributes to the dissemination of COVID-19
    conspiracy beliefs, provide an international expert assessment of challenges
    and interventions related to conspiracy theories, offer insights from
    climate psychology for misinformation studies, and review 25 years of
    research into radicalization and the internet.
  url: https://doi.org/10.2478/nor-2026-0008
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-17'
  content: >-
    Current academic discourse also scrutinizes the transformation of digital
    platforms and methods in social media research. This includes analyses of
    the 'death of Twitter' and its implications for public debate, how
    micro-influencers navigate platform culture, and a systematic review of
    social science studies analyzing social media data from 2010-2024.
    Additionally, research delves into the algorithmic transformation of social
    media publics, exemplified by TikTok, examines how new regulations like
    Article 40 of the Digital Services Act (DSA) change platform research
    access, and proposes new theoretical frameworks for 'Post-Social Media
    Studies.'
  url: https://doi.org/10.5204/mcj.3247
  platforms:
    - Mastodon
    - BlueSky
  toread: true
