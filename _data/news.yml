- date: '2026-06-04'
  content: >-
    Discussions highlight the evolving challenges in accessing social media data
    for research. Recent papers examine the current state of play in social
    media data access politics and explore practical considerations, such as
    price, proficiency, or permission, when assessing platform data access for
    election-related studies.
