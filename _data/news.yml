- date: '2026-03-22'
  content: >-
    Recent studies are exploring various facets of online information
    ecosystems. One paper examines information pathways in online science
    communication, focusing on the roles of platform actors and news media.
    Another investigates dark patterns and their relationship to the EU Digital
    Services Act, mapping autonomy violations and design factors. Further
    research analyzes the failed migration of academics from Twitter, providing
    a case study of early adopters.
