- date: '2026-07-08'
  content: >-
    A collection of recently highlighted studies explores the pervasive
    influence of Artificial Intelligence across various domains, from its role
    in propaganda and democratic weakening to its potential in automating
    scientific review. The research further investigates public trust in
    generative AI, quality perceptions of AI-assisted news, AI's persuasive
    capabilities, and its potential in mitigating conspiracy beliefs. Specific
    insights include an analysis of Italian and American attitudes towards AI
    and the stakeholders driving the AI discourse in the US and Germany.
