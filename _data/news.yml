  content: >-
    New research maps the sociotechnical imaginaries of generative AI as
    portrayed in UK, US, Chinese, and Indian newspapers. Authored by Weili Wang
    and John Downey, the paper offers insights into how different national media
    landscapes frame the emergent technology.
