- date: '2026-06-30'
  content: >-
    Recent scholarly work highlights diverse aspects of Artificial Intelligence,
    from its persuasive capabilities and cognitive implications to public
    attitudes and its potential role in mitigating conspiracy beliefs. This
    includes studies on American and Italian public perceptions of AI, analyses
    of AI's influence in media cognition and social science research methods,
    and an examination of the stakeholders driving the AI discourse.
