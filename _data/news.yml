- date: '2026-06-15'
  content: >-
    The intricate interplay of social media, disinformation, and electoral
    processes remains a significant focus in academic discourse. Noteworthy
    studies address the evaluation of echo chambers, rabbit holes, and
    radicalization pathways on platforms such as YouTube. Other critical
    research explores temporal dynamics in digital trace data, examines
    challenges in social media data access for election research, and seeks to
    understand disinformation as narratives within hybrid media ecosystems.
    Additionally, efforts to redesign algorithms for intervening on social norm
    misperceptions during national elections and the complexities of
    multi-platform analysis of electoral discourse are emphasized.
  url: https://aoir.social/@fabiogiglietto/116755189308681520
