- date: '2026-07-14'
  content: >-
    Methodological advancements in social media research are highlighted in a
    new paper introducing TubeStats and TokStats. Developed by Kevin Zheng and
    co-authors, these open-source tools address a major bottleneck in digital
    research by enabling the extraction of random samples from YouTube and
    TikTok, offering critical infrastructure for studying contemporary
    video-centric platforms.
  url: https://doi.org/10.17645/mac.12085
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-12'
  content: >-
    New research exploring the persuasive power of generative technologies
    reveals how conversational AI can significantly shift beliefs and policy
    support. The study, authored by Johannes Kotz and colleagues, demonstrates
    how interactive AI agents successfully influence skeptical audiences across
    highly contested societal issues, raising vital questions about the future
    of digital discourse.
  url: https://doi.org/10.31234/osf.io/7szrn_v1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-04'
  content: >-
    The strategic weaponization of media discourse is examined in a new study
    focusing on Italian newspapers. Authors Lorenzo Mosca and Fred Paxton
    analyze how 'fake news' is deployed as a rhetorical weapon, detailing how
    domestic outlets use the term for strategic delegitimization and selective
    amplification within the national political landscape.
  url: https://doi.org/10.1177/02673231261458935
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    A critical evaluation of decentralized platform governance finds that
    Twitter/X's Community Notes feature may fall short of its democratic goals.
    In a study published in Science Advances, researchers Paul Bouchaud and
    Pedro Ramaciotti argue that the system's underlying design systematically
    undermoderates polarizing content, presenting distinct risks to electoral
    processes.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-28'
  content: >-
    Platform governance is reconceptualized as traffic control in a comparative
    analysis of EU and US regulatory efforts. Scholars Valentine Crosset,
    Tommaso Venturini, and Benoît Dupont dissect current legislative approaches
    to content moderation, offering a novel framework for understanding the
    systemic challenges of digital governance.
  url: https://doi.org/10.1080/21624887.2026.2692735
  platforms:
    - Mastodon
    - BlueSky
  toread: true
