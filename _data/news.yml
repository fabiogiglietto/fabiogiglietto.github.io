- date: '2026-05-05'
  content: >-
    A recent study explores how the sociotechnical imaginaries of generative AI
    are represented across UK, US, Chinese, and Indian newspapers. This analysis
    by Weili Wang and John Downey offers insights into global perceptions and
    narratives surrounding AI development.
  url: https://doi.org/10.1177/09636625251328518
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-05'
  content: >-
    New research by Sophia Rothut et al. investigates the dynamics through which
    radical and extremist ideologies are mainstreamed within protest movements,
    specifically focusing on the case of COVID-19 protests. The paper sheds
    light on the interplay between social mobilization and ideological
    dissemination.
  url: https://doi.org/10.1080/1369118x.2026.2654668
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-27'
  content: >-
    An important analysis by Jakob Ohme and LK Seiling details how Article 40 of
    the Digital Services Act (DSA) is set to transform platform research in
    practice. This paper critically examines the implications of new regulations
    for academic access to platform data.
  url: https://doi.org/10.1080/10584609.2026.2664157
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-24'
  content: >-
    A new theoretical paper by Petter Törnberg and Richard Rogers presents a
    compelling argument for establishing 'Post-Social Media Studies.' The
    authors propose new frameworks for understanding the evolving landscape of
    digital communication beyond conventional social media paradigms.
  url: https://doi.org/10.31235/osf.io/6nue7_v1
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-04-17'
  content: >-
    Influential scholar danah boyd recently published a paper asserting that
    social media has evolved into 'parasocial media.' This work argues that
    platforms increasingly foster one-sided, often celebrity-fan, relationships,
    fundamentally reshaping digital interaction.
  url: https://doi.org/10.1177/20563051261437487
  platforms:
    - Mastodon
    - BlueSky
