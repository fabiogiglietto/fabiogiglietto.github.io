- date: '2026-05-05'
  content: >-
    Several new papers address critical issues in online political
    communication, focusing on disinformation, polarization, and radicalization.
    Key topics include how protest movements can mainstream radical and
    extremist ideologies, a 25-year review of online radicalization research,
    and the dynamics of deceptive online networks in elections. Studies also
    evaluate strategies for depolarization and investigate the role of platforms
    like YouTube in shaping conspiracy mentalities. A notable contribution
    conceptualizes disinformation as cross-platform, identity-affirming cultural
    narratives.
  url: https://aoir.social/@fabiogiglietto/116523329518562598
  platforms:
    - Mastodon
    - BlueSky
  toread: true
