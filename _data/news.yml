- date: '2026-07-08'
  content: >-
    Emerging research explores the intersection of generative AI, propaganda,
    and digital authoritarianism across six democratically weakened nations.
    Co-authored by Gabrielle D. Beacken, Inga K. Trauthig, and Samuel C.
    Woolley, the comparative study offers critical insights into how modern
    technologies are being leveraged to reshape political discourse.
  url: https://doi.org/10.1177/20539517251410064
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-02'
  content: >-
    Crowdsourced moderation systems may carry inherent electoral risks,
    according to a recent analysis of X's Community Notes. Researchers Paul
    Bouchaud and Pedro Ramaciotti demonstrate how the platform's design can lead
    to the under-moderation of highly polarizing content during critical
    democratic processes.
  url: https://doi.org/10.1126/sciadv.aee6932
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-07-01'
  content: >-
    Investigating the future of journalism, a newly published study in
    Scientific Reports examines how audiences perceive the quality of
    AI-generated and AI-assisted news. Led by Fabrizio Gilardi, the research
    team measures intended user engagement, offering vital benchmarks for
    publishers integrating AI into their newsrooms.
  url: https://doi.org/10.1038/s41598-026-58743-0
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-21'
  content: >-
    Personalized dialogues with artificial intelligence could play a role in
    combatting misinformation, according to a new study on conspiracy beliefs.
    Researchers Thomas H. Costello, Gordon Pennycook, and David Gertler Rand
    demonstrate how engaging individuals in structured AI conversations can lead
    to durable reductions in deeply held conspiratorial views.
  url: https://doi.org/10.31234/osf.io/xcwdn
  platforms:
    - Mastodon
    - BlueSky
  toread: true
