- date: '2026-05-27'
  content: >-
    Recent scholarship delves into the political economy of artificial
    intelligence, examining themes from accountability and the imaginative
    landscape of AI to its economic impacts and the influence of social theory
    on agentic AI. Research also explores how generative AI and large language
    models are framed in news media, and the role of state media control in
    shaping these models.
  url: https://arxiv.org/abs/2604.16106v2
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-21'
  content: >-
    A collection of recent academic papers sheds light on the spread of
    misinformation and conspiracy beliefs in digital environments. Key findings
    include how ideological congruence affects misinformation assessment,
    media's role in disseminating conspiracy theories, and the symbolic boundary
    work by self-identified conspiracy theorists. An international expert
    assessment further outlines challenges and interventions in this critical
    area.
  url: https://doi.org/10.1177/14614448261446590
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-26'
  content: >-
    New studies highlight critical aspects of social media discourse, including
    the challenges of multi-platform electoral analysis and the broader
    implications of platform changes on public debate. Research also
    investigates online extremism, mapping alternative influence networks among
    far-right YouTubers and analyzing the connection between online rhetoric and
    offline activities of extremist groups.
  url: https://doi.org/10.1145/3795513.3807440
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-05-09'
  content: >-
    A comprehensive systematic review, covering 2010-2024, provides an in-depth
    analysis of social science studies that utilize social media data. This
    review offers crucial insights into the evolving methodologies and research
    trends within this dynamic field.
  url: https://doi.org/10.31235/osf.io/yexp6_v1
