- date: '2026-06-29'
  content: >-
    The critical areas of information attacks and platform governance are
    central to newly highlighted research. Studies examine cross-national troll
    behavior, the role of alternative media in the digital news ecosystem,
    content moderation as a form of traffic control, and the dynamics of echo
    chambers, rabbit holes, and radicalization pathways on platforms like
    YouTube. The research also sheds light on understanding disinformation as
    narratives within hybrid media environments.
  url: https://aoir.social/@fabiogiglietto/116832515231323736
  platforms:
    - Mastodon
    - BlueSky
  toread: true
- date: '2026-06-06'
  content: >-
    Contemporary challenges in social science research using digital data are
    addressed in a selection of recent papers. These include explorations into
    mining user-sequences to understand temporal dynamics in digital trace data,
    an overview of the evolving landscape of social media data access, and an
    assessment of factors like price, proficiency, and permission for platform
    data access in election research.
  url: https://aoir.social/@fabiogiglietto/116702871922444303
