- date: '2026-06-15'
  content: >-
    Recent research highlights critical aspects of digital platforms, focusing
    on how young adults perceive informativeness on audio-visual platforms and
    the dynamics of echo chambers, rabbit holes, and radicalization pathways on
    YouTube. Other studies delve into temporal dynamics in digital trace data
    for communication research and how disinformation narratives operate within
    hybrid media ecosystems.
