- date: '2026-03-27'
  content: >-
    Recent posts highlight several research papers of interest. These include
    studies on the partisan effects of social media bans, information pathways
    in online science communication, and the impact of dark patterns within the
    EU Digital Services Act. Other papers explore the failed migration of
    academics from Twitter, representativeness and response validity across
    online samples, and the profiling of ideological positions through
    recommender systems on X.
