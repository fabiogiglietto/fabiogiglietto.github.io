    - BlueSky
  toread: true
- date: '2026-05-15'
  content: >-
    Cutting-edge research on generative AI and large language models (LLMs) is
    brought into focus, examining their portrayal and 'agentic framing' in news
    media. Further studies address the influence of state media control on LLMs
    and explore their sophisticated applications in visual political
    communication, particularly regarding multimodal LLMs for analyzing content
    on platforms like Instagram.
  url: https://aoir.social/@fabiogiglietto/116577063374814418
  platforms:
